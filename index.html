<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO OPERACIONAL V20.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* CSS EXPANDIDO - DESIGN E IDENTIDADE VISUAL 
        */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-alerta: #e11d48;
            --cor-sucesso: #10b981;
            --cor-texto: #1e293b;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            background-color: var(--fundo-base); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            color: var(--cor-texto);
            padding-bottom: 100px;
        }

        /* HEADER IDENTIDADE CORPORATIVA */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 90px 20px; 
            text-align: center; 
            border-bottom: 25px solid var(--roxo-raizen);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .logo-raizen-master {
            color: var(--branco);
            font-size: 85px;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }

        header h1 { 
            color: var(--branco); 
            font-size: 24px; 
            letter-spacing: 6px; 
            font-weight: 300;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* CONTAINER DE ENTRADA */
        .card-industrial { 
            width: 94%; 
            max-width: 1100px; 
            margin: 60px auto; 
            background: var(--branco); 
            padding: 70px; 
            border-radius: 60px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.2); 
            border-left: 35px solid var(--roxo-raizen);
            position: relative;
        }

        /* PAINEL DO OPERADOR - TELA CHEIA */
        #secao-operador { 
            display: none; 
            width: 98%; 
            max-width: 2200px; 
            margin: 40px auto;
            background: var(--branco);
            padding: 60px;
            border-radius: 50px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 50px; 
            font-size: 38px;
            border-bottom: 12px solid #f1f5f9;
            padding-bottom: 30px;
        }

        /* ESTILO DOS INPUTS E ÍCONES INTERNOS */
        .wrapper-campo { margin-bottom: 40px; position: relative; }
        
        label { 
            display: block; 
            margin-bottom: 15px; 
            font-weight: 900; 
            color: var(--verde-raizen); 
            font-size: 16px; 
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        label i { color: var(--roxo-raizen); font-size: 20px; }

        input, select { 
            width: 100%; 
            padding: 28px; 
            border: 5px solid #e2e8f0; 
            border-radius: 30px; 
            font-size: 24px; 
            font-weight: 700;
            background: #f8fafc;
            color: #334155;
            transition: all 0.3s;
        }

        input:focus { 
            border-color: var(--roxo-raizen); 
            background: #fff;
            box-shadow: 0 0 0 8px rgba(132, 32, 125, 0.1);
        }

        /* BOX DE JORNADA COM ANIMAÇÃO */
        .container-jornada-exp {
            background: #fffbeb;
            padding: 50px;
            border-radius: 50px;
            border: 6px solid var(--ouro-raizen);
            margin: 40px 0;
        }

        .check-box-24h {
            display: flex;
            align-items: center;
            gap: 25px;
            cursor: pointer;
            background: #ffffff;
            padding: 25px;
            border-radius: 30px;
            margin-top: 35px;
            border: 3px solid #fde68a;
        }

        .check-box-24h input { 
            width: 45px; 
            height: 45px; 
            accent-color: var(--cor-alerta); 
        }

        .txt-check { font-weight: 900; color: var(--cor-alerta); font-size: 22px; }

        /* TABELA TÉCNICA */
        .moldura-tabela { 
            overflow-x: auto; 
            border-radius: 50px; 
            border: 4px solid #e2e8f0; 
        }

        table { width: 100%; border-collapse: collapse; min-width: 2100px; }
        
        th { 
            background: #0f172a; 
            color: #ffffff; 
            padding: 35px; 
            font-size: 15px; 
            text-transform: uppercase; 
            letter-spacing: 4px;
        }

        td { 
            padding: 30px; 
            border-bottom: 4px solid #f1f5f9; 
            text-align: center; 
            font-weight: 800; 
            font-size: 22px;
        }

        /* SEMÁFORO VISUAL */
        .box-semaforo {
            padding: 18px 25px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-transform: uppercase;
        }
        .semaforo-verde { background: #dcfce7; color: #166534; border: 3px solid var(--cor-sucesso); }
        .semaforo-vermelho { background: #fee2e2; color: #991b1b; border: 3px solid var(--cor-alerta); }
        .circulo-led { width: 15px; height: 15px; border-radius: 50%; }
        .led-g { background: #10b981; box-shadow: 0 0 12px #10b981; }
        .led-r { background: #ef4444; box-shadow: 0 0 12px #ef4444; }

        /* BOTÕES RAÍZEN */
        .btn-principal { 
            width: 100%; 
            padding: 40px; 
            background: var(--roxo-raizen); 
            color: white; 
            border: none; 
            border-radius: 35px; 
            font-size: 30px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 25px 50px rgba(132, 32, 125, 0.4);
        }

        .btn-w-whatsapp { background: #22c55e; color: white; border: none; padding: 22px; border-radius: 20px; width: 100%; cursor: pointer; margin-bottom: 12px; font-weight: 900; font-size: 15px; }
        .btn-f-finalizar { background: #3b82f6; color: white; border: none; padding: 22px; border-radius: 20px; width: 100%; cursor: pointer; font-weight: 900; font-size: 15px; }

        /* TAGS DE PRODUTO COM ÍCONES */
        .tag-prod {
            padding: 18px 30px;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 220px;
        }
        .tag-gasosa { background: #f59e0b; color: #000; }
        .tag-b100 { background: #000000; }
        .tag-etanol { background: #059669; }
        .tag-diesel { background: #475569; }

        .loader-raizen {
            border: 10px solid rgba(255,255,255,0.2);
            border-top: 10px solid #ffffff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<header>
    <div class="logo-raizen-master">RAÍZEN</div>
    <h1>CONTROLE DE DESCARGAS | TERMINAL PAULÍNIA</h1>
</header>

<div class="card-industrial" id="modulo-entrada">
    <h2><i class="fa-solid fa-file-signature"></i> REGISTRO DE ENTRADA</h2>
    <form id="formDescarga">
        
        <div class="wrapper-campo">
            <label><i class="fa-solid fa-truck-front"></i> PLACA DO VEÍCULO</label>
            <input type="text" id="campo_placa" placeholder="ABC-1234" maxlength="8" required>
        </div>

        <div class="wrapper-campo">
            <label><i class="fa-solid fa-droplet"></i> PRODUTO CARREGADO</label>
            <select id="campo_produto" required>
                <option value="">-- SELECIONE O PRODUTO --</option>
                <option value="GASOLINA">GASOLINA COMUM / ADITIVADA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                <option value="DIESEL S10">DIESEL S10</option>
            </select>
        </div>

        <div class="wrapper-campo">
            <label><i class="fa-brands fa-whatsapp"></i> NÚMERO DO WHATSAPP</label>
            <input type="tel" id="campo_whatsapp" placeholder="(19) 99999-9999" maxlength="15" required>
        </div>

        <div class="container-jornada-exp">
            <div id="box-horario-input">
                <label><i class="fa-solid fa-clock-rotate-left"></i> TÉRMINO DA JORNADA</label>
                <input type="time" id="campo_hora_limite">
            </div>
            
            <label class="check-box-24h">
                <input type="checkbox" id="check_jornada_24h">
                <span class="txt-check"><i class="fa-solid fa-triangle-exclamation"></i> ESTOU EM JORNADA 24 HORAS</span>
            </label>
        </div>

        <div style="margin-top:70px;">
            <button type="submit" class="btn-principal" id="btn_registrar">EFETUAR REGISTRO NO PÁTIO</button>
        </div>
    </form>
    
    <div style="text-align:center; margin-top:60px; border-top:4px dashed #ccc; padding-top:40px;">
        <button onclick="acessoOperador()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; font-size:18px; text-decoration:underline;">MÓDULO DE GESTÃO DO OPERADOR</button>
    </div>
</div>

<div id="secao-operador">
    <h2><i class="fa-solid fa-list-check"></i> FILA DE DESCARGA - ÁREA 02</h2>
    
    <div style="margin-bottom:50px;">
        <div style="position:relative;">
            <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:30px; top:35px; font-size:30px; color:var(--roxo-raizen);"></i>
            <input type="text" id="filtroFila" placeholder="FILTRAR POR PLACA, PRODUTO OU JORNADA..." onkeyup="filtrarTabela()" style="padding-left:85px; border:6px solid var(--roxo-raizen);">
        </div>
    </div>

    <div class="moldura-tabela">
        <table id="tabelaMaster">
            <thead>
                <tr>
                    <th><i class="fa-solid fa-hashtag"></i> PLACA</th>
                    <th><i class="fa-solid fa-flask-vial"></i> PRODUTO</th>
                    <th><i class="fa-solid fa-phone"></i> CONTATO</th>
                    <th><i class="fa-solid fa-traffic-light"></i> STATUS JORNADA</th>
                    <th><i class="fa-solid fa-calendar-check"></i> ENTRADA</th>
                    <th style="background:#fff9c4; color:#000;">AGENDAMENTO COLETA</th>
                    <th><i class="fa-solid fa-gears"></i> AÇÕES</th>
                </tr>
            </thead>
            <tbody id="dadosFila"></tbody>
        </table>
    </div>

    <div style="margin-top:80px; display:flex; gap:50px;">
        <button class="btn-principal" style="background:#475569;" onclick="location.reload()">SAIR</button>
        <button class="btn-principal" style="background:var(--verde-raizen);" onclick="sincronizarFila()">ATUALIZAR FILA</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const SENHA_OP = 'raizen2026';

    /* RESTAURAÇÃO DA JORNADA INTELIGENTE: SOME AO MARCAR 24H */
    document.getElementById('check_jornada_24h').addEventListener('change', function() {
        const boxHora = document.getElementById('box-horario-input');
        const inputH = document.getElementById('campo_hora_limite');
        if (this.checked) {
            boxHora.style.display = 'none';
            inputH.value = "";
        } else {
            boxHora.style.display = 'block';
        }
    });

    /* MÁSCARAS TÉCNICAS */
    document.getElementById('campo_placa').oninput = e => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    };

    document.getElementById('campo_whatsapp').oninput = e => {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    };

    /* WHATSAPP COM ÍCONES E MENSAGEM PADRÃO */
    function chamarMotorista(tel, placa) {
        const num = tel.replace(/\D/g, "");
        if(num.length < 11) return alert("ERRO: Número incompleto!");
        const baia = prompt("PARA QUAL BAIA O VEÍCULO " + placa + " DEVE IR?");
        if(!baia) return;
        const msg = `Olá%0AMotorista vamos descarregar?%0ABaia *${baia}* - Área 02%0AObrigado!`;
        window.open(`https://api.whatsapp.com/send?phone=55${num}&text=${msg}`, '_blank');
    }

    /* FILTRO DE BUSCA GLOBAL */
    function filtrarTabela() {
        const termo = document.getElementById("filtroFila").value.toUpperCase();
        const linhas = document.getElementById("tabelaMaster").getElementsByTagName("tr");
        for (let i = 1; i < linhas.length; i++) {
            linhas[i].style.display = linhas[i].innerText.toUpperCase().includes(termo) ? "" : "none";
        }
    }

    /* SALVAR REGISTRO (POST) */
    document.getElementById('formDescarga').onsubmit = async e => {
        e.preventDefault();
        const btn = document.getElementById('btn_registrar');
        btn.innerHTML = '<span class="loader-raizen"></span> REGISTRANDO...';
        btn.disabled = true;

        const dados = {
            "PLACA": document.getElementById('campo_placa').value,
            "PRODUTO": document.getElementById('campo_produto').value,
            "TELEFONE": document.getElementById('campo_whatsapp').value,
            "JORNADA": document.getElementById('check_jornada_24h').checked ? "24 HORAS" : document.getElementById('campo_hora_limite').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "SAIDA": "",
            "AGENDAMENTO NO COLETA": ""
        };

        await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify([dados])
        });
        alert("MOTORISTA CADASTRADO COM SUCESSO!");
        location.reload();
    };

    /* SEMÁFORO DE STATUS (VERDE/VERMELHO) */
    function gerarSemaforo(valor) {
        if(valor === "24 HORAS") return `<div class="box-semaforo semaforo-vermelho"><span class="circulo-led led-r"></span> CRÍTICO (24H)</div>`;
        const agora = new Date();
        const t = valor.split(':');
        if(t.length < 2) return valor;
        const limite = new Date(); limite.setHours(t[0], t[1], 0);
        if(agora > limite) return `<div class="box-semaforo semaforo-vermelho"><span class="circulo-led led-r"></span> FORA DE JORNADA</div>`;
        return `<div class="box-semaforo semaforo-verde"><span class="circulo-led led-g"></span> DENTRO DA JORNADA</div>`;
    }

    /* SINCRONIZAÇÃO E ORDENAÇÃO */
    async function sincronizarFila() {
        const corpo = document.getElementById('dadosFila');
        corpo.innerHTML = "<tr><td colspan='7'><span class='loader-raizen' style='width:30px; height:30px; border-top-color:var(--roxo-raizen);'></span> ATUALIZANDO...</td></tr>";
        
        const res = await fetch(API_URL + "?t=" + Date.now());
        const json = await res.json();
        let ativos = json.filter(x => x.PLACA && !x.SAIDA);

        // Ordenação por Agendamento Coleta
        ativos.sort((a, b) => {
            const agA = a['AGENDAMENTO NO COLETA'] ? new Date(a['AGENDAMENTO NO COLETA']) : new Date(8640000000000000);
            const agB = b['AGENDAMENTO NO COLETA'] ? new Date(b['AGENDAMENTO NO COLETA']) : new Date(8640000000000000);
            return agA - agB;
        });

        corpo.innerHTML = "";
        ativos.forEach(item => {
            let classeProd = "tag-diesel";
            let iconeProd = "fa-gas-pump";
            if(item.PRODUTO === "GASOLINA") { classeProd = "tag-gasosa"; iconeProd = "fa-fire-flame-simple"; }
            if(item.PRODUTO === "BIODIESEL (B100)") { classeProd = "tag-b100"; iconeProd = "fa-leaf"; }
            if(item.PRODUTO.includes("ETANOL")) { classeProd = "tag-etanol"; iconeProd = "fa-droplet"; }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:var(--roxo-raizen); font-size:32px;">${item.PLACA}</td>
                <td><span class="tag-prod ${classeProd}"><i class="fa-solid ${iconeProd}"></i> ${item.PRODUTO}</span></td>
                <td>${item.TELEFONE}</td>
                <td>${gerarSemaforo(item.JORNADA)}<br><small>Ref: ${item.JORNADA}</small></td>
                <td>${item.ENTRADA.split(',')[1] || item.ENTRADA}</td>
                <td style="background:#fffde7; border:3px solid var(--ouro-raizen);">
                    <input type="datetime-local" id="ag-${item.PLACA}" value="${item['AGENDAMENTO NO COLETA'] || ''}" style="font-size:16px; padding:10px; border-radius:10px;">
                    <button onclick="salvarAgenda('${item.PLACA}')" style="margin-top:10px; background:var(--verde-raizen); color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; width:100%; font-weight:bold;">FIXAR</button>
                </td>
                <td>
                    <button class="btn-w-whatsapp" onclick="chamarMotorista('${item.TELEFONE}','${item.PLACA}')"><i class="fa-brands fa-whatsapp"></i> CONVOCAR</button>
                    <button class="btn-f-finalizar" onclick="finalizar('${item.PLACA}')"><i class="fa-solid fa-circle-check"></i> FINALIZAR</button>
                </td>
            `;
            corpo.appendChild(tr);
        });
    }

    async function salvarAgenda(placa) {
        const val = document.getElementById(`ag-${placa}`).value;
        await fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({"AGENDAMENTO NO COLETA": val}) });
        alert("PRIORIDADE DEFINIDA!");
        sincronizarFila();
    }

    async function finalizar(placa) {
        if(confirm("FINALIZAR OPERAÇÃO DO VEÍCULO " + placa + "?")) {
            await fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({"SAIDA": new Date().toLocaleString('pt-BR')}) });
            sincronizarFila();
        }
    }

    function acessoOperador() {
        if(prompt("SENHA OPERACIONAL:") === SENHA_OP) {
            document.getElementById('modulo-entrada').style.display = 'none';
            document.getElementById('secao-operador').style.display = 'block';
            sincronizarFila();
        } else { alert("SENHA INCORRETA!"); }
    }
</script>
</body>
</html>
