<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>RAÍZEN - GESTÃO OPERACIONAL FULL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-raizen: #4d6d5d; --roxo-raizen: #84207d; --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9; --branco: #ffffff; --cor-erro: #e11d48;
            --cor-sucesso: #10b981; --sombra-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--fundo-base); color: #1e293b; min-height: 100vh; padding-bottom: 80px; }
        
        header { background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); padding: 80px 20px; text-align: center; border-bottom: 25px solid var(--roxo-raizen); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .logo-display { color: var(--branco); font-size: 90px; font-weight: 900; letter-spacing: 20px; text-transform: uppercase; }

        .card-master { width: 94%; max-width: 1150px; margin: -50px auto 60px; background: var(--branco); padding: 60px; border-radius: 40px; box-shadow: var(--sombra-premium); border-left: 30px solid var(--roxo-raizen); position: relative; z-index: 10; }
        
        #modulo-operador-full, #modulo-supervisao { display: none; width: 98%; max-width: 1800px; margin: 40px auto; background: var(--branco); padding: 40px; border-radius: 35px; box-shadow: var(--sombra-premium); }

        h2 { color: var(--roxo-raizen); text-align: center; font-weight: 900; text-transform: uppercase; margin-bottom: 40px; font-size: 34px; border-bottom: 10px solid #f8fafc; padding-bottom: 20px; }

        .wrapper-input { margin-bottom: 30px; position: relative; }
        label { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; font-weight: 900; color: var(--verde-raizen); font-size: 15px; text-transform: uppercase; }
        input, select { width: 100%; padding: 25px; border: 5px solid #f1f5f9; border-radius: 20px; font-size: 22px; font-weight: 700; background: #f8fafc; transition: 0.3s; }
        input:focus { border-color: var(--roxo-raizen); outline: none; background: #fff; }

        .btn-master { width: 100%; padding: 30px; background: var(--roxo-raizen); color: white; border: none; border-radius: 25px; font-size: 24px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 12px 0 #5e1659; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 15px; transition: 0.2s; }
        .btn-master:active { transform: translateY(8px); box-shadow: 0 4px 0 #5e1659; }

        /* Tabela Operacional */
        .moldura-tabela { overflow-x: auto; border-radius: 30px; border: 4px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        th { background: #f8fafc; color: var(--roxo-raizen); padding: 25px; text-align: left; font-weight: 900; text-transform: uppercase; border-bottom: 8px solid #f1f5f9; }
        td { padding: 20px; background: white; border-bottom: 2px solid #f1f5f9; font-size: 16px; font-weight: 600; }

        /* Trava de Tanque e Badge */
        .status-badge { padding: 10px 15px; border-radius: 12px; font-size: 12px; font-weight: 900; text-transform: uppercase; }
        .badge-sucesso { background: #dcfce7; color: #166534; }
        .badge-erro { background: #fee2e2; color: #991b1b; }

        .btn-bloqueado { background: #cbd5e1 !important; cursor: not-allowed !important; box-shadow: none !important; opacity: 0.6; }

        /* Estilo da Jornada 24h */
        .check-24h { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 15px; border-radius: 15px; margin-top: 10px; cursor: pointer; }
        .check-24h input { width: 25px; height: 25px; cursor: pointer; }

        /* Loader */
        #loader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .raizen-spinner { width: 80px; height: 80px; border: 10px solid #f3f3f3; border-top: 10px solid var(--roxo-raizen); border-radius: 50%; animation: girar 1s linear infinite; }
        @keyframes girar { 100% { transform: rotate(360deg); } }

        /* Painel de Tanques */
        .grid-tanques { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card-tanque { padding: 25px; border-radius: 25px; background: #f8fafc; border: 4px solid #e2e8f0; text-align: center; transition: 0.3s; }
        .card-tanque h3 { font-size: 18px; color: var(--verde-raizen); margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loader-overlay"><div class="raizen-spinner"></div><h2 style="border:none; margin-top:20px;">PROCESSANDO OPERAÇÃO...</h2></div>

<header><div class="logo-display">RAÍZEN</div></header>

<div class="card-master" id="secao-registro">
    <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO DE MOTORISTA</h2>
    <form id="formRegistro">
        <div class="wrapper-input">
            <label><i class="fa-solid fa-barcode"></i> PLACA DO VEÍCULO</label>
            <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
        </div>
        
        <div class="wrapper-input">
            <label><i class="fa-solid fa-gas-pump"></i> PRODUTO</label>
            <select id="produto" required>
                <option value="">-- SELECIONE O PRODUTO --</option>
                <option value="GASOLINA">GASOLINA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                <option value="DIESEL S10">DIESEL S10</option>
            </select>
        </div>

        <div class="wrapper-input">
            <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP (COM DDD)</label>
            <input type="tel" id="whatsapp" placeholder="(00) 00000-0000" maxlength="15" required>
        </div>

        <div class="wrapper-input" id="container-jornada">
            <label><i class="fa-solid fa-clock"></i> FIM DA JORNADA (HORÁRIO)</label>
            <input type="datetime-local" id="fim_jornada">
            <label class="check-24h">
                <input type="checkbox" id="check24h" onchange="toggle24h(this)"> JORNADA 24 HORAS (SEM LIMITE)
            </label>
        </div>

        <button type="submit" class="btn-master">CONFIRMAR E GERAR QR CODE</button>
        <button type="button" onclick="abrirReabertura()" class="btn-master" style="background:#475569; box-shadow: 0 12px 0 #1e293b; font-size:16px;">REABRIR JORNADA EXISTENTE</button>
    </form>

    <div style="text-align:center; margin-top:40px; display:flex; flex-direction:column; gap:15px;">
        <button onclick="acessoPainel('operador')" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-transform:uppercase; font-size:14px;">
            <i class="fa-solid fa-lock"></i> ACESSO OPERADOR DE PÁTIO
        </button>
        <button onclick="acessoPainel('supervisao')" style="background:none; border:none; color:var(--verde-raizen); font-weight:900; cursor:pointer; text-transform:uppercase; font-size:14px;">
            <i class="fa-solid fa-user-shield"></i> ACESSO SUPERVISÃO DE TANQUES
        </button>
    </div>
</div>

<div id="modulo-operador-full">
    <h2><i class="fa-solid fa-list-check"></i> CONTROLE DE FILA E TANQUES</h2>
    
    <div id="resumo-tanques-fila" class="grid-tanques"></div>

    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>PLACA</th>
                    <th>PRODUTO</th>
                    <th style="background:#fff7ed;">VOLUME (L)</th>
                    <th>JORNADA ATÉ</th>
                    <th>CAPACIDADE TANQUE</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="corpoFila"></tbody>
        </table>
    </div>
    <button class="btn-master" style="background:#1e293b; margin-top:40px;" onclick="window.location.reload()">VOLTAR AO INÍCIO</button>
</div>

<div id="modulo-supervisao">
    <h2><i class="fa-solid fa-gears"></i> CONFIGURAÇÃO DE ESTOQUE (SUPERVISÃO)</h2>
    <div id="gridSupervisao" class="grid-tanques"></div>
    <button class="btn-master" style="background:#1e293b; margin-top:40px;" onclick="window.location.reload()">SAIR DA SUPERVISÃO</button>
</div>

<script>
    // CONFIGURAÇÕES DE API (SUPABASE)
    const API = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co/rest/v1',
        KEY: 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X',
        get HEADERS() {
            return { "apikey": this.KEY, "Authorization": `Bearer ${this.KEY}`, "Content-Type": "application/json", "Prefer": "return=minimal" };
        }
    };

    let listaTanques = [];
    let listaFila = [];

    // --- MÁSCARAS E AUXILIARES ---
    document.getElementById('placa').oninput = e => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if(v.length > 3) v = v.slice(0,3) + "-" + v.slice(3,7);
        e.target.value = v;
    };

    document.getElementById('whatsapp').oninput = e => {
        let v = e.target.value.replace(/\D/g, "");
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
        v = v.replace(/(\d{5})(\d)/, "$1-$2");
        e.target.value = v;
    };

    function toggle24h(el) {
        const input = document.getElementById('fim_jornada');
        input.disabled = el.checked;
        if(el.checked) input.value = "";
    }

    function setLoader(v) { document.getElementById('loader-overlay').style.display = v ? 'flex' : 'none'; }

    // --- LÓGICA DE DADOS ---
    async function carregarTudo() {
        try {
            const [rFila, rTanques] = await Promise.all([
                fetch(`${API.URL}/registros?SAIDA=is.null&select=*`, { headers: API.HEADERS }),
                fetch(`${API.URL}/ESTOQUE?select=*`, { headers: API.HEADERS })
            ]);
            listaFila = await rFila.json();
            listaTanques = await rTanques.json();
            
            renderFila();
            renderResumoTanques();
            renderSupervisao();
        } catch (err) { alert("Erro ao carregar dados: " + err); }
    }

    function renderResumoTanques() {
        const div = document.getElementById('resumo-tanques-fila');
        div.innerHTML = listaTanques.map(t => `
            <div class="card-tanque">
                <h3>${t.TANQUE_NAME}</h3>
                <b style="font-size:20px;">${Number(t.ESPAÇO_DISPONIVEL).toLocaleString()} L</b>
                <p style="font-size:11px; margin-top:5px;">${t.PRODUTO}</p>
            </div>
        `).join('');
    }

    function renderFila() {
        const corpo = document.getElementById('corpoFila');
        corpo.innerHTML = "";
        
        listaFila.forEach(item => {
            const tanque = listaTanques.find(t => item.PRODUTO.includes(t.PRODUTO));
            const volCaminhao = Number(item.VOLUME) || 0;
            const espaco = tanque ? Number(tanque.ESPAÇO_DISPONIVEL) : 0;
            const permitido = volCaminhao > 0 && espaco >= volCaminhao;

            corpo.innerHTML += `
                <tr>
                    <td style="font-weight:900; font-size:18px; color:var(--roxo-raizen);">${item.PLACA}</td>
                    <td>${item.PRODUTO}</td>
                    <td>
                        <input type="number" id="vol-${item.ID}" value="${item.VOLUME || ''}" style="width:120px; padding:10px; font-size:14px;">
                        <button onclick="salvarVolume(${item.ID})" class="status-badge" style="background:var(--roxo-raizen); color:white; border:none; cursor:pointer;">OK</button>
                    </td>
                    <td>${item.JORNADA === 'LIBERADO' ? '<span class="status-badge badge-sucesso">24 HORAS</span>' : item.AGENDAMENTO.slice(11,16) + 'h'}</td>
                    <td>
                        ${permitido 
                            ? '<span class="status-badge badge-sucesso">LIBERADO</span>' 
                            : `<span class="status-badge badge-erro">SEM ESPAÇO</span><br><small>Faltam ${(volCaminhao - espaco).toLocaleString()}L</small>`}
                    </td>
                    <td style="display:flex; gap:10px;">
                        <button onclick="convocar('${item.TELEFONE}', '${item.PLACA}')" ${permitido ? '' : 'disabled'} class="status-badge ${permitido ? '' : 'btn-bloqueado'}" style="background:#25d366; color:white; border:none; cursor:pointer; padding:12px;">
                            <i class="fa-brands fa-whatsapp"></i> CONVOCAR
                        </button>
                        <button onclick="registrarSaida(${item.ID}, ${volCaminhao}, ${tanque?.id})" class="status-badge" style="background:#3b82f6; color:white; border:none; cursor:pointer; padding:12px;">SAÍDA</button>
                    </td>
                </tr>
            `;
        });
    }

    // --- FUNÇÕES DE AÇÃO ---
    async function salvarVolume(id) {
        const vol = document.getElementById(`vol-${id}`).value;
        if(!vol) return alert("Insira o volume!");
        setLoader(true);
        await fetch(`${API.URL}/registros?ID=eq.${id}`, {
            method: 'PATCH', headers: API.HEADERS, body: JSON.stringify({ VOLUME: vol })
        });
        await carregarTudo();
        setLoader(false);
    }

    async function registrarSaida(regId, volume, tanqueId) {
        if(!confirm("CONFIRMAR SAÍDA? O volume ocupado será subtraído do espaço livre do tanque.")) return;
        setLoader(true);
        
        // 1. Atualiza Saída do Veículo
        await fetch(`${API.URL}/registros?ID=eq.${regId}`, {
            method: 'PATCH', headers: API.HEADERS, body: JSON.stringify({ SAIDA: new Date().toLocaleString() })
        });

        // 2. Subtrai espaço do tanque
        if(tanqueId && volume > 0) {
            const tanqueAtual = listaTanques.find(t => t.id === tanqueId);
            const novoEspaco = Number(tanqueAtual.ESPAÇO_DISPONIVEL) - volume;
            await fetch(`${API.URL}/ESTOQUE?id=eq.${tanqueId}`, {
                method: 'PATCH', headers: API.HEADERS, body: JSON.stringify({ ESPAÇO_DISPONIVEL: novoEspaco })
            });
        }
        await carregarTudo();
        setLoader(false);
    }

    function convocar(tel, placa) {
        const baia = prompt("Informe a BAIA de destino:");
        if(!baia) return;
        const msg = encodeURIComponent(`RAÍZEN INFORMA: Veículo ${placa}, sua entrada para descarregamento na BAIA ${baia} foi autorizada.`);
        window.open(`https://wa.me/55${tel.replace(/\D/g,"")}?text=${msg}`);
    }

    // --- SUPERVISÃO ---
    function renderSupervisao() {
        const grid = document.getElementById('gridSupervisao');
        grid.innerHTML = listaTanques.map(t => `
            <div class="card-tanque">
                <h3>${t.TANQUE_NAME}</h3>
                <p>${t.PRODUTO}</p>
                <input type="number" id="sup-val-${t.id}" value="${t.ESPAÇO_DISPONIVEL}" style="margin:10px 0; font-size:16px;">
                <button onclick="ajustarEstoque(${t.id})" class="btn-master" style="font-size:14px; padding:15px;">ATUALIZAR ESPAÇO</button>
            </div>
        `).join('');
    }

    async function ajustarEstoque(id) {
        const novoVal = document.getElementById(`sup-val-${id}`).value;
        setLoader(true);
        await fetch(`${API.URL}/ESTOQUE?id=eq.${id}`, {
            method: 'PATCH', headers: API.HEADERS, body: JSON.stringify({ ESPAÇO_DISPONIVEL: novoVal })
        });
        await carregarTudo();
        setLoader(false);
        alert("ESTOQUE ATUALIZADO!");
    }

    // --- CONTROLE DE ACESSO ---
    function acessoPainel(tipo) {
        const senha = prompt("DIGITE A SENHA DE ACESSO:");
        if(tipo === 'operador' && senha === 'raizen2026') {
            document.getElementById('secao-registro').style.display = 'none';
            document.getElementById('modulo-operador-full').style.display = 'block';
            carregarTudo();
        } else if(tipo === 'supervisao' && senha === 'master2026') {
            document.getElementById('secao-registro').style.display = 'none';
            document.getElementById('modulo-supervisao').style.display = 'block';
            carregarTudo();
        } else {
            alert("SENHA INCORRETA!");
        }
    }

    // --- REGISTRO DE ENTRADA ---
    document.getElementById('formRegistro').onsubmit = async e => {
        e.preventDefault();
        setLoader(true);
        const data = {
            PLACA: document.getElementById('placa').value,
            PRODUTO: document.getElementById('produto').value,
            TELEFONE: document.getElementById('whatsapp').value,
            ENTRADA: new Date().toLocaleString(),
            AGENDAMENTO: document.getElementById('fim_jornada').value || new Date().toISOString(),
            JORNADA: document.getElementById('check24h').checked ? "LIBERADO" : "LIMITE"
        };

        const res = await fetch(`${API.URL}/registros`, {
            method: 'POST', headers: API.HEADERS, body: JSON.stringify(data)
        });

        if(res.ok) {
            alert("MOTORISTA REGISTRADO COM SUCESSO!");
            location.reload();
        }
        setLoader(false);
    };

    function abrirReabertura() {
        const placa = prompt("DIGITE A PLACA PARA REABRIR JORNADA:");
        if(placa) alert("Buscando placa " + placa + " no sistema...");
    }
</script>
</body>
</html>
