<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO OPERACIONAL V22.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-alerta: #e11d48;
            --cor-sucesso: #10b981;
            --cor-texto: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }

        body { 
            background-color: var(--fundo-base); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            color: var(--cor-texto);
            padding-bottom: 100px;
        }

        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 40px 15px; 
            text-align: center; 
            border-bottom: 15px solid var(--roxo-raizen);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .logo-raizen-master {
            color: var(--branco);
            font-size: 45px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .card-industrial { 
            width: 95%; 
            max-width: 800px; 
            margin: 30px auto; 
            background: var(--branco); 
            padding: 40px; 
            border-radius: 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            border-left: 20px solid var(--roxo-raizen);
        }

        #secao-operador { 
            display: none; 
            width: 98%; 
            margin: 20px auto;
            background: var(--branco);
            padding: 20px;
            border-radius: 30px;
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            font-size: 24px;
        }

        /* --- CONTROLE DE TABELA SEM ROLAGEM --- */
        .moldura-tabela { 
            overflow-x: hidden; /* Proíbe a rolagem lateral */
            border: 2px solid #e2e8f0;
            border-radius: 20px;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; } /* Largura fixa para caber na tela */
        
        th { 
            background: #0f172a; 
            color: #ffffff; 
            padding: 10px 2px; 
            font-size: 9px; 
            text-transform: uppercase;
        }

        td { 
            padding: 12px 2px; 
            border-bottom: 2px solid #f1f5f9; 
            text-align: center; 
            font-weight: 800; 
            font-size: 11px; 
            word-wrap: break-word; /* Força o texto a quebrar para baixo */
        }

        /* Estilização dos Produtos e Agendamento */
        .tag-prod {
            padding: 4px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 900;
            display: block;
            margin: 2px;
        }
        .tag-gasosa { background: #ff8c00; color: #fff; } 
        .tag-b100 { background: #5d4037; color: #fff; } 
        .tag-anidro { background: #0056b3; color: #fff; } 
        .tag-hidratado { border: 1px solid #0056b3; color: #0056b3; } 
        .tag-s10 { border: 1px solid #5d4037; color: #5d4037; } 

        .box-semaforo {
            padding: 4px;
            border-radius: 6px;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }
        .semaforo-verde { background: #dcfce7; color: #166534; }
        .semaforo-vermelho { background: #fee2e2; color: #991b1b; }
        .led { width: 8px; height: 8px; border-radius: 50%; }
        .led-g { background: #10b981; }
        .led-r { background: #ef4444; }

        .btn-acao { 
            width: 100%; 
            padding: 10px 2px; 
            border-radius: 8px; 
            border: none; 
            color: white; 
            font-weight: 900; 
            font-size: 9px; 
            margin-bottom: 4px;
            cursor: pointer;
        }

        /* Inputs do Formulário */
        input, select { width: 100%; padding: 18px; border-radius: 20px; border: 3px solid #ddd; margin-bottom: 20px; font-size: 18px; }
        .btn-principal { width: 100%; padding: 25px; background: var(--roxo-raizen); color: white; border: none; border-radius: 25px; font-weight: 900; font-size: 22px; }

        /* Estilo do Agendamento (Coleta) */
        .col-agenda { background: #fffde7; color: #d97706; font-size: 10px; font-weight: 900; }

    </style>
</head>
<body>

<header>
    <div class="logo-raizen-master">RAÍZEN</div>
</header>

<div class="card-industrial" id="modulo-entrada">
    <h2>REGISTRO DE ENTRADA</h2>
    <form id="formDescarga">
        <input type="text" id="campo_placa" placeholder="PLACA DO VEÍCULO" required>
        <select id="campo_produto" required>
            <option value="">SELECIONE O PRODUTO</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
            <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
            <option value="DIESEL S10">DIESEL S10</option>
        </select>
        <input type="tel" id="campo_whatsapp" placeholder="WHATSAPP DO MOTORISTA" required>
        <label style="font-size: 12px; font-weight: 900; color: var(--verde-raizen);">TÉRMINO DA JORNADA:</label>
        <input type="time" id="campo_hora_limite">
        <button type="submit" class="btn-principal">EFETUAR REGISTRO</button>
    </form>
    <button onclick="acessoOperador()" style="margin-top:20px; background:none; border:none; color:var(--roxo-raizen); text-decoration:underline; width:100%; font-weight:900;">MÓDULO OPERADOR (PAINEL ADM)</button>
</div>

<div id="secao-operador">
    <h2>PAINEL DE DECISÃO - ÁREA 02</h2>
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th style="width: 18%;">PLACA</th>
                    <th style="width: 20%;">PRODUTO</th>
                    <th style="width: 17%;">COLETA</th>
                    <th style="width: 20%;">JORNADA</th>
                    <th style="width: 25%;">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="dadosFila"></tbody>
        </table>
    </div>
    <button class="btn-principal" style="margin-top:30px; background:#475569;" onclick="location.reload()">VOLTAR</button>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const SENHA_OP = 'raizen2026';

    function gerarSemaforo(valor) {
        if(!valor || valor === "24 HORAS") return `<div class="box-semaforo semaforo-vermelho"><span class="led led-r"></span> 24H</div>`;
        const agora = new Date();
        const t = valor.split(':');
        const limite = new Date(); limite.setHours(t[0], t[1], 0);
        const exp = agora > limite;
        return `<div class="box-semaforo ${exp?'semaforo-vermelho':'semaforo-verde'}"><span class="led ${exp?'led-r':'led-g'}"></span> ${valor}</div>`;
    }

    async function sincronizarFila() {
        const corpo = document.getElementById('dadosFila');
        corpo.innerHTML = "<tr><td colspan='5'>CARREGANDO...</td></tr>";
        const res = await fetch(API_URL + "?t=" + Date.now());
        const json = await res.json();
        const ativos = json.filter(x => x.PLACA && !x.SAIDA);
        
        // Ordenação por Agendamento
        ativos.sort((a, b) => (a['AGENDAMENTO NO COLETA'] || '99:99').localeCompare(b['AGENDAMENTO NO COLETA'] || '99:99'));

        corpo.innerHTML = "";
        ativos.forEach(item => {
            const tr = document.createElement('tr');
            const classeProd = "tag-" + item.PRODUTO.split(' ')[0].toLowerCase();
            
            // Formatando o Agendamento para aparecer apenas a Hora no celular
            let agendaHora = item['AGENDAMENTO NO COLETA'] ? item['AGENDAMENTO NO COLETA'].split('T')[1] || item['AGENDAMENTO NO COLETA'] : 'S/AG';

            tr.innerHTML = `
                <td style="color:var(--roxo-raizen); font-size:13px;">${item.PLACA}</td>
                <td><span class="tag-prod ${classeProd}">${item.PRODUTO}</span></td>
                <td class="col-agenda">${agendaHora}</td>
                <td>${gerarSemaforo(item.JORNADA)}</td>
                <td>
                    <button class="btn-acao" style="background:#22c55e;" onclick="window.open('https://api.whatsapp.com/send?phone=55${item.TELEFONE.replace(/\D/g,'')}&text=Motorista ${item.PLACA}, favor encostar para descarga.')">ZAP</button>
                    <button class="btn-acao" style="background:#3b82f6;" onclick="finalizar('${item.PLACA}')">FIM</button>
                </td>
            `;
            corpo.appendChild(tr);
        });
    }

    async function finalizar(placa) {
        if(confirm(`FINALIZAR ${placa}?`)) {
            await fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({"SAIDA": new Date().toLocaleString()}) });
            sincronizarFila();
        }
    }

    document.getElementById('formDescarga').onsubmit = async e => {
        e.preventDefault();
        const dados = {
            "PLACA": document.getElementById('campo_placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('campo_produto').value,
            "TELEFONE": document.getElementById('campo_whatsapp').value,
            "JORNADA": document.getElementById('campo_hora_limite').value || "24 HORAS",
            "ENTRADA": new Date().toLocaleString(),
            "SAIDA": ""
        };
        await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) });
        alert("REGISTRADO NO PÁTIO!");
        location.reload();
    };

    function acessoOperador() {
        if(prompt("SENHA OPERACIONAL:") === SENHA_OP) {
            document.getElementById('modulo-entrada').style.display = 'none';
            document.getElementById('secao-operador').style.display = 'block';
            sincronizarFila();
        }
    }
</script>
</body>
</html>
