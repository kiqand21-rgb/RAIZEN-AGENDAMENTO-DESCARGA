<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>RAÍZEN - GESTÃO OPERACIONAL V26.9</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM INDUSTRIAL RAÍZEN (MANTIDO) --- */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-erro: #e11d48;
            --cor-sucesso: #10b981;
            --sombra-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background-color: var(--fundo-base); 
            color: #1e293b; 
            min-height: 100vh; 
            padding-bottom: 80px;
        }

        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 60px 20px; 
            text-align: center; 
            border-bottom: 15px solid var(--roxo-raizen);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .logo-display {
            color: var(--branco); 
            font-size: 50px; 
            font-weight: 900;
            letter-spacing: 10px; 
            text-transform: uppercase;
        }

        .card-master { 
            width: 94%; 
            max-width: 800px; 
            margin: -30px auto 40px; 
            background: var(--branco); 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: var(--sombra-premium); 
            border-left: 15px solid var(--roxo-raizen);
            position: relative;
            z-index: 10;
        }

        #modulo-operador-full { 
            display: none; 
            width: 95%; 
            max-width: 1400px; 
            margin: 20px auto;
            background: var(--branco); 
            padding: 20px; 
            border-radius: 20px;
            box-shadow: var(--sombra-premium); 
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            font-size: 24px; 
        }

        /* --- INPUTS --- */
        .wrapper-input { margin-bottom: 20px; }
        label { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-weight: 700; color: var(--verde-raizen); font-size: 14px; }
        input, select { 
            width: 100%; padding: 15px; border: 2px solid #f1f5f9; border-radius: 12px; 
            font-size: 16px; font-weight: 600; background: #f8fafc; 
        }

        /* --- BOTÕES --- */
        .btn-master { 
            width: 100%; padding: 20px; background: var(--roxo-raizen); 
            color: white; border: none; border-radius: 15px; 
            font-size: 18px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; margin-bottom: 15px;
            box-shadow: 0 6px 0 #5e1659;
        }
        .btn-master:active { transform: translateY(3px); box-shadow: 0 2px 0 #5e1659; }

        /* --- MÓDULO OPERACIONAL RESPONSIVO --- */
        .moldura-tabela { overflow-x: auto; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #1e293b; color: white; padding: 15px; font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-weight: 600; }

        /* Estilo para edição na tabela */
        .input-edit-table {
            padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; width: 100%; text-align: center;
        }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            .logo-display { font-size: 30px; letter-spacing: 5px; }
            header { padding: 40px 10px; }
            
            /* Transforma tabela em Cards no Mobile */
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 2px solid var(--roxo-raizen); border-radius: 15px; margin-bottom: 20px; padding: 10px; background: #fff; }
            td { border: none; position: relative; padding-left: 50%; text-align: right; font-size: 14px; border-bottom: 1px solid #f1f1f1; }
            td:before { position: absolute; left: 10px; width: 45%; padding-right: 10px; white-space: nowrap; content: attr(data-label); font-weight: 900; color: var(--verde-raizen); text-align: left; }
            td:last-child { border-bottom: 0; }
        }

        #loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
        }
        .raizen-spinner { width: 60px; height: 60px; border: 8px solid #f3f3f3; border-top: 8px solid var(--roxo-raizen); border-radius: 50%; animation: girar 1s linear infinite; }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader-overlay"><div class="raizen-spinner"></div><h2>SINCRONIZANDO...</h2></div>

<header><div class="logo-display">RAÍZEN</div></header>

<div class="card-master" id="secao-entrada">
    <div id="form-principal-wrapper">
        <h2><i class="fa-solid fa-truck-ramp-box"></i> ENTRADA</h2>
        <form id="formMaster">
            <div class="wrapper-input">
                <label><i class="fa-solid fa-barcode"></i> PLACA</label>
                <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
            </div>
            <div class="wrapper-input">
                <label><i class="fa-solid fa-gas-pump"></i> PRODUTO</label>
                <select id="produto" required>
                    <option value="">-- SELECIONE --</option>
                    <option value="GASOLINA">GASOLINA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>
            <div class="wrapper-input">
                <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP</label>
                <input type="tel" id="whatsapp" placeholder="(19) 99999-9999" required>
            </div>
            
            <div style="background: #fffbeb; padding: 15px; border-radius: 15px; border: 2px dashed var(--ouro-raizen); margin-bottom: 20px;">
                <div id="area-tempo">
                    <label>HORA LIMITE</label>
                    <input type="time" id="limite"> 
                </div>
                <label style="margin-top:10px; font-size: 13px; color: var(--roxo-raizen);">
                    <input type="checkbox" id="jornada24"> JORNADA 24 HORAS
                </label>
            </div>

            <button type="submit" class="btn-master">CONFIRMAR</button>
        </form>
    </div>

    <div style="text-align:center; margin-top:20px;">
        <button onclick="ativarOperador()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer;">
            <i class="fa-solid fa-lock"></i> PAINEL OPERADOR
        </button>
    </div>
</div>

<div id="modulo-operador-full">
    <h2>CONTROLE DE PÁTIO</h2>
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th>STATUS</th>
                    <th>TELEFONE</th>
                    <th>AGENDAMENTO</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="listaFila"></tbody>
        </table>
    </div>
    <button class="btn-master" style="margin-top:20px; background:#1e293b;" onclick="location.reload()">VOLTAR</button>
</div>

<script>
    const RAÍZEN_DB = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co',
        KEY: 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X',
        HEADERS: { 
            "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', 
            "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, 
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
        }
    };

    function setLoader(v) { document.getElementById('loader-overlay').style.display = v ? 'flex' : 'none'; }

    // Máscaras (MANTIDAS)
    document.getElementById('whatsapp').oninput = function(e) {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    };

    async function ativarOperador() {
        if(prompt("SENHA:") === "raizen2026") {
            document.getElementById('secao-entrada').style.display = 'none';
            document.getElementById('modulo-operador-full').style.display = 'block';
            carregarDados();
        }
    }

    async function carregarDados() {
        try {
            const res = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?SAIDA=is.null&select=*`, { headers: RAÍZEN_DB.HEADERS });
            const dados = await res.json();
            renderTabela(dados);
        } catch(e) { console.error(e); }
    }

    function renderTabela(lista) {
        const corpo = document.getElementById('listaFila');
        corpo.innerHTML = "";
        lista.forEach(item => {
            corpo.innerHTML += `
                <tr>
                    <td data-label="VEÍCULO" style="color:var(--roxo-raizen); font-weight:900;">${item.PLACA}</td>
                    <td data-label="PRODUTO">${item.PRODUTO}</td>
                    <td data-label="STATUS">${item.JORNADA}</td>
                    <td data-label="TELEFONE">
                        <input type="text" value="${item.TELEFONE}" class="input-edit-table" onchange="atualizarCampo('${item.ID}', 'TELEFONE', this.value)">
                    </td>
                    <td data-label="AGENDAMENTO">
                        <input type="datetime-local" value="${item.AGENDAMENTO ? item.AGENDAMENTO.slice(0,16) : ''}" class="input-edit-table" onchange="atualizarCampo('${item.ID}', 'AGENDAMENTO', this.value)">
                    </td>
                    <td data-label="AÇÕES">
                        <button onclick="chamarWhatsApp('${item.TELEFONE}')" style="background:#25d366; color:white; border:none; padding:8px; border-radius:8px; margin-bottom:5px; width:100%;">ZAP</button>
                        <button onclick="finalizar('${item.ID}')" style="background:var(--cor-erro); color:white; border:none; padding:8px; border-radius:8px; width:100%;">SAÍDA</button>
                    </td>
                </tr>`;
        });
    }

    async function atualizarCampo(id, campo, valor) {
        setLoader(true);
        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${id}`, {
                method: 'PATCH', headers: RAÍZEN_DB.HEADERS,
                body: JSON.stringify({ [campo]: valor })
            });
        } finally { setLoader(false); }
    }

    async function finalizar(id) {
        if(!confirm("CONFIRMAR SAÍDA?")) return;
        setLoader(true);
        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?ID=eq.${id}`, {
                method: 'PATCH', headers: RAÍZEN_DB.HEADERS,
                body: JSON.stringify({ "SAIDA": new Date().toLocaleString('pt-BR') })
            });
            carregarDados();
        } finally { setLoader(false); }
    }

    function chamarWhatsApp(tel) {
        const baia = prompt("Informe a BAIA:");
        if(!baia) return;
        const msg = encodeURIComponent(`Motorista, vamos descarregar na Baia ${baia}. Aguarde instrução.`);
        window.open(`https://wa.me/55${tel.replace(/\D/g, "")}?text=${msg}`, '_blank');
    }

    document.getElementById('formMaster').onsubmit = async e => {
        e.preventDefault();
        setLoader(true);
        const data = {
            "PLACA": document.getElementById('placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('whatsapp').value,
            "JORNADA": document.getElementById('jornada24').checked ? "24 HORAS" : document.getElementById('limite').value,
            "ENTRADA": new Date().toLocaleString('pt-BR')
        };
        try {
            await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros`, { method: 'POST', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify(data) });
            alert("SUCESSO!"); location.reload();
        } finally { setLoader(false); }
    };
</script>
</body>
</html>
