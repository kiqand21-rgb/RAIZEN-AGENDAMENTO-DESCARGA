<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - CONTROLE DE PÁTIO ÁREA 2 - TERMINAL PAULÍNIA</title>
    
    <style>
        /* ==========================================================================
           ESTILO COMPLETO E ROBUSTO - IDENTIDADE VISUAL RAÍZEN
           ========================================================================== 
        */
        :root {
            --verde-raizen: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo: #f0f2f5;
            --branco: #ffffff;
            --perigo: #dc3545;
            --sucesso: #28a745;
            --info: #007bff;
            --sombra: 0 15px 35px rgba(0,0,0,0.2);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--fundo); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        header { 
            background-color: var(--verde-raizen); 
            width: 100%; 
            padding: 40px 0; 
            text-align: center; 
            border-bottom: 10px solid var(--amarelo-raizen); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        header h1 { color: var(--branco); margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        
        .container { 
            width: 92%; 
            max-width: 750px; 
            margin: 40px auto; 
            background: var(--branco); 
            padding: 50px; 
            border-radius: 35px; 
            box-shadow: var(--sombra); 
        }

        /* PAINEL ADMINISTRATIVO EXTRA LARGO */
        #admin-panel { 
            display: none; 
            max-width: 98%; 
            width: 1700px; 
        }

        h2 { color: var(--verde-raizen); text-align: center; border-bottom: 4px solid var(--amarelo-raizen); padding-bottom: 20px; margin-bottom: 35px; text-transform: uppercase; }
        
        label { display: block; margin-top: 25px; font-weight: bold; color: #333; font-size: 17px; }

        input, select { 
            width: 100%; 
            padding: 20px; 
            margin-top: 10px; 
            border: 2px solid #ddd; 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-size: 18px; 
            color: #333;
            transition: 0.3s;
        }
        input:focus { border-color: var(--verde-raizen); outline: none; }

        /* DASHBOARD DE RESUMO */
        .dashboard-cards {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            flex: 1;
            text-align: center;
            border-bottom: 6px solid var(--amarelo-raizen);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .card span { display: block; font-size: 30px; font-weight: 900; color: var(--verde-raizen); }
        .card small { font-weight: bold; color: #666; text-transform: uppercase; font-size: 12px; }

        /* BUSCA DE PLACA */
        .busca-container {
            background: #e9ecef;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 25px;
            border: 1px solid #ced4da;
        }
        .busca-container label { margin-top: 0; min-width: 150px; color: var(--verde-raizen); font-size: 18px; }
        .busca-container input { margin-top: 0; background: white; border: 2px solid var(--verde-raizen); font-weight: bold; }

        /* TABELA E LÓGICA DE AGENDAMENTO */
        .tabela-wrapper { overflow-x: auto; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1200px; }
        th { background: var(--verde-raizen); color: white; padding: 25px; text-align: center; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 20px; border-bottom: 1px solid #eee; text-align: center; font-size: 16px; font-weight: 700; }
        
        /* STATUS DE PRODUTO */
        .badge-produto { padding: 8px 12px; border-radius: 8px; font-size: 12px; color: white; text-transform: uppercase; min-width: 100px; display: inline-block; }
        .bg-gasolina { background: #ffc107; color: #000; }
        .bg-b100 { background: #343a40; }
        .bg-etanol { background: #28a745; }
        .bg-s10 { background: #6c757d; }

        /* STATUS DE AGENDAMENTO (SUMIR PENDENTE) */
        .status-pendente { 
            color: white; background: var(--perigo); padding: 12px 20px; border-radius: 10px; font-weight: 800; display: inline-block; animation: piscar 1.5s infinite;
        }
        .status-agendado { 
            color: #155724; background: #d4edda; padding: 15px; border-radius: 12px; border: 2px solid #c3e6cb; display: block; font-weight: 900; font-size: 14px;
        }

        @keyframes piscar { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* BOTÕES DE AÇÃO */
        .btn-acao { 
            border: none; border-radius: 10px; padding: 12px; font-weight: bold; cursor: pointer; font-size: 11px; width: 100%; margin-bottom: 8px; color: white; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-agenda { background: white; color: var(--info); border: 2px solid var(--info); }
        .btn-zap { background: #25D366; }
        .btn-ok { background: var(--info); }

        .btn-enviar { 
            width: 100%; padding: 25px; background-color: var(--verde-raizen); color: white; border: none; border-radius: 20px; font-size: 24px; font-weight: bold; cursor: pointer; margin-top: 40px; transition: 0.3s;
        }
        .btn-enviar:hover { background-color: #3d584a; transform: scale(1.01); }

        /* MODAL */
        #modalColeta { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .modal-content { background:white; margin:6% auto; padding:50px; border-radius:40px; width:480px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="container" id="tela-motorista">
    <h2>REGISTRO DE ENTRADA - ÁREA 2</h2>
    <form id="formRegistroPrincipal">
        <label>Placa do Veículo</label>
        <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>
        
        <label>Produto para Descarga</label>
        <select id="produto" required>
            <option value="">Selecione o produto...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="S10">S10</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>

        <label>WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(19) 99999-9999" maxlength="15" required>

        <div style="background:#f9f9f9; padding:30px; border-radius:20px; border:1px solid #ddd; margin-top:30px;">
            <div id="campoHora">
                <label style="margin-top: 0;">Fim da Jornada:</label>
                <input type="time" id="horaJornada" required>
            </div>
            <label style="display:flex; align-items:center; gap:12px; margin-top:20px; cursor:pointer;">
                <input type="checkbox" id="check24h" style="width:25px; height:25px;" onchange="alternarJornada()">
                <span style="font-weight:bold; color:var(--verde-raizen);">Jornada 24 Horas</span>
            </label>
        </div>

        <button type="submit" class="btn-enviar" id="btnSalvar">REGISTRAR ENTRADA</button>
    </form>
    <div style="text-align:center; margin-top:30px;">
        <button onclick="abrirAdmin()" style="background:none; border:none; color:#ccc; text-decoration:underline; cursor:pointer;">Painel Administrativo</button>
    </div>
</div>

<div class="container" id="admin-panel">
    <h2>CONTROLE DE PÁTIO EM TEMPO REAL</h2>
    
    <div class="dashboard-cards">
        <div class="card"><span id="total_patio">0</span><small>Veículos</small></div>
        <div class="card"><span id="total_agendados" style="color:var(--sucesso)">0</span><small>Agendados</small></div>
        <div class="card"><span id="total_pendentes" style="color:var(--perigo)">0</span><small>Pendentes</small></div>
    </div>

    <div class="busca-container">
        <label>🔎 <strong>FILTRAR PLACA:</strong></label>
        <input type="text" id="inputBusca" placeholder="Busque por placa..." onkeyup="filtrarTabelaAdmin()">
    </div>

    <div class="tabela-wrapper">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Produto</th>
                    <th>WhatsApp</th>
                    <th>Jornada</th>
                    <th style="background:#2d4a3e; color:white; width: 230px;">AGENDAMENTO DE COLETAS</th>
                    <th>Tempo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-enviar" style="background:#555;" onclick="window.location.reload()">SAIR</button>
</div>

<div id="modalColeta">
    <div class="modal-content">
        <h3 style="margin-top:0">Agendar Descarga</h3>
        <p id="mostraPlaca" style="font-weight:bold; font-size:26px; color:var(--verde-raizen); margin-bottom:30px;"></p>
        <input type="hidden" id="placaAlvo">
        
        <label>Data:</label><input type="date" id="dataColeta">
        <label>Hora:</label><input type="time" id="horaColeta">
        
        <button class="btn-enviar" id="btnConfirmar" onclick="salvarColetaNaPlanilha()">GRAVAR AGENDAMENTO</button>
        <button onclick="fecharModal()" style="margin-top:25px; border:none; background:none; color:red; font-weight:bold; cursor:pointer;">CANCELAR</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    function alternarJornada() {
        const check = document.getElementById('check24h').checked;
        document.getElementById('campoHora').style.display = check ? 'none' : 'block';
        document.getElementById('horaJornada').required = !check;
    }

    // MÁSCARAS
    document.getElementById('telefone').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    });
    document.getElementById('placa').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    // BUSCA DE PLACA
    function filtrarTabelaAdmin() {
        const filtro = document.getElementById("inputBusca").value.toUpperCase();
        const trs = document.querySelectorAll("#tabelaDados tbody tr");
        trs.forEach(tr => {
            const placaTd = tr.getElementsByTagName("td")[0];
            if (placaTd) {
                tr.style.display = placaTd.textContent.toUpperCase().indexOf(filtro) > -1 ? "" : "none";
            }
        });
    }

    // CARREGAR TABELA COM LÓGICA DE AGENDAMENTO E PRODUTO
    function atualizarPainel() {
        const tbody = document.querySelector('#tabelaDados tbody');
        tbody.innerHTML = "<tr><td colspan='7'>Conectando ao sistema Raízen...</td></tr>";

        fetch(API_URL + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            const ativos = data.filter(i => i.PLACA && !i.SAIDA);
            
            // FILA: AGENDADOS SOBEM NA LISTA
            ativos.sort((a, b) => {
                const aAg = (a.COLETA && a.COLETA.trim() !== "" && a.COLETA !== "undefined") ? 0 : 1;
                const bAg = (b.COLETA && b.COLETA.trim() !== "" && b.COLETA !== "undefined") ? 0 : 1;
                return aAg - bAg;
            });

            tbody.innerHTML = "";
            let cAg = 0; let cPen = 0;

            ativos.forEach(i => {
                const isAgendado = i.COLETA && i.COLETA.trim() !== "" && i.COLETA !== "undefined";
                isAgendado ? cAg++ : cPen++;

                // LÓGICA DE COR POR PRODUTO
                let classeProduto = "bg-s10";
                if(i.PRODUTO.includes("GASOLINA")) classeProduto = "bg-gasolina";
                if(i.PRODUTO.includes("B100")) classeProduto = "bg-b100";
                if(i.PRODUTO.includes("HIDRATADO") || i.PRODUTO.includes("ANIDRO")) classeProduto = "bg-etanol";

                tbody.innerHTML += `
                    <tr>
                        <td style="font-size:18px;">${i.PLACA}</td>
                        <td><span class="badge-produto ${classeProduto}">${i.PRODUTO}</span></td>
                        <td>${i.TELEFONE}</td>
                        <td>${formatJornada(i.JORNADA)}</td>
                        <td style="background:#fcfcfc">
                            ${isAgendado 
                                ? `<span class="status-agendado">${i.COLETA}</span>` 
                                : `<span class="status-pendente">⚠️ PENDENTE</span>`}
                        </td>
                        <td style="color:#888; font-size:12px;">${calcTempo(i.ENTRADA)}</td>
                        <td>
                            <button class="btn-acao btn-agenda" onclick="abrirModal('${i.PLACA}')">📅 AGENDAR</button>
                            <button class="btn-acao btn-zap" onclick="chamarZap('${i.TELEFONE}', '${i.PLACA}', '${i.COLETA}')">📱 CHAMAR</button>
                            <button class="btn-acao btn-ok" onclick="finalizar('${i.PLACA}')">✅ CONCLUIR</button>
                        </td>
                    </tr>`;
            });
            document.getElementById('total_patio').innerText = ativos.length;
            document.getElementById('total_agendados').innerText = cAg;
            document.getElementById('total_pendentes').innerText = cPen;
        });
    }

    function formatJornada(fim) {
        if (fim === "24 Horas") return '<span style="color:green">24H</span>';
        const [h, m] = fim.split(':');
        const d = new Date(); d.setHours(h, m, 0);
        return (d < new Date()) ? `<span style="color:red">VENCIDA</span>` : `<span style="color:green">OK</span>`;
    }

    function calcTempo(ent) {
        if(!ent) return "0m";
        const p = ent.split(', '); const d = p[0].split('/'); const h = p[1].split(':');
        const dt = new Date(d[2], d[1]-1, d[0], h[0], h[1]);
        const diff = Math.floor((new Date() - dt) / 60000);
        return diff > 60 ? Math.floor(diff/60) + "h " + (diff%60) + "m" : diff + " min";
    }

    // MODAL
    function abrirModal(placa) {
        document.getElementById('placaAlvo').value = placa;
        document.getElementById('mostraPlaca').innerText = "VEÍCULO: " + placa;
        document.getElementById('modalColeta').style.display = 'block';
    }
    function fecharModal() { document.getElementById('modalColeta').style.display = 'none'; }

    function salvarColetaNaPlanilha() {
        const placa = document.getElementById('placaAlvo').value;
        const d = document.getElementById('dataColeta').value.split('-').reverse().join('/');
        const h = document.getElementById('horaColeta').value;
        if(!d || !h || d === "") return alert("Preencha todos os campos!");

        const btn = document.getElementById('btnConfirmar');
        btn.innerText = "GRAVANDO...";

        fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ "COLETA": d + " às " + h })
        }).then(() => {
            fecharModal();
            atualizarPainel();
            btn.innerText = "GRAVAR AGENDAMENTO";
        });
    }

    // ENVIO DO MOTORISTA (COM CORREÇÃO PARA SUBIR)
    document.getElementById('formRegistroPrincipal').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSalvar');
        btn.innerText = "SALVANDO...";

        const dadosParaEnviar = {
            "PLACA": document.getElementById('placa').value,
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('telefone').value,
            "JORNADA": document.getElementById('check24h').checked ? "24 Horas" : document.getElementById('horaJornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "COLETA": "", 
            "SAIDA": ""
        };

        // Envio no formato de Array para o SheetDB
        fetch(API_URL, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify([dadosParaEnviar]) 
        })
        .then(response => {
            if(response.ok) {
                alert("REGISTRO REALIZADO COM SUCESSO!");
                location.reload();
            } else {
                alert("Erro ao salvar dados.");
                btn.innerText = "REGISTRAR ENTRADA";
            }
        });
    });

    function abrirAdmin() { if (prompt("Senha Raízen:") === "raizen2026") { document.getElementById('tela-motorista').style.display='none'; document.getElementById('admin-panel').style.display='block'; atualizarPainel(); } }
    
    function finalizar(placa) { 
        if(confirm("Deseja concluir a descarga?")) {
            fetch(`${API_URL}/PLACA/${placa}`, { 
                method: 'PATCH', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ "SAIDA": new Date().toLocaleString() }) 
            }).then(() => atualizarPainel());
        }
    }

    function chamarZap(tel, placa, coleta) {
        const baia = prompt("Informe a BAIA:");
        if(baia) {
            const m = `*RAÍZEN - ÁREA 2*%0APLACA: *${placa}*%0ACOLETA: *${coleta || 'Pendente'}*%0ABAIA: *${baia}*%0A%0AFavor entrar para descarga.`;
            window.open(`https://web.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${m}`);
        }
    }
</script>
</body>
</html>
