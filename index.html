<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO OPERACIONAL V22.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-alerta: #e11d48;
            --cor-sucesso: #10b981;
            --cor-texto: #1e293b;
            --verde-botao-reabrir: #3d5446; 
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }

        body { 
            background-color: var(--fundo-base); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            color: var(--cor-texto);
            padding-bottom: 100px;
        }

        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 90px 20px; 
            text-align: center; 
            border-bottom: 25px solid var(--roxo-raizen);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .logo-raizen-master {
            color: var(--branco);
            font-size: 85px;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }

        header h1 { 
            color: var(--branco); 
            font-size: 24px; 
            letter-spacing: 6px; 
            font-weight: 300;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .card-industrial { 
            width: 94%; 
            max-width: 1100px; 
            margin: 60px auto; 
            background: var(--branco); 
            padding: 70px; 
            border-radius: 60px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.2); 
            border-left: 35px solid var(--roxo-raizen);
            position: relative;
        }

        #secao-operador { 
            display: none; 
            width: 100%; 
            max-width: 100%; 
            margin: 0 auto;
            background: var(--branco);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.2);
            zoom: 0.8;
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 50px; 
            font-size: 38px;
            border-bottom: 12px solid #f1f5f9;
            padding-bottom: 30px;
        }

        .wrapper-campo { margin-bottom: 40px; position: relative; }
        label { 
            display: flex; align-items: center; gap: 12px; margin-bottom: 15px; 
            font-weight: 900; color: var(--verde-raizen); font-size: 16px; text-transform: uppercase;
        }

        input, select { 
            width: 100%; padding: 28px; border: 5px solid #e2e8f0; border-radius: 30px; 
            font-size: 24px; font-weight: 700; background: #f8fafc; color: #334155;
        }

        .container-jornada-exp {
            background: #fffbeb; padding: 50px; border-radius: 50px;
            border: 6px solid var(--ouro-raizen); margin: 40px 0;
        }

        .check-box-24h {
            display: flex; align-items: center; gap: 25px; cursor: pointer;
            background: #ffffff; padding: 25px; border-radius: 30px; border: 3px solid #fde68a;
        }

        .check-box-24h input { width: 45px; height: 45px; accent-color: var(--cor-alerta); }
        .txt-check { font-weight: 900; color: var(--cor-alerta); font-size: 22px; }

        .btn-principal { 
            width: 100%; padding: 30px; background: var(--roxo-raizen); color: white; border: none; 
            border-radius: 25px; font-size: 24px; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        /* --- FILTROS E TABELA --- */
        .filtros-container {
            display: flex; gap: 10px; justify-content: center; margin-bottom: 30px;
            background: #f8fafc; padding: 20px; border-radius: 20px;
        }

        .btn-filtro {
            padding: 12px 25px; border: none; border-radius: 12px; cursor: pointer;
            font-weight: 900; background: #cbd5e1; color: #475569; transition: 0.3s;
        }

        .btn-filtro.ativo { background: var(--roxo-raizen); color: white; }

        .moldura-tabela { overflow-x: auto; border-radius: 20px; border: 2px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1250px; }
        th { background: #0f172a; color: #ffffff; padding: 20px; font-size: 13px; text-transform: uppercase; }
        td { padding: 20px; border-bottom: 4px solid #f1f5f9; text-align: center; font-weight: 800; font-size: 16px; }

        .tag-prod { padding: 10px; border-radius: 12px; font-size: 12px; font-weight: 900; display: block; text-transform: uppercase; }
        .tag-gasosa { background: #ff8c00; color: #fff; } 
        .tag-b100 { background: #5d4037; color: #fff; } 
        .tag-anidro { background: #0056b3; color: #fff; } 
        .tag-hidratado { background: #ffffff; color: #0056b3; border: 2px solid #0056b3; } 
        .tag-s10 { background: #ffffff; color: #5d4037; border: 2px solid #5d4037; } 

        .box-semaforo { padding: 10px; border-radius: 30px; font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .semaforo-verde { background: #dcfce7; color: #166534; border: 2px solid var(--cor-sucesso); }
        .semaforo-vermelho { background: #fee2e2; color: #991b1b; border: 2px solid var(--cor-alerta); }
        .circulo-led { width: 12px; height: 12px; border-radius: 50%; }
        .led-g { background: #10b981; }
        .led-r { background: #ef4444; }

        .btn-w-whatsapp { background: #22c55e; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; margin-bottom: 8px; font-weight: 900; }
        .btn-f-finalizar { background: #3b82f6; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: 900; }
        #status-atualizacao { text-align: center; font-size: 14px; color: #64748b; margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo-raizen-master">RAÍZEN</div>
    <h1>CONTROLE DE DESCARGAS | TERMINAL PAULÍNIA</h1>
</header>

<div class="card-industrial" id="modulo-entrada">
    <div id="container-registro">
        <h2><i class="fa-solid fa-file-signature"></i> REGISTRO DE ENTRADA</h2>
        <form id="formDescarga">
            <div class="wrapper-campo">
                <label><i class="fa-solid fa-truck-front"></i> PLACA DO VEÍCULO</label>
                <input type="text" id="campo_placa" placeholder="ABC-1234" maxlength="8" required>
            </div>
            <div class="wrapper-campo">
                <label><i class="fa-solid fa-droplet"></i> PRODUTO CARREGADO</label>
                <select id="campo_produto" required>
                    <option value="">-- SELECIONE O PRODUTO --</option>
                    <option value="GASOLINA COMUM / ADITIVADA">GASOLINA COMUM / ADITIVADA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>
            <div class="wrapper-campo">
                <label><i class="fa-brands fa-whatsapp"></i> NÚMERO DO WHATSAPP</label>
                <input type="tel" id="campo_whatsapp" placeholder="(19) 99999-9999" maxlength="15" required>
            </div>
            <div class="container-jornada-exp">
                <div id="box-horario-input">
                    <label><i class="fa-solid fa-clock-rotate-left"></i> TÉRMINO DA JORNADA</label>
                    <input type="time" id="campo_hora_limite">
                </div>
                <label class="check-box-24h" style="margin-top:20px;">
                    <input type="checkbox" id="check_jornada_24h">
                    <span class="txt-check"><i class="fa-solid fa-triangle-exclamation"></i> ESTOU EM JORNADA 24 HORAS</span>
                </label>
            </div>
            <button type="submit" class="btn-principal" id="btn_registrar">EFETUAR REGISTRO NO PÁTIO</button>
            <button type="button" onclick="mudarParaReabrir()" class="btn-principal" style="background:#3d5446; margin-top:20px;">REABRIR JORNADA</button>
        </form>
    </div>

    <div id="container-reabrir" style="display:none;">
        <h2 style="color:#3d5446"><i class="fa-solid fa-clock"></i> REABRIR JORNADA</h2>
        <div class="wrapper-campo">
            <label>PLACA</label>
            <input type="text" id="reabrir_placa" placeholder="ABC-1234">
        </div>
        <div class="wrapper-campo">
            <label>NOVA HORA</label>
            <input type="time" id="reabrir_hora">
        </div>
        <button onclick="salvarReabertura()" class="btn-principal" style="background:#3d5446">ATUALIZAR</button>
        <button onclick="mudarParaNormal()" style="width:100%; margin-top:20px; background:none; border:none; text-decoration:underline; cursor:pointer;">VOLTAR</button>
    </div>

    <div style="text-align:center; margin-top:60px; border-top:4px dashed #ccc; padding-top:40px;">
        <button onclick="acessoOperador()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; font-size:18px; text-decoration:underline;">MÓDULO DO OPERADOR</button>
    </div>
</div>

<div id="secao-operador">
    <h2><i class="fa-solid fa-list-check"></i> FILA DE DESCARGA ATIVA</h2>

    <div class="filtros-container">
        <button class="btn-filtro ativo" onclick="filtrar('TODOS', this)">TODOS</button>
        <button class="btn-filtro" onclick="filtrar('GASOLINA', this)">GASOLINA</button>
        <button class="btn-filtro" onclick="filtrar('DIESEL', this)">DIESEL</button>
        <button class="btn-filtro" onclick="filtrar('ETANOL', this)">ETANOL</button>
    </div>

    <div id="status-atualizacao">Sincronizando...</div>
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>PLACA</th>
                    <th>PRODUTO</th>
                    <th>CONTATO</th>
                    <th>JORNADA</th>
                    <th>ENTRADA</th>
                    <th style="background:#fff9c4; color:#000;">AGENDAMENTO</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="dadosFila"></tbody>
        </table>
    </div>
    <button class="btn-principal" style="background:#475569; margin-top:30px;" onclick="location.reload()">SAIR</button>
</div>

<script>
    const SUPABASE_URL = 'https://rbbkjuiizmvatiawfzuv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X';
    const HEADERS = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" };
    const SENHA_OP = 'raizen2026';
    
    let dadosCache = [];
    let filtroAtual = 'TODOS';

    // --- MÁSCARAS E NAVEGAÇÃO ---
    function mudarParaReabrir() { document.getElementById('container-registro').style.display = 'none'; document.getElementById('container-reabrir').style.display = 'block'; }
    function mudarParaNormal() { document.getElementById('container-reabrir').style.display = 'none'; document.getElementById('container-registro').style.display = 'block'; }

    function aplicarMascaras() {
        document.getElementById('campo_placa').oninput = function() {
            let v = this.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
            if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
            this.value = v.substring(0,8);
        };
        document.getElementById('campo_whatsapp').oninput = e => {
            let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
        };
        document.getElementById('check_jornada_24h').onchange = function() {
            document.getElementById('box-horario-input').style.display = this.checked ? 'none' : 'block';
        };
    }
    aplicarMascaras();

    function gerarSemaforo(valor) {
        if(valor === "24 HORAS") return `<div class="box-semaforo semaforo-verde"><span class="circulo-led led-g"></span> 24H</div>`;
        const agora = new Date();
        const t = valor.split(':'); if(t.length < 2) return valor;
        const limite = new Date(); limite.setHours(t[0], t[1], 0);
        return (agora > limite) ? `<div class="box-semaforo semaforo-vermelho"><span class="circulo-led led-r"></span> ${valor}</div>` : `<div class="box-semaforo semaforo-verde"><span class="circulo-led led-g"></span> ${valor}</div>`;
    }

    // --- LÓGICA DE DADOS (SUPABASE) ---
    async function sincronizarFila() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/registros?SAIDA=is.null&select=*`, { headers: HEADERS });
            dadosCache = await res.json();
            renderizarTabela();
            document.getElementById('status-atualizacao').innerHTML = "Sincronizado: " + new Date().toLocaleTimeString();
        } catch (e) { console.error("Erro sincronização:", e); }
    }

    function renderizarTabela() {
        const corpo = document.getElementById('dadosFila');
        corpo.innerHTML = "";

        // ORDENAÇÃO CRÍTICA: AGENDADOS NO TOPO
        let ativos = [...dadosCache].sort((a, b) => {
            // Se o valor de AGENDAMENTO existir e não for vazio, gera o timestamp, senão Infinity (vai pro final)
            const timeA = (a.AGENDAMENTO && a.AGENDAMENTO !== "") ? new Date(a.AGENDAMENTO).getTime() : Infinity;
            const timeB = (b.AGENDAMENTO && b.AGENDAMENTO !== "") ? new Date(b.AGENDAMENTO).getTime() : Infinity;
            
            if (timeA !== timeB) return timeA - timeB; 
            // Se empatar (ou ambos sem agenda), ordena por quem chegou primeiro no pátio (created_at)
            return new Date(a.created_at) - new Date(b.created_at);
        });

        if (filtroAtual !== 'TODOS') {
            ativos = ativos.filter(x => x.PRODUTO.toUpperCase().includes(filtroAtual));
        }

        ativos.forEach(item => {
            let cl = item.PRODUTO.includes("GASOLINA") ? "tag-gasosa" : item.PRODUTO.includes("BIODIESEL") ? "tag-b100" : item.PRODUTO.includes("ANIDRO") ? "tag-anidro" : item.PRODUTO.includes("HIDRATADO") ? "tag-hidratado" : "tag-s10";
            
            const tr = document.createElement('tr');
            // Destaque visual se estiver agendado
            if(item.AGENDAMENTO) tr.style.backgroundColor = "#fff9c4"; 

            tr.innerHTML = `
                <td style="color:var(--roxo-raizen); font-size:22px;">${item.PLACA}</td>
                <td><span class="tag-prod ${cl}">${item.PRODUTO}</span></td>
                <td style="font-size:14px;">${item.TELEFONE}</td>
                <td>${gerarSemaforo(item.JORNADA)}</td>
                <td style="font-size:14px;">${item.ENTRADA}</td>
                <td style="background:#fffde7; border: 2px solid #ffd600;">
                    <input type="datetime-local" id="ag-${item.id}" value="${item.AGENDAMENTO || ''}" 
                           style="width:170px; font-size:12px; padding:8px; border-radius:8px; border:1px solid #ccc;">
                    <button onclick="salvarAgenda('${item.id}')" 
                            style="background:var(--verde-raizen); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:900; margin-top:5px; width:100%;">OK</button>
                </td>
                <td>
                    <button class="btn-w-whatsapp" onclick="chamarMotorista('${item.TELEFONE}','${item.PLACA}')">CONVOCAR</button>
                    <button class="btn-f-finalizar" onclick="finalizar('${item.id}')">FINALIZAR</button>
                </td>
            `;
            corpo.appendChild(tr);
        });
    }

    async function salvarAgenda(id) {
        const val = document.getElementById(`ag-${id}`).value;
        const res = await fetch(`${SUPABASE_URL}/rest/v1/registros?id=eq.${id}`, {
            method: 'PATCH',
            headers: HEADERS,
            body: JSON.stringify({ "AGENDAMENTO": val || null })
        });
        if(res.ok) {
            alert("AGENDAMENTO SALVO! REORGANIZANDO FILA...");
            await sincronizarFila(); // Recarrega e move para o topo
        }
    }

    function filtrar(tipo, btn) {
        filtroAtual = tipo;
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        renderizarTabela();
    }

    async function finalizar(id) {
        if(confirm("CONFIRMA A SAÍDA DO VEÍCULO?")) {
            await fetch(`${SUPABASE_URL}/rest/v1/registros?id=eq.${id}`, {
                method: 'PATCH',
                headers: HEADERS,
                body: JSON.stringify({ "SAIDA": new Date().toLocaleString('pt-BR') })
            });
            sincronizarFila();
        }
    }

    function acessoOperador() {
        if(prompt("DIGITE A SENHA DE ACESSO:") === SENHA_OP) {
            document.getElementById('modulo-entrada').style.display = 'none';
            document.getElementById('secao-operador').style.display = 'block';
            sincronizarFila();
            setInterval(sincronizarFila, 20000); // Auto-update a cada 20s
        }
    }

    function chamarMotorista(tel, placa) {
        const baia = prompt("PARA QUAL BAIA O VEÍCULO " + placa + " DEVE IR?");
        if(baia) window.open(`https://api.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=Olá%20motorista!%20Sua%20vez%20chegou.%20Por%20favor,%20dirija-se%20à%20BAIA%20${baia}`, '_blank');
    }

    document.getElementById('formDescarga').onsubmit = async e => {
        e.preventDefault();
        const btn = document.getElementById('btn_registrar');
        btn.disabled = true; btn.innerText = "ENVIANDO...";
        
        const dados = {
            "PLACA": document.getElementById('campo_placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('campo_produto').value,
            "TELEFONE": document.getElementById('campo_whatsapp').value,
            "JORNADA": document.getElementById('check_jornada_24h').checked ? "24 HORAS" : document.getElementById('campo_hora_limite').value,
            "ENTRADA": new Date().toLocaleString('pt-BR')
        };

        await fetch(`${SUPABASE_URL}/rest/v1/registros`, { method: 'POST', headers: HEADERS, body: JSON.stringify(dados) });
        alert("REGISTRO REALIZADO COM SUCESSO!");
        location.reload();
    };

    async function salvarReabertura() {
        const p = document.getElementById('reabrir_placa').value.toUpperCase();
        const h = document.getElementById('reabrir_hora').value;
        const res = await fetch(`${SUPABASE_URL}/rest/v1/registros?PLACA=eq.${p}&SAIDA=is.null`, { headers: HEADERS });
        const d = await res.json();
        if(d.length > 0) {
            await fetch(`${SUPABASE_URL}/rest/v1/registros?id=eq.${d[0].id}`, { method: 'PATCH', headers: HEADERS, body: JSON.stringify({"JORNADA": h}) });
            alert("JORNADA ATUALIZADA!"); location.reload();
        } else alert("PLACA NÃO ENCONTRADA NO PÁTIO!");
    }
</script>

</body>
</html>
