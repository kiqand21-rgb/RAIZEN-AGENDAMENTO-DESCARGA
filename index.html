<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>RAÍZEN - SISTEMA DE GESTÃO OPERACIONAL DE PÁTIO - V30.5</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- ESTILIZAÇÃO COMPLETA E DETALHADA (DESIGN SYSTEM RAÍZEN) --- */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --preto-painel: #1e293b;
            --cor-erro: #e11d48;
            --cor-sucesso: #10b981;
            --sombra-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background-color: var(--fundo-base); 
            color: #1e293b; 
            min-height: 100vh; 
            padding-bottom: 120px;
            overflow-x: auto;
        }

        /* CABEÇALHO INDUSTRIAL */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 120px 20px; 
            text-align: center; 
            border-bottom: 35px solid var(--roxo-raizen);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .logo-display {
            color: var(--branco); 
            font-size: 120px; 
            font-weight: 900;
            letter-spacing: 30px; 
            text-transform: uppercase;
            text-shadow: 8px 8px 0px rgba(0,0,0,0.2);
        }

        /* CONTAINER PRINCIPAL DO FORMULÁRIO */
        .card-master { 
            width: 95%; 
            max-width: 1200px; 
            margin: -80px auto 80px; 
            background: var(--branco); 
            padding: 80px; 
            border-radius: 60px; 
            box-shadow: var(--sombra-premium); 
            border-left: 45px solid var(--roxo-raizen);
            position: relative;
            z-index: 10;
        }

        /* CONFIGURAÇÃO DOS MÓDULOS ADM E SUPERVISÃO */
        #modulo-operador-full, #modulo-supervisao { 
            display: none; 
            width: 98%; 
            max-width: 2000px; 
            margin: 50px auto;
            background: var(--branco); 
            padding: 60px; 
            border-radius: 40px;
            box-shadow: var(--sombra-premium); 
            zoom: 0.75; /* Ajuste para telas grandes */
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 60px; 
            font-size: 42px; 
            border-bottom: 15px solid #f1f5f9;
            padding-bottom: 30px;
            letter-spacing: -1px;
        }

        /* CAMPOS DE ENTRADA DE DADOS */
        .wrapper-input { margin-bottom: 45px; }
        
        label { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 22px; 
            font-weight: 900; 
            color: var(--verde-raizen); 
            font-size: 18px; 
            text-transform: uppercase;
        }

        input, select { 
            width: 100%; 
            padding: 32px; 
            border: 6px solid #f1f5f9; 
            border-radius: 30px; 
            font-size: 26px; 
            font-weight: 700; 
            background: #f8fafc; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        input:focus { 
            border-color: var(--roxo-raizen); 
            background: white; 
            outline: none; 
            box-shadow: 0 0 0 20px rgba(132, 32, 125, 0.1);
        }

        /* PAINEL AMARELO DE CONTROLE DE JORNADA */
        .painel-jornada { 
            background: #fffbeb; 
            padding: 50px; 
            border-radius: 50px; 
            border: 5px dashed var(--ouro-raizen); 
            margin: 60px 0;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        /* ESTILO DOS BOTÕES MESTRES */
        .btn-master { 
            width: 100%; 
            padding: 40px; 
            background: var(--roxo-raizen); 
            color: white; 
            border: none; 
            border-radius: 35px; 
            font-size: 30px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            box-shadow: 0 18px 0 #5e1659; 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: center;
            align-items: center; 
            gap: 25px;
            transition: all 0.1s ease;
        }
        
        .btn-master:active { 
            transform: translateY(12px); 
            box-shadow: 0 6px 0 #5e1659; 
        }

        /* TABELAS OPERACIONAIS */
        .moldura-tabela { 
            overflow-x: auto; 
            border-radius: 40px; 
            border: 5px solid #f1f5f9; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; min-width: 1800px; background: white; }
        
        th { 
            background: var(--preto-painel); 
            color: white; 
            padding: 35px 20px; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            position: sticky;
            top: 0;
        }

        td { 
            padding: 25px 20px; 
            border-bottom: 4px solid #f8fafc; 
            text-align: center; 
            font-weight: 700; 
            font-size: 20px;
        }

        tr:hover { background-color: #f8fafc; }

        /* CARDS DE TANQUES (SUPERVISÃO) */
        .grid-tanques { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 40px; 
            margin-top: 40px; 
        }

        .card-tanque { 
            background: #ffffff; 
            padding: 50px; 
            border-radius: 45px; 
            border: 6px solid #e2e8f0; 
            text-align: center;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        
        .card-tanque:hover { transform: translateY(-10px); border-color: var(--roxo-raizen); }

        /* LOADER DE SINCRONIZAÇÃO */
        #loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
        }
        .raizen-spinner { width: 120px; height: 120px; border: 15px solid #f3f3f3; border-top: 15px solid var(--roxo-raizen); border-radius: 50%; animation: girar 1s linear infinite; }
        @keyframes girar { 100% { transform: rotate(360deg); } }

        /* INDICADORES DE STATUS */
        .status-ok { color: var(--cor-sucesso); font-weight: 900; background: #ecfdf5; padding: 10px 20px; border-radius: 15px; border: 2px solid var(--cor-sucesso); }
        .status-erro { color: var(--cor-erro); font-weight: 900; background: #fff1f2; padding: 10px 20px; border-radius: 15px; border: 2px solid var(--cor-erro); }
    </style>
</head>
<body>

<div id="loader-overlay">
    <div class="raizen-spinner"></div>
    <h2 style="border:none; margin-top:35px;">SINCRONIZANDO COM A BASE...</h2>
</div>

<header>
    <div class="logo-display">RAÍZEN</div>
</header>

<div class="card-master" id="secao-entrada">
    <div id="form-principal-wrapper">
        <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO DE ENTRADA</h2>
        <form id="formMaster">
            <div class="wrapper-input">
                <label><i class="fa-solid fa-barcode"></i> PLACA DO VEÍCULO</label>
                <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
            </div>
            
            <div class="wrapper-input">
                <label><i class="fa-solid fa-gas-pump"></i> PRODUTO PARA DESCARGA</label>
                <select id="produto" required>
                    <option value="">-- SELECIONE --</option>
                    <option value="GASOLINA">GASOLINA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>
            
            <div class="wrapper-input">
                <label><i class="fa-brands fa-whatsapp"></i> NÚMERO DO WHATSAPP</label>
                <input type="tel" id="whatsapp" placeholder="(19) 99999-9999" required>
            </div>
            
            <div class="painel-jornada">
                <div id="area-tempo">
                    <label><i class="fa-solid fa-clock"></i> HORÁRIO LIMITE DA JORNADA</label>
                    <input type="time" id="limite" required> 
                </div>
                <label style="margin-top:35px; display:flex; align-items:center; gap:25px; cursor:pointer; font-size: 22px; font-weight: 900; color: var(--roxo-raizen);">
                    <input type="checkbox" id="jornada24" style="width:40px; height:40px;"> HABILITAR JORNADA 24 HORAS
                </label>
            </div>

            <button type="submit" class="btn-master"><i class="fa-solid fa-circle-check"></i> CONFIRMAR REGISTRO</button>
            <button type="button" onclick="abrirReabertura()" class="btn-master" style="background:#475569; box-shadow: 0 18px 0 #2d3748; font-size:20px;">
                <i class="fa-solid fa-clock-rotate-left"></i> REABRIR JORNADA EXISTENTE
            </button>
        </form>
    </div>

    <div id="form-reabertura-wrapper" style="display:none;">
        <h2 style="color:#475569"><i class="fa-solid fa-rotate-right"></i> REABRIR REGISTRO</h2>
        <div class="wrapper-input">
            <label>PLACA DO CAMINHÃO</label>
            <input type="text" id="re_placa" placeholder="AAA-0000" maxlength="8">
        </div>
        <div class="wrapper-input">
            <label>NOVA HORA LIMITE</label>
            <input type="time" id="re_hora">
        </div>
        <button onclick="processarReabertura()" class="btn-master" style="background:#475569">ATUALIZAR JORNADA AGORA</button>
        <button onclick="fecharReabertura()" style="width:100%; background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; padding:30px; font-size:18px;">CANCELAR E VOLTAR</button>
    </div>

    <div style="text-align:center; margin-top:60px; display:flex; justify-content:center; gap:40px;">
        <button onclick="acessoADM()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-transform:uppercase; font-size:16px;">
            <i class="fa-solid fa-lock"></i> PAINEL ADM PÁTIO
        </button>
        <button onclick="acessoSuper()" style="background:none; border:none; color:var(--verde-raizen); font-weight:900; cursor:pointer; text-transform:uppercase; font-size:16px;">
            <i class="fa-solid fa-user-shield"></i> PAINEL SUPERVISÃO
        </button>
    </div>
</div>

<div id="modulo-operador-full">
    <h2><i class="fa-solid fa-list-check"></i> CONTROLE OPERACIONAL DE PÁTIO</h2>
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th>VOLUME PARA DESCARGA (L)</th>
                    <th>JORNADA</th>
                    <th>CAPACIDADE TANQUE</th>
                    <th>COMUNICAÇÃO</th>
                    <th>FINALIZAÇÃO</th>
                </tr>
            </thead>
            <tbody id="listaFila"></tbody>
        </table>
    </div>
    <button class="btn-master" style="background:var(--preto-painel); margin-top:50px;" onclick="location.reload()">FECHAR PAINEL E SAIR</button>
</div>

<div id="modulo-supervisao">
    <h2><i class="fa-solid fa-gears"></i> CONFIGURAÇÃO DE CAPACIDADE DE ESTOQUE</h2>
    <div id="gridSupervisao" class="grid-tanques"></div>
    <button class="btn-master" style="background:var(--preto-painel); margin-top:50px;" onclick="location.reload()">FECHAR PAINEL E SAIR</button>
</div>

<script>
    /* --- CONFIGURAÇÃO DA API (SUPABASE) --- */
    const CONFIG = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co/rest/v1',
        HEADERS: { 
            "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', 
            "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, 
            "Content-Type": "application/json", "Prefer": "return=minimal"
        }
    };

    let filaGlobal = [], tanquesGlobal = [];

    /* --- MÁSCARAS E TRATAMENTO DE INPUTS --- */
    const maskPlaca = el => {
        el.oninput = function() {
            let v = this.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
            if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
            this.value = v.substring(0,8);
        };
    };
    maskPlaca(document.getElementById('placa'));
    maskPlaca(document.getElementById('re_placa'));

    document.getElementById('whatsapp').oninput = function(e) {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    };

    document.getElementById('jornada24').onchange = function() {
        document.getElementById('limite').disabled = this.checked;
        document.getElementById('area-tempo').style.opacity = this.checked ? "0.3" : "1";
    };

    function setLoader(v) { document.getElementById('loader-overlay').style.display = v ? 'flex' : 'none'; }

    /* --- LÓGICA BLINDADA DE COMPARAÇÃO DE PRODUTO (RESOLVE BIODIESEL) --- */
    function normalizar(txt) {
        if(!txt) return "";
        return txt.toString().toUpperCase().trim()
                  .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Remove acentos
                  .replace(/[^A-Z0-9]/g, ""); // Remove espaços, parênteses e traços
    }

    /* --- COMUNICAÇÃO COM O BANCO --- */
    async function carregarDados() {
        try {
            const [resF, resT] = await Promise.all([
                fetch(`${CONFIG.URL}/registros?SAIDA=is.null&select=*&order=ENTRADA.asc`, { headers: CONFIG.HEADERS }),
                fetch(`${CONFIG.URL}/ESTOQUE?select=*&order=TANQUE_NAME.asc`, { headers: CONFIG.HEADERS })
            ]);
            filaGlobal = await resF.json();
            tanquesGlobal = await resT.json();
            renderFila();
            renderSuper();
        } catch (err) { console.error("Erro Crítico de Conexão:", err); }
    }

    /* --- RENDERIZAÇÃO DA FILA DE PÁTIO (ADM) --- */
    function renderFila() {
        const corpo = document.getElementById('listaFila');
        corpo.innerHTML = "";
        
        filaGlobal.forEach(item => {
            // LÓGICA DE BUSCA: O Biodiesel (B100) agora casa com Biodiesel do tanque
            const pMotorista = normalizar(item.PRODUTO);
            const tanque = tanquesGlobal.find(t => {
                const pTanque = normalizar(t.PRODUTO);
                return pTanque.includes(pMotorista) || pMotorista.includes(pTanque);
            });
            
            const volCaminhao = Number(item.VOLUME) || 0;
            const espacoLivre = tanque ? Number(tanque.ESPAÇO_DISPONIVEL) : 0;
            const podeLiberar = volCaminhao > 0 && espacoLivre >= volCaminhao;

            corpo.innerHTML += `
                <tr>
                    <td style="font-size:24px; color:var(--roxo-raizen); font-weight:900;">${item.PLACA}</td>
                    <td><span style="background:#f1f5f9; padding:8px 15px; border-radius:10px;">${item.PRODUTO}</span></td>
                    <td>
                        <div style="display:flex; gap:10px; justify-content:center;">
                            <input type="number" id="vol-${item.ID}" value="${item.VOLUME || ''}" 
                                style="width:140px; padding:12px; font-size:18px; border-radius:15px;">
                            <button onclick="salvarVol(${item.ID})" 
                                style="background:var(--roxo-raizen); color:white; border:none; padding:10px 20px; cursor:pointer; border-radius:15px; font-weight:900;">OK</button>
                        </div>
                    </td>
                    <td><i class="fa-regular fa-clock"></i> ${item.JORNADA}</td>
                    <td>
                        <span class="${podeLiberar ? 'status-ok' : 'status-erro'}">
                            ${podeLiberar ? '<i class="fa-solid fa-check"></i> ESPAÇO OK' : '<i class="fa-solid fa-triangle-exclamation"></i> BLOQUEADO'}
                        </span>
                    </td>
                    <td>
                        <button onclick="chamarWhatsApp('${item.TELEFONE}', '${item.PLACA}')" 
                            ${podeLiberar ? '' : 'disabled'} 
                            style="background:${podeLiberar ? '#25d366' : '#cbd5e1'}; color:white; border:none; padding:18px 25px; border-radius:20px; cursor:pointer; font-weight:900; width:100%;">
                            <i class="fa-brands fa-whatsapp"></i> CHAMAR
                        </button>
                    </td>
                    <td>
                        <button onclick="finalizarSaida(${item.ID}, ${volCaminhao}, ${tanque?.id})" 
                            style="background:#3b82f6; color:white; border:none; padding:18px 25px; border-radius:20px; cursor:pointer; font-weight:900;">
                            FINALIZAR
                        </button>
                    </td>
                </tr>`;
        });
    }

    /* --- FUNÇÕES AUXILIARES ADM --- */
    async function salvarVol(id) {
        const v = document.getElementById(`vol-${id}`).value;
        setLoader(true);
        await fetch(`${CONFIG.URL}/registros?ID=eq.${id}`, { 
            method: 'PATCH', headers: CONFIG.HEADERS, 
            body: JSON.stringify({ VOLUME: v }) 
        });
        await carregarDados(); // Recarrega para liberar o botão de WhatsApp na hora
        setLoader(false);
    }

    async function finalizarSaida(id, vol, tId) {
        if(!confirm("CONFIRMAR SAÍDA E BAIXA NO ESTOQUE?")) return;
        setLoader(true);
        await fetch(`${CONFIG.URL}/registros?ID=eq.${id}`, { 
            method: 'PATCH', headers: CONFIG.HEADERS, 
            body: JSON.stringify({ SAIDA: new Date().toLocaleString() }) 
        });
        if(tId && vol > 0) {
            const t = tanquesGlobal.find(x => x.id === tId);
            await fetch(`${CONFIG.URL}/ESTOQUE?id=eq.${tId}`, { 
                method: 'PATCH', headers: CONFIG.HEADERS, 
                body: JSON.stringify({ ESPAÇO_DISPONIVEL: Number(t.ESPAÇO_DISPONIVEL) - vol }) 
            });
        }
        await carregarDados();
        setLoader(false);
    }

    /* --- RENDERIZAÇÃO DA SUPERVISÃO (TANQUES) --- */
    function renderSuper() {
        const grid = document.getElementById('gridSupervisao');
        grid.innerHTML = tanquesGlobal.map(t => `
            <div class="card-tanque">
                <i class="fa-solid fa-database" style="font-size:40px; color:var(--roxo-raizen); margin-bottom:20px;"></i>
                <h3 style="color:var(--roxo-raizen); font-size:24px;">${t.TANQUE_NAME}</h3>
                <p style="font-weight:900; font-size:20px; color:var(--verde-raizen); margin-bottom:25px;">${t.PRODUTO}</p>
                <div style="text-align:left; margin-bottom:10px;">
                    <label style="font-size:12px;">ESPAÇO DISPONÍVEL (L)</label>
                    <input type="number" id="stq-${t.id}" value="${t.ESPAÇO_DISPONIVEL}" style="padding:20px; font-size:22px;">
                </div>
                <button onclick="salvarEstoque(${t.id})" class="btn-master" style="font-size:16px; padding:25px; box-shadow:0 10px 0 #5e1659;">
                    ATUALIZAR ESTOQUE
                </button>
            </div>
        `).join('');
    }

    async function salvarEstoque(id) {
        const val = document.getElementById(`stq-${id}`).value;
        setLoader(true);
        await fetch(`${CONFIG.URL}/ESTOQUE?id=eq.${id}`, { 
            method: 'PATCH', headers: CONFIG.HEADERS, 
            body: JSON.stringify({ ESPAÇO_DISPONIVEL: val }) 
        });
        await carregarDados();
        setLoader(false);
        alert("ESTOQUE ATUALIZADO COM SUCESSO!");
    }

    /* --- LÓGICA DE REGISTRO (MOTORISTA) --- */
    document.getElementById('formMaster').onsubmit = async e => {
        e.preventDefault();
        setLoader(true);
        const data = {
            PLACA: document.getElementById('placa').value.toUpperCase(),
            PRODUTO: document.getElementById('produto').value,
            TELEFONE: document.getElementById('whatsapp').value,
            JORNADA: document.getElementById('jornada24').checked ? "24 HORAS" : document.getElementById('limite').value,
            ENTRADA: new Date().toLocaleString()
        };
        const res = await fetch(`${CONFIG.URL}/registros`, { 
            method: 'POST', headers: CONFIG.HEADERS, 
            body: JSON.stringify(data) 
        });
        setLoader(false);
        if(res.ok) {
            alert("REGISTRO CONFIRMADO!\nIsso, confirmado! Aguarde para ser chamado no WhatsApp. Fique atento.");
            location.reload();
        }
    };

    /* --- LÓGICA DE REABERTURA --- */
    async function processarReabertura() {
        const p = document.getElementById('re_placa').value.toUpperCase();
        const h = document.getElementById('re_hora').value;
        setLoader(true);
        const res = await fetch(`${CONFIG.URL}/registros?PLACA=eq.${p}&SAIDA=is.null`, { headers: CONFIG.HEADERS });
        const data = await res.json();
        if(data.length > 0) {
            await fetch(`${CONFIG.URL}/registros?ID=eq.${data[0].ID}`, { 
                method: 'PATCH', headers: CONFIG.HEADERS, 
                body: JSON.stringify({ JORNADA: h }) 
            });
            setLoader(false);
            alert("JORNADA REABERTA!\nSó aguardar ser chamado.");
            location.reload();
        } else {
            setLoader(false);
            alert("PLACA NÃO LOCALIZADA!");
        }
    }

    /* --- CONTROLE DE NAVEGAÇÃO --- */
    function acessoADM() { 
        if(prompt("SENHA ADM PÁTIO:") === "raizen2026") { 
            document.getElementById('secao-entrada').style.display='none'; 
            document.getElementById('modulo-operador-full').style.display='block'; 
            carregarDados(); 
        } 
    }
    
    function acessoSuper() { 
        if(prompt("SENHA SUPERVISÃO:") === "master2026") { 
            document.getElementById('secao-entrada').style.display='none'; 
            document.getElementById('modulo-supervisao').style.display='block'; 
            carregarDados(); 
        } 
    }

    function abrirReabertura() { 
        document.getElementById('form-principal-wrapper').style.display = 'none'; 
        document.getElementById('form-reabertura-wrapper').style.display = 'block'; 
    }
    
    function fecharReabertura() { 
        document.getElementById('form-reabertura-wrapper').style.display = 'none'; 
        document.getElementById('form-principal-wrapper').style.display = 'block'; 
    }

    function chamarWhatsApp(tel, placa) {
