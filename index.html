<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO OPERACIONAL V20.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-alerta: #e11d48;
            --cor-sucesso: #10b981;
            --cor-texto: #1e293b;
            --verde-botao-reabrir: #3d5446; 
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }

        body { 
            background-color: var(--fundo-base); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            color: var(--cor-texto);
            padding-bottom: 100px;
        }

        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 90px 20px; 
            text-align: center; 
            border-bottom: 25px solid var(--roxo-raizen);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .logo-raizen-master {
            color: var(--branco);
            font-size: 85px;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }

        header h1 { 
            color: var(--branco); 
            font-size: 24px; 
            letter-spacing: 6px; 
            font-weight: 300;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .card-industrial { 
            width: 94%; 
            max-width: 1100px; 
            margin: 60px auto; 
            background: var(--branco); 
            padding: 70px; 
            border-radius: 60px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.2); 
            border-left: 35px solid var(--roxo-raizen);
            position: relative;
        }

        #secao-operador { 
            display: none; 
            width: 100%; 
            padding: 20px;
            zoom: 0.8;
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 50px; 
            font-size: 38px;
            border-bottom: 12px solid #f1f5f9;
            padding-bottom: 30px;
        }

        .wrapper-campo { margin-bottom: 40px; position: relative; }
        
        label { 
            display: block; 
            margin-bottom: 15px; 
            font-weight: 900; 
            color: var(--verde-raizen); 
            font-size: 16px; 
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input, select { 
            width: 100%; 
            padding: 28px; 
            border: 5px solid #e2e8f0; 
            border-radius: 30px; 
            font-size: 24px; 
            font-weight: 700;
            background: #f8fafc;
        }

        .container-jornada-exp {
            background: #fffbeb;
            padding: 50px;
            border-radius: 50px;
            border: 6px solid var(--ouro-raizen);
            margin: 40px 0;
        }

        .btn-principal { 
            width: 100%; padding: 30px; background: var(--roxo-raizen); 
            color: white; border: none; border-radius: 25px; 
            font-size: 24px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            margin-bottom: 20px;
        }

        .btn-reabrir-jornada { background: var(--verde-botao-reabrir); }

        .moldura-tabela { overflow-x: auto; border-radius: 20px; border: 2px solid #e2e8f0; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #0f172a; color: #ffffff; padding: 20px; font-size: 14px; }
        td { padding: 15px; border-bottom: 4px solid #f1f5f9; text-align: center; font-weight: 800; }

        .tag-prod {
            padding: 10px 15px; border-radius: 15px; font-size: 12px; font-weight: 900;
            display: inline-block; min-width: 150px;
        }
        .tag-gasosa { background: #ff8c00; color: #fff; } 
        .tag-b100 { background: #5d4037; color: #fff; } 
        .tag-anidro { background: #0056b3; color: #fff; } 

        .btn-w-whatsapp { background: #22c55e; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 900; width: 100%; margin-bottom: 5px; }
        .btn-f-finalizar { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 900; width: 100%; }
    </style>
</head>
<body>

<header>
    <div class="logo-raizen-master">RAÍZEN</div>
    <h1>CONTROLE DE DESCARGAS | TERMINAL PAULÍNIA</h1>
</header>

<div class="card-industrial" id="modulo-entrada">
    <div id="container-registro">
        <h2><i class="fa-solid fa-file-signature"></i> REGISTRO DE ENTRADA</h2>
        <form id="formDescarga">
            <div class="wrapper-campo">
                <label>PLACA DO VEÍCULO</label>
                <input type="text" id="campo_placa" placeholder="ABC-1234" maxlength="8" required>
            </div>
            <div class="wrapper-campo">
                <label>PRODUTO CARREGADO</label>
                <select id="campo_produto" required>
                    <option value="">-- SELECIONE O PRODUTO --</option>
                    <option value="GASOLINA COMUM / ADITIVADA">GASOLINA COMUM / ADITIVADA</option>
                    <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                    <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                    <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                    <option value="DIESEL S10">DIESEL S10</option>
                </select>
            </div>
            <div class="wrapper-campo">
                <label>NÚMERO DO WHATSAPP</label>
                <input type="tel" id="campo_whatsapp" placeholder="(19) 99999-9999" required>
            </div>
            <div class="container-jornada-exp">
                <label>TÉRMINO DA JORNADA</label>
                <input type="time" id="campo_hora_limite">
                <label style="margin-top:20px; cursor:pointer;">
                    <input type="checkbox" id="check_jornada_24h"> EM JORNADA 24 HORAS
                </label>
            </div>
            <button type="submit" class="btn-principal">EFETUAR REGISTRO</button>
            <button type="button" onclick="mudarParaReabrir()" class="btn-principal btn-reabrir-jornada">REABRIR JORNADA</button>
        </form>
    </div>

    <div id="container-reabrir" style="display:none;">
        <h2>REABRIR JORNADA</h2>
        <input type="text" id="reabrir_placa" placeholder="PLACA" style="margin-bottom:20px;">
        <input type="time" id="reabrir_hora" style="margin-bottom:20px;">
        <button onclick="salvarReabertura()" class="btn-principal" style="background:var(--verde-botao-reabrir)">ATUALIZAR</button>
        <button onclick="mudarParaNormal()" style="width:100%; background:none; border:none; color:gray; cursor:pointer;">VOLTAR</button>
    </div>

    <div style="text-align:center; margin-top:40px;">
        <button onclick="acessoOperador()" style="color:var(--roxo-raizen); font-weight:bold; cursor:pointer; background:none; border:none; text-decoration:underline;">MÓDULO OPERADOR</button>
    </div>
</div>

<div id="secao-operador" class="card-industrial">
    <h2>FILA DE DESCARGA</h2>
    <div id="status-sinc" style="text-align:center; margin-bottom:10px; font-size:12px; color:gray;"></div>
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>PLACA</th>
                    <th>PRODUTO</th>
                    <th>CONTATO</th>
                    <th>JORNADA</th>
                    <th>ENTRADA</th>
                    <th>AGENDAMENTO</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="dadosFila"></tbody>
        </table>
    </div>
    <button class="btn-principal" style="background:#64748b; margin-top:20px;" onclick="location.reload()">SAIR</button>
</div>

<script>
    // CONFIGURAÇÃO SUPABASE
    const SUPABASE_URL = 'https://rbbkjuiizmvatiawfzuv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X';
    const HEADERS = {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
    };

    function mudarParaReabrir() { document.getElementById('container-registro').style.display = 'none'; document.getElementById('container-reabrir').style.display = 'block'; }
    function mudarParaNormal() { document.getElementById('container-reabrir').style.display = 'none'; document.getElementById('container-registro').style.display = 'block'; }

    // INSERT - ENVIAR PARA O SUPABASE
    document.getElementById('formDescarga').onsubmit = async e => {
        e.preventDefault();
        
        const dados = {
            PLACA: document.getElementById('campo_placa').value.toUpperCase(),
            PRODUTO: document.getElementById('campo_produto').value,
            TELEFONE: document.getElementById('campo_whatsapp').value,
            JORNADA: document.getElementById('check_jornada_24h').checked ? "24 HORAS" : document.getElementById('campo_hora_limite').value,
            ENTRADA: new Date().toLocaleString('pt-BR')
        };

        const res = await fetch(`${SUPABASE_URL}/rest/v1/registros`, {
            method: 'POST',
            headers: HEADERS,
            body: JSON.stringify(dados)
        });

        if(res.ok) { alert("REGISTRO SALVO!"); location.reload(); }
        else { const e = await res.json(); alert("ERRO: " + e.message); }
    };

    // SELECT - BUSCAR FILA
    async function sincronizarFila() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/registros?SAIDA=is.null&select=*`, { headers: HEADERS });
            const ativos = await res.json();
            const corpo = document.getElementById('dadosFila');
            corpo.innerHTML = "";

            ativos.forEach(item => {
                let cl = item.PRODUTO.includes("GASOLINA") ? "tag-gasosa" : item.PRODUTO.includes("BIODIESEL") ? "tag-b100" : "tag-anidro";
                corpo.innerHTML += `
                    <tr>
                        <td style="color:var(--roxo-raizen); font-size:18px;">${item.PLACA}</td>
                        <td><span class="tag-prod ${cl}">${item.PRODUTO}</span></td>
                        <td>${item.TELEFONE}</td>
                        <td>${item.JORNADA}</td>
                        <td>${item.ENTRADA}</td>
                        <td>
                            <input type="time" id="ag-${item.id}" value="${item.AGENDAMENTO || ''}" style="padding:5px; border-radius:5px; border:1px solid #ccc;">
                            <button onclick="salvarAgenda('${item.id}')" style="background:var(--verde-raizen); color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">OK</button>
                        </td>
                        <td>
                            <button class="btn-w-whatsapp" onclick="chamar('${item.TELEFONE}','${item.PLACA}')">CHAMAR</button>
                            <button class="btn-f-finalizar" onclick="finalizar('${item.id}')">FIM</button>
                        </td>
                    </tr>`;
            });
            document.getElementById('status-sinc').innerText = "Última atualização: " + new Date().toLocaleTimeString();
        } catch (e) { console.error("Erro na sincronização"); }
    }

    // UPDATE - FINALIZAR REGISTRO
    async function finalizar(id) {
        if(!confirm("Encerrar descarga?")) return;
        await fetch(`${SUPABASE_URL}/rest/v1/registros?id=eq.${id}`, {
            method: 'PATCH',
            headers: HEADERS,
            body: JSON.stringify({ SAIDA: new Date().toLocaleString('pt-BR') })
        });
        sincronizarFila();
    }

    // UPDATE - SALVAR AGENDAMENTO
    async function salvarAgenda(id) {
        const val = document.getElementById(`ag-${id}`).value;
        await fetch(`${SUPABASE_URL}/rest/v1/registros?id=eq.${id}`, {
            method: 'PATCH',
            headers: HEADERS,
            body: JSON.stringify({ AGENDAMENTO: val })
        });
        alert("AGENDADO!");
    }

    // UPDATE - REABRIR JORNADA
    async function salvarReabertura() {
        const p = document.getElementById('reabrir_placa').value.toUpperCase();
        const h = document.getElementById('reabrir_hora').value;
        await fetch(`${SUPABASE_URL}/rest/v1/registros?PLACA=eq.${p}&SAIDA=is.null`, {
            method: 'PATCH',
            headers: HEADERS,
            body: JSON.stringify({ JORNADA: h })
        });
        alert("JORNADA ATUALIZADA!"); location.reload();
    }

    function chamar(tel, placa) {
        const baia = prompt("QUAL BAIA?");
        if(baia) window.open(`https://api.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=Placa ${placa} na Baia ${baia}`, '_blank');
    }

    function acessoOperador() {
        if(prompt("SENHA:") === "raizen2026") {
            document.getElementById('modulo-entrada').style.display = 'none';
            document.getElementById('secao-operador').style.display = 'block';
            sincronizarFila();
            setInterval(sincronizarFila, 30000);
        }
    }
</script>
</body>
</html>
