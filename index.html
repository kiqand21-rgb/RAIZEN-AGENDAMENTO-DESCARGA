<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - Terminal Paulínia</title>
    <style>
        :root {
            --cor-principal: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo: #f0f2f5;
            --branco: #ffffff;
            --danger: #dc3545;
            --warning: #ffc107;
            --success: #28a745;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--fundo); margin: 0; display: flex; flex-direction: column; align-items: center; color: #333; }
        header { background-color: var(--cor-principal); width: 100%; padding: 25px 0; text-align: center; border-bottom: 6px solid var(--amarelo-raizen); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { color: var(--branco); margin: 0; letter-spacing: 1px; font-size: 22px; text-transform: uppercase; }
        
        .container { width: 92%; max-width: 550px; margin: 20px auto; background: var(--branco); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h2 { color: var(--cor-principal); text-align: center; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        label { display: block; margin-top: 15px; font-weight: 600; color: #444; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #e1e1e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        /* BOTÃO DE AGENDA NA TABELA */
        .badge-coleta { 
            background: #e3f2fd; 
            color: #0d47a1; 
            padding: 10px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 13px; 
            cursor: pointer; 
            border: 2px solid #0d47a1; 
            display: inline-block;
            min-width: 120px;
            text-align: center;
            transition: 0.2s;
        }
        .badge-coleta:hover { background: #bbdefb; }

        /* ADMIN */
        #admin-panel { display: none; max-width: 98%; width: 1250px; }
        .search-box { margin-bottom: 15px; padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 13px; }
        th { background: var(--cor-principal); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .status-ok { background: var(--success); color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .status-alerta { background: var(--warning); color: #856404; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .status-vencido { background: var(--danger); color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .btn-zap { background:#25D366; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-weight:bold; width: 100%; margin-bottom: 4px; display: block; text-decoration: none; text-align: center; font-size: 11px; }
        .btn-concluir { background:#007bff; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-weight:bold; width: 100%; font-size: 11px; }
        
        #modalColeta { display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
        .modal-content { background:white; margin:10% auto; padding:25px; border-radius:15px; width:300px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }

        .btn-enviar { width: 100%; padding: 15px; background: var(--cor-principal); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer-link { text-align: center; margin-top: 20px; }
        .btn-admin-link { background: none; border: none; color: #999; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>RAÍZEN - TERMINAL PAULÍNIA</h1>
</header>

<div class="container" id="tela-motorista">
    <h2>Entrada de Motorista</h2>
    <form id="formAgendamento">
        <label>Placa do Veículo</label>
        <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>
        <label>Produto</label>
        <select id="produto" required>
            <option value="GASOLINA">GASOLINA</option>
            <option value="S10">S10</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>
        <label>WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(19) 99999-9999" required>
        <label>Fim da Jornada</label>
        <input type="time" id="jornada">
        <button type="submit" class="btn-enviar" id="btnEnviar">REGISTRAR ENTRADA</button>
    </form>
    <div class="footer-link">
        <button class="btn-admin-link" onclick="abrirAdmin()">Acesso Administrativo</button>
    </div>
</div>

<div class="container" id="admin-panel">
    <h2>Controle de Pátio</h2>
    <input type="text" id="buscaPlaca" class="search-box" placeholder="🔎 Filtrar Placa..." onkeyup="filtrarTabela()">
    
    <div style="overflow-x: auto;">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Telefone</th>
                    <th>Status Jornada</th>
                    <th>Agenda Coleta</th>
                    <th>Espera</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-enviar" style="background:#666;" onclick="window.location.reload()">VOLTAR</button>
</div>

<div id="modalColeta">
    <div class="modal-content">
        <h3>Definir Agenda</h3>
        <input type="hidden" id="placaAlvo">
        <label>Data:</label>
        <input type="date" id="inputData">
        <label>Hora:</label>
        <input type="time" id="inputHora">
        <button class="btn-enviar" id="btnSalvar" onclick="salvarColeta()">SALVAR NA TABELA</button>
        <button onclick="fecharModal()" style="width:100%; background:none; border:none; color:red; cursor:pointer; margin-top:10px;">Cancelar</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // Funções de Interface
    function abrirAdmin() {
        if (prompt("Senha:") === "raizen2026") {
            document.getElementById('tela-motorista').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            carregarAtivos();
        }
    }

    function getStatusJornada(horaJornada) {
        if (!horaJornada) return "<span>-</span>";
        const agora = new Date();
        const [h, m] = horaJornada.split(':');
        const dJ = new Date(); dJ.setHours(h, m, 0);
        const diff = (dJ - agora) / 60000;
        if (diff < 0) return `<span class="status-vencido">VENCIDA</span>`;
        if (diff <= 60) return `<span class="status-alerta">ALERTA</span>`;
        return `<span class="status-ok">EM DIA</span>`;
    }

    // CARREGAR DADOS NA TABELA
    function carregarAtivos() {
        fetch(API_URL + "?timestamp=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector('#tabelaDados tbody');
            tbody.innerHTML = "";
            const agora = new Date().getTime();

            data.filter(i => i.PLACA && !i.SAIDA).forEach(i => {
                const minutosPatio = i.TIMESTAMP ? Math.floor((agora - i.TIMESTAMP) / 60000) : "?";
                
                // LÓGICA DE VISUALIZAÇÃO DO CAMPO QUE VOCÊ MOSTROU NA FOTO
                // Se a coluna COLETA tiver valor, mostra o valor. Se não, mostra o botão Pendente.
                const valorAgenda = (i.COLETA && i.COLETA.trim() !== "") ? i.COLETA : "📅 Pendente";

                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:bold">${i.PLACA}</td>
                        <td>${i.TELEFONE}</td>
                        <td>${getStatusJornada(i.JORNADA)}</td>
                        <td>
                            <div class="badge-coleta" onclick="abrirModalColeta('${i.PLACA}')">
                                ${valorAgenda}
                            </div>
                        </td>
                        <td>${minutosPatio} min</td>
                        <td>
                            <button class="btn-zap" onclick="enviarZap('${i.TELEFONE}', '${i.PLACA}', '${valorAgenda}')">📱 CHAMAR</button>
                            <button class="btn-concluir" onclick="concluir('${i.PLACA}')">OK</button>
                        </td>
                    </tr>`;
            });
        });
    }

    function abrirModalColeta(placa) {
        document.getElementById('placaAlvo').value = placa;
        document.getElementById('modalColeta').style.display = 'block';
    }

    function fecharModal() {
        document.getElementById('modalColeta').style.display = 'none';
    }

    function salvarColeta() {
        const placa = document.getElementById('placaAlvo').value;
        const dIn = document.getElementById('inputData').value;
        const hIn = document.getElementById('inputHora').value;
        const btn = document.getElementById('btnSalvar');

        if(!dIn || !hIn) return alert("Escolha data e hora!");

        btn.innerText = "ATUALIZANDO...";
        btn.disabled = true;

        const d = dIn.split('-');
        const dataFormatada = d[2] + "/" + d[1] + " " + hIn;

        fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: { "COLETA": dataFormatada } })
        })
        .then(res => {
            if(res.ok) {
                fecharModal();
                // O segredo está aqui: recarregar a tabela após 1 segundo
                setTimeout(carregarAtivos, 1200);
            }
        })
        .finally(() => {
            btn.innerText = "SALVAR NA TABELA";
            btn.disabled = false;
        });
    }

    // Funções auxiliares mantidas para funcionamento
    function filtrarTabela() {
        let input = document.getElementById("buscaPlaca").value.toUpperCase();
        let trs = document.querySelectorAll("#tabelaDados tbody tr");
        trs.forEach(tr => tr.style.display = tr.innerText.toUpperCase().includes(input) ? "" : "none");
    }

    function concluir(placa) {
        fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: { "SAIDA": new Date().toLocaleString() } })
        }).then(() => carregarAtivos());
    }

    function enviarZap(tel, placa, agenda) {
        const baia = prompt("BAIA?");
        const limpo = tel.replace(/\D/g, "");
        const txt = encodeURIComponent(`*RAÍZEN*\nPlaca: ${placa}\nAgenda: ${agenda}\nBaia: ${baia}`);
        window.open(`https://web.whatsapp.com/send?phone=55${limpo}&text=${txt}`);
    }
</script>
</body>
</html>
