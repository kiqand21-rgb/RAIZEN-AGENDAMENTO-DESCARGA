<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>RAÍZEN - GESTÃO OPERACIONAL V35.0 - SISTEMA COMPLETO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ================================================================
           ESTILO VISUAL PREMIUM (BASEADO NA SUA V26.9)
           ================================================================ */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --preto-industrial: #1a241f;
            --cinza-texto: #475569;
            --cor-erro: #e11d48;
            --cor-sucesso: #10b981;
            --sombra-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }

        body { 
            background-color: var(--fundo-base); 
            color: #1e293b; 
            min-height: 100vh; 
            overflow-x: auto;
        }

        /* CABEÇALHO EXPANDIDO */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, var(--preto-industrial) 100%); 
            padding: 110px 20px; 
            text-align: center; 
            border-bottom: 35px solid var(--roxo-raizen);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            position: relative;
        }

        .logo-display {
            color: var(--branco); 
            font-size: 115px; 
            font-weight: 900;
            letter-spacing: 30px; 
            text-transform: uppercase;
            text-shadow: 6px 6px 0px rgba(0,0,0,0.2);
        }

        /* CARDS E SEÇÕES */
        .card-master { 
            width: 95%; 
            max-width: 1200px; 
            margin: -80px auto 80px; 
            background: var(--branco); 
            padding: 80px; 
            border-radius: 50px; 
            box-shadow: var(--sombra-premium); 
            border-left: 40px solid var(--roxo-raizen);
            position: relative;
        }

        .modulo-full { 
            display: none; 
            width: 98%; 
            max-width: 1950px; 
            margin: 40px auto;
            background: var(--branco); 
            padding: 50px; 
            border-radius: 40px;
            box-shadow: var(--sombra-premium); 
            zoom: 0.8;
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 60px; 
            font-size: 42px; 
            border-bottom: 15px solid #f8fafc;
            padding-bottom: 30px;
        }

        /* FORMULÁRIOS DETALHADOS */
        .wrapper-input { margin-bottom: 45px; }
        
        label { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 20px; 
            font-weight: 900; 
            color: var(--verde-raizen); 
            font-size: 18px; 
            text-transform: uppercase;
        }

        input, select { 
            width: 100%; 
            padding: 30px; 
            border: 6px solid #f1f5f9; 
            border-radius: 28px; 
            font-size: 26px; 
            font-weight: 700; 
            background: #f8fafc; 
            transition: all 0.4s ease;
        }

        input:focus { 
            border-color: var(--roxo-raizen); 
            background: white; 
            outline: none;
            box-shadow: 0 0 30px rgba(132, 32, 125, 0.1);
        }

        /* PAINEL DE JORNADA ESPECIAL */
        .container-jornada {
            background: #fffbeb;
            padding: 50px;
            border-radius: 45px;
            border: 5px dashed var(--ouro-raizen);
            margin: 50px 0;
        }

        /* BOTÕES DE IMPACTO */
        .btn-master { 
            width: 100%; padding: 40px; background: var(--roxo-raizen); 
            color: white; border: none; border-radius: 35px; 
            font-size: 28px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; box-shadow: 0 18px 0 #5e1659; 
            margin-bottom: 30px; display: flex; justify-content: center;
            align-items: center; gap: 25px; transition: 0.2s;
        }
        .btn-master:active { transform: translateY(12px); box-shadow: 0 6px 0 #5e1659; }

        /* SEMÁFORO E TABELAS OPERACIONAIS */
        .semaforo { 
            width: 35px; height: 35px; border-radius: 50%; 
            display: inline-block; border: 4px solid rgba(0,0,0,0.1); 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        .status-verde { background: #10b981; box-shadow: 0 0 20px #10b981; }
        .status-amarelo { background: #ffc107; box-shadow: 0 0 20px #ffc107; }
        .status-vermelho { background: #ef4444; box-shadow: 0 0 20px #ef4444; }

        .moldura-tabela { 
            overflow-x: auto; 
            border-radius: 35px; 
            border: 5px solid #f1f5f9; 
            margin-top: 30px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 1800px; background: white; }
        th { background: #1e293b; color: white; padding: 30px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        td { padding: 25px; border-bottom: 4px solid #f8fafc; text-align: center; font-weight: 700; font-size: 19px; }

        /* ESTILO DOS PRODUTOS NA TABELA */
        .badge-produto { padding: 12px 25px; border-radius: 15px; color: white; font-size: 14px; font-weight: 900; }
        .prod-gasolina { background: #ff8c00; }
        .prod-b100 { background: #5d4037; }
        .prod-anidro { background: #0056b3; }
        .prod-hidratado { background: #00a8ff; }
        .prod-s10 { background: #334155; }

        /* LOADER EXCLUSIVO */
        #loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
        }
        .raizen-spinner { width: 100px; height: 100px; border: 15px solid #f3f3f3; border-top: 15px solid var(--roxo-raizen); border-radius: 50%; animation: girar 0.8s linear infinite; }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader-overlay">
    <div class="raizen-spinner"></div>
    <h2 style="border:none; margin-top:30px;">ATUALIZANDO TERMINAL...</h2>
</div>

<header><div class="logo-display">RAÍZEN</div></header>

<div class="card-master" id="secao-entrada">
    <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO DE PÁTIO</h2>
    
    <form id="formMaster">
        <div class="wrapper-input">
            <label><i class="fa-solid fa-barcode"></i> PLACA DO VEÍCULO (MERCADA)</label>
            <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
        </div>

        <div class="wrapper-input">
            <label><i class="fa-solid fa-gas-pump"></i> PRODUTO PARA DESCARGA</label>
            <select id="produto" required>
                <option value="">-- SELECIONE O PRODUTO --</option>
                <option value="GASOLINA A">GASOLINA A</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                <option value="DIESEL S10">DIESEL S10</option>
            </select>
        </div>

        <div class="wrapper-input">
            <label><i class="fa-brands fa-whatsapp"></i> CELULAR DO MOTORISTA</label>
            <input type="tel" id="whatsapp" placeholder="(00) 00000-0000" required>
        </div>
        
        <div class="container-jornada">
            <div id="area-limite">
                <label><i class="fa-solid fa-clock"></i> HORÁRIO LIMITE DE JORNADA</label>
                <input type="time" id="limite" required> 
            </div>
            <label style="margin-top:30px; display:flex; align-items:center; gap:25px; cursor:pointer; font-size: 22px; font-weight: 900; color: var(--roxo-raizen);">
                <input type="checkbox" id="jornada24" style="width:40px; height:40px;" onchange="ajustarInterfaceJornada(this)"> 
                HABILITAR JORNADA 24 HORAS (LIBERADO)
            </label>
        </div>

        <button type="submit" class="btn-master">REGISTRAR ENTRADA</button>
        
        <button type="button" onclick="ativarReabertura()" class="btn-master" style="background:#475569; box-shadow: 0 15px 0 #2d3748; font-size:18px;">
            <i class="fa-solid fa-clock-rotate-left"></i> REABRIR/EDITAR JORNADA EXISTENTE
        </button>
    </form>

    <div style="text-align:center; margin-top:60px; display:flex; justify-content:center; gap:50px;">
        <button onclick="acessoPainel('operador')" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; text-transform:uppercase; font-size:18px;"><i class="fa-solid fa-lock"></i> PAINEL OPERADOR</button>
        <button onclick="acessoPainel('supervisao')" style="background:none; border:none; color:var(--verde-raizen); font-weight:900; cursor:pointer; text-transform:uppercase; font-size:18px;"><i class="fa-solid fa-shield-halved"></i> SUPERVISÃO TANQUES</button>
    </div>
</div>

<div id="modulo-operador-full" class="modulo-full">
    <h2>CONTROLE DE DESCARGA EM TEMPO REAL</h2>
    
    <div style="background:#f8fafc; padding:30px; border-radius:25px; margin-bottom:40px; display:flex; align-items:center; gap:25px; border:3px solid #e2e8f0;">
        <i class="fa-solid fa-filter" style="font-size:30px; color:var(--roxo-raizen);"></i>
        <label style="margin:0; font-size:20px;">FILTRAR POR TIPO DE JORNADA:</label>
        <select id="filtroJornada" onchange="renderizarTabelaOperacional()" style="width:400px; padding:15px; font-size:20px; border-radius:15px;">
            <option value="TODOS">TODOS OS VEÍCULOS NO PÁTIO</option>
            <option value="24 HORAS">APENAS JORNADA 24H</option>
            <option value="HORARIO">APENAS HORÁRIO RESTRITO</option>
        </select>
    </div>

    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>STATUS</th>
                    <th>PLACA</th>
                    <th>PRODUTO</th>
                    <th>LIMITE JORNADA</th>
                    <th>VOLUME (L)</th>
                    <th>WHATSAPP</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="corpoTabelaOperacional"></tbody>
        </table>
    </div>
    <button class="btn-master" style="background:#1e293b; margin-top:50px; width:300px;" onclick="location.reload()">VOLTAR AO INÍCIO</button>
</div>

<div id="modulo-supervisao" class="modulo-full">
    <h2>GESTOR DE ESTOQUE DISPONÍVEL (TANQUES)</h2>
    <div class="moldura-tabela" style="max-width:1300px; margin:0 auto;">
        <table style="min-width:100%">
            <thead>
                <tr>
                    <th>CÓDIGO TANQUE</th>
                    <th>PRODUTO ARMAZENADO</th>
                    <th>ESPAÇO DISPONÍVEL ATUAL (L)</th>
                    <th>CONFIRMAR ALTERAÇÃO</th>
                </tr>
            </thead>
            <tbody id="corpoTabelaSupervisao"></tbody>
        </table>
    </div>
    <button class="btn-master" style="background:#1e293b; margin-top:50px; width:300px;" onclick="location.reload()">VOLTAR AO INÍCIO</button>
</div>

<script>
    /* CONFIGURAÇÃO SUPABASE - BANCO DE DADOS RAÍZEN */
    const CONFIG_DB = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co',
        KEY: 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X',
        HEADERS: { 
            "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', 
            "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, 
            "Content-Type": "application/json", 
            "Prefer": "return=minimal" 
        }
    };

    let dadosPátio = [];
    let dadosTanques = [];

    // --- FUNÇÕES DE INTERFACE ---
    function exibirLoader(s) { document.getElementById('loader-overlay').style.display = s ? 'flex' : 'none'; }
    
    function ajustarInterfaceJornada(cb) {
        const area = document.getElementById('area-limite');
        const input = document.getElementById('limite');
        area.style.opacity = cb.checked ? "0.2" : "1";
        input.disabled = cb.checked;
        input.required = !cb.checked;
        if(cb.checked) input.value = "";
    }

    // MASCARA DE TELEFONE DINÂMICA
    document.getElementById('whatsapp').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, "");
        if (v.length > 11) v = v.slice(0, 11);
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
        v = v.replace(/(\d)(\d{4})$/, "$1-$2");
        e.target.value = v;
    });

    // --- LÓGICA DE DADOS (CARREGAMENTO) ---
    async function sincronizarSistema() {
        try {
            // Busca caminhões que não saíram
            const resCaminhoes = await fetch(`${CONFIG_DB.URL}/rest/v1/registros?SAIDA=is.null&select=*`, { headers: CONFIG_DB.HEADERS });
            dadosPátio = await resCaminhoes.json();

            // Busca os 5 tanques obrigatórios
            const resTanques = await fetch(`${CONFIG_DB.URL}/rest/v1/estoque?select=*&order=id.asc`, { headers: CONFIG_DB.HEADERS });
            dadosTanques = await resTanques.json();

            renderizarTabelaOperacional();
            renderizarTabelaSupervisao();
        } catch (erro) {
            console.error("Erro na sincronização:", erro);
        }
    }

    // --- RENDERIZAÇÃO DA TABELA OPERACIONAL (COM SEMÁFORO E FILTRO) ---
    function renderizarTabelaOperacional() {
        const corpo = document.getElementById('corpoTabelaOperacional');
        const filtro = document.getElementById('filtroJornada').value;
        corpo.innerHTML = "";

        dadosPátio.forEach(item => {
            // Aplicação do Filtro de Jornada
            if (filtro === "24 HORAS" && item.JORNADA !== "24 HORAS") return;
            if (filtro === "HORARIO" && item.JORNADA === "24 HORAS") return;

            // Lógica do Semáforo Visual
            let statusCor = "status-verde";
            if (item.JORNADA !== "24 HORAS" && item.JORNADA) {
                const agora = new Date();
                const [h, m] = item.JORNADA.split(':');
                const tempoLimite = new Date(); 
                tempoLimite.setHours(h, m, 0);
                
                const diferencaMinutos = (tempoLimite - agora) / 1000 / 60;
                
                if (diferencaMinutos <= 0) statusCor = "status-vermelho";
                else if (diferencaMinutos <= 35) statusCor = "status-amarelo";
            }

            // Define cor do produto
            let classeProd = "prod-s10";
            if(item.PRODUTO.includes("GASOLINA")) classeProd = "prod-gasolina";
            else if(item.PRODUTO.includes("B100")) classeProd = "prod-b100";
            else if(item.PRODUTO.includes("ANIDRO")) classeProd = "prod-anidro";
            else if(item.PRODUTO.includes("HIDRATADO")) classeProd = "prod-hidratado";

            corpo.innerHTML += `
                <tr>
                    <td><div class="semaforo ${statusCor}"></div></td>
                    <td style="font-size:26px; color:var(--roxo-raizen); font-weight:900;">${item.PLACA}</td>
                    <td><span class="badge-produto ${classeProd}">${item.PRODUTO}</span></td>
                    <td><span style="background:#f1f5f9; padding:12px; border-radius:12px;">${item.JORNADA}</span></td>
                    <td><input type="number" id="vol-${item.ID}" value="${item.VOLUME || ''}" class="input-edit-table" style="width:180px; font-size:18px;" placeholder="LITROS"></td>
                    <td>${item.TELEFONE}</td>
                    <td>
                        <div style="display:flex; gap:15px; justify-content:center;">
                            <button onclick="enviarWhatsapp('${item.TELEFONE}')" style="background:#25d366; color:white; border:none; padding:15px; border-radius:12px; cursor:pointer;"><i class="fa-brands fa-whatsapp fa-xl"></i></button>
                            <button onclick="registrarSaida('${item.ID}', '${item.PRODUTO}')" style="background:var(--roxo-raizen); color:white; border:none; padding:15px 25px; border-radius:12px; cursor:pointer; font-weight:900;">FINALIZAR</button>
                        </div>
                    </td>
                </tr>`;
        });
    }

    // --- RENDERIZAÇÃO DA SUPERVISÃO (EDIÇÃO DE TANQUES) ---
    function renderizarTabelaSupervisao() {
        const corpo = document.getElementById('corpoTabelaSupervisao');
        corpo.innerHTML = "";
        
        dadosTanques.forEach(tanque => {
            corpo.innerHTML += `
                <tr>
                    <td style="font-size:24px;"><b>TK-${tanque.id}</b></td>
                    <td style="color:var(--roxo-raizen); font-weight:900; font-size:20px;">${tanque.produto}</td>
                    <td><input type="number" id="tanque-${tanque.id}" value="${tanque.espaco_disponivel}" class="input-edit-table" style="width:350px; font-size:24px; padding:15px;"></td>
                    <td>
                        <button onclick="atualizarVolumeTanque(${tanque.id})" style="background:var(--verde-raizen); color:white; border:none; padding:20px 40px; border-radius:15px; font-weight:900; cursor:pointer; text-transform:uppercase;">
                            Salvar Alteração
                        </button>
                    </td>
                </tr>`;
        });
    }

    // --- AÇÕES DO SISTEMA ---
    async function registrarSaida(id, produto) {
        const vol = document.getElementById(`vol-${id}`).value;
        if(!vol) return alert("ERRO: Informe o volume descarregado antes de dar saída.");
        
        exibirLoader(true);
        // 1. Marca Saída
        await fetch(`${CONFIG_DB.URL}/rest/v1/registros?ID=eq.${id}`, { 
            method: 'PATCH', 
            headers: CONFIG_DB.HEADERS, 
            body: JSON.stringify({ "SAIDA": new Date().toLocaleString(), "VOLUME": vol }) 
        });

        // 2. Abate do Tanque correspondente
        const tk = dadosTanques.find(t => t.produto === produto);
        if(tk) {
            const novoValor = parseFloat(tk.espaco_disponivel) - parseFloat(vol);
            await fetch(`${CONFIG_DB.URL}/rest/v1/estoque?id=eq.${tk.id}`, { 
                method: 'PATCH', 
                headers: CONFIG_DB.HEADERS, 
                body: JSON.stringify({ "espaco_disponivel": novoValor }) 
            });
        }
        
        await sincronizarSistema();
        exibirLoader(false);
    }

    async function atualizarVolumeTanque(id) {
        const novoValor = document.getElementById(`tanque-${id}`).value;
        exibirLoader(true);
        await fetch(`${CONFIG_DB.URL}/rest/v1/estoque?id=eq.${id}`, { 
            method: 'PATCH', 
            headers: CONFIG_DB.HEADERS, 
            body: JSON.stringify({ "espaco_disponivel": novoValor }) 
        });
        alert("ESTOQUE DO TANQUE ATUALIZADO COM SUCESSO!");
        await sincronizarSistema();
        exibirLoader(false);
    }

    function enviarWhatsapp(tel) {
        const baia = prompt("Informe a BAIA de destino:");
        if(baia) {
            const msg = encodeURIComponent(`RAÍZEN: Motorista, sua descarga está liberada. Por favor, dirija-se à BAIA ${baia}.`);
            window.open(`https://wa.me/55${tel.replace(/\D/g,"")}?text=${msg}`, '_blank');
        }
    }

    async function ativarReabertura() {
        const placa = prompt("Digite a PLACA para REABRIR a jornada:").toUpperCase();
        if(placa) {
            exibirLoader(true);
            const res = await fetch(`${CONFIG_DB.URL}/rest/v1/registros?PLACA=eq.${placa}&order=ID.desc&limit=1`, { headers: CONFIG_DB.HEADERS });
            const busca = await res.json();
            
            if(busca.length > 0) {
                await fetch(`${CONFIG_DB.URL}/rest/v1/registros?ID=eq.${busca[0].ID}`, { 
                    method: 'PATCH', 
                    headers: CONFIG_DB.HEADERS, 
                    body: JSON.stringify({ "SAIDA": null }) 
                });
                alert("SUCESSO: Jornada reaberta. O veículo voltou para a fila operacional.");
                location.reload();
            } else {
                alert("ERRO: Placa não encontrada no sistema.");
                exibirLoader(false);
            }
        }
    }

    function acessoPainel(tipo) {
        const senha = prompt("DIGITE A SENHA DE ACESSO:");
        if(tipo === 'operador' && senha === 'raizen2026') {
            document.getElementById('secao-entrada').style.display = 'none';
            document.getElementById('modulo-operador-full').style.display = 'block';
            sincronizarSistema();
        } else if(tipo === 'supervisao' && senha === 'super2026') {
            document.getElementById('secao-entrada').style.display = 'none';
            document.getElementById('modulo-supervisao').style.display = 'block';
            sincronizarSistema();
        } else {
            alert("SENHA INCORRETA!");
        }
    }

    // ENVIO DO FORMULÁRIO PRINCIPAL
    document.getElementById('formMaster').onsubmit = async (e) => {
        e.preventDefault();
        exibirLoader(true);
        const novoRegistro = {
            "PLACA": document.getElementById('placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('whatsapp').value,
            "JORNADA": document.getElementById('jornada24').checked ? "24 HORAS" : document.getElementById('limite').value,
            "ENTRADA": new Date().toLocaleString()
        };

        await fetch(`${CONFIG_DB.URL}/rest/v1/registros`, { 
            method: 'POST', 
            headers: CONFIG_DB.HEADERS, 
            body: JSON.stringify(novoRegistro) 
        });
        
        alert("VEÍCULO REGISTRADO COM SUCESSO!");
        location.reload();
    };

    // Atualização Automática do Semáforo a cada 60 segundos
    setInterval(renderizarTabelaOperacional, 60000);
</script>
</body>
</html>
