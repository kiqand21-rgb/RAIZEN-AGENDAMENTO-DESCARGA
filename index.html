<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - CONTROLE DE DESCARGA ÁREA 2</title>
    <style>
        /* ==========================================================================
           IDENTIDADE VISUAL E ESTRUTURA (CSS COMPLETO)
           ========================================================================== */
        :root {
            --verde-raizen: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo: #f0f2f5;
            --branco: #ffffff;
            --perigo: #dc3545;
            --sucesso: #28a745;
            --info: #007bff;
            --sombra: 0 10px 30px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--fundo); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        header { 
            background-color: var(--verde-raizen); 
            width: 100%; 
            padding: 30px 0; 
            text-align: center; 
            border-bottom: 8px solid var(--amarelo-raizen); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        header h1 { color: var(--branco); margin: 0; font-size: 26px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        
        .container { 
            width: 92%; 
            max-width: 650px; 
            margin: 40px auto; 
            background: var(--branco); 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: var(--sombra); 
        }

        /* PAINEL ADMINISTRATIVO AMPLIADO */
        #admin-panel { 
            display: none; 
            max-width: 98%; 
            width: 1550px; 
        }

        h2 { color: var(--verde-raizen); text-align: center; border-bottom: 3px solid var(--amarelo-raizen); padding-bottom: 15px; margin-bottom: 30px; text-transform: uppercase; }
        
        label { display: block; margin-top: 20px; font-weight: bold; color: #333; font-size: 16px; }

        input, select { 
            width: 100%; 
            padding: 18px; 
            margin-top: 8px; 
            border: 2px solid #ddd; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 18px; 
            color: #333;
        }

        /* --- CAMPO DE BUSCA DE PLACA (RESTAURADO) --- */
        .busca-container {
            background: #e9ecef;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid #ced4da;
        }
        .busca-container label { margin-top: 0; min-width: 150px; color: var(--verde-raizen); }
        .busca-container input { margin-top: 0; background: white; border: 2px solid var(--verde-raizen); font-weight: bold; }

        .jornada-box {
            background: #f8fbf9;
            padding: 25px;
            border-radius: 15px;
            border: 2px dashed #cbd5e0;
            margin-top: 25px;
        }

        .checkbox-estilizado {
            display: flex; align-items: center; gap: 15px; cursor: pointer; padding: 15px; background: white; border-radius: 12px; border: 1px solid #ddd; margin-top: 15px;
        }
        .checkbox-estilizado input { width: 30px; height: 30px; cursor: pointer; }

        .btn-enviar { 
            width: 100%; padding: 22px; background-color: var(--verde-raizen); color: white; border: none; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 30px;
        }

        /* TABELA E STATUS */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        th { background: var(--verde-raizen); color: white; padding: 20px; text-align: center; font-size: 13px; text-transform: uppercase; }
        td { padding: 18px; border-bottom: 1px solid #eee; text-align: center; font-size: 15px; font-weight: 700; }
        
        /* STATUS DE AGENDAMENTO (SUMIR O PENDENTE) */
        .status-pendente { 
            color: #721c24; background: #f8d7da; padding: 10px 15px; border-radius: 8px; font-weight: 800; border: 1px solid #f5c6cb; display: inline-block;
        }
        .status-agendado { 
            color: #155724; background: #d4edda; padding: 12px; border-radius: 10px; border: 2px solid #c3e6cb; display: block;
        }

        .badge { padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 12px; color: white; }
        .bg-ok { background: var(--sucesso); }
        .bg-vencido { background: var(--perigo); animation: piscar 1.2s infinite; }
        
        @keyframes piscar { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .btn-acao { 
            border: none; border-radius: 8px; padding: 12px; font-weight: bold; cursor: pointer; font-size: 11px; width: 100%; margin-bottom: 8px; color: white; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-agendar { background: white; color: var(--info); border: 2px solid var(--info); }
        .btn-zap { background: #25D366; }
        .btn-concluir { background: var(--info); }

        #modalAgendamento { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { background:white; margin:6% auto; padding:45px; border-radius:30px; width:450px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="container" id="tela-motorista">
    <h2>DESCARGA ÁREA 2</h2>
    <form id="formRegistro">
        <label>Placa do Veículo</label>
        <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>
        
        <label>Produto</label>
        <select id="produto" required>
            <option value="">Selecione...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="S10">S10</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>

        <label>WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(19) 99999-9999" maxlength="15" required>

        <div class="jornada-box">
            <div id="campoHora">
                <label style="margin-top: 0;">Fim da Jornada:</label>
                <input type="time" id="horaJornada" required>
            </div>
            <label class="checkbox-estilizado">
                <input type="checkbox" id="check24h" onchange="alternarRelogio()">
                <span>Jornada 24 Horas (Livre)</span>
            </label>
        </div>

        <button type="submit" class="btn-enviar" id="btnSalvar">REGISTRAR ENTRADA</button>
    </form>
    <div style="text-align:center; margin-top:25px;">
        <button onclick="abrirAdmin()" style="background:none; border:none; color:#bbb; text-decoration:underline; cursor:pointer;">Acesso Administrativo</button>
    </div>
</div>

<div class="container" id="admin-panel">
    <h2>CONTROLE DE PÁTIO - ÁREA 2</h2>
    
    <div class="busca-container">
        <label>🔎 <strong>FILTRAR PLACA:</strong></label>
        <input type="text" id="inputBusca" placeholder="Digite a placa para buscar..." onkeyup="filtrarTabela()">
    </div>

    <div style="overflow-x: auto;">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>WhatsApp</th>
                    <th>Jornada</th>
                    <th style="background:#2d4a3e; color:white; width: 230px;">AGENDAMENTO:</th>
                    <th>Tempo Pátio</th>
                    <th style="width: 180px;">Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-enviar" style="background:#444;" onclick="window.location.reload()">SAIR DO PAINEL</button>
</div>

<div id="modalAgendamento">
    <div class="modal-content">
        <h3 style="margin-top:0;">Agendar Coleta</h3>
        <p id="mostraPlaca" style="font-weight:bold; font-size:24px; color:var(--verde-raizen);"></p>
        <input type="hidden" id="placaAlvo">
        
        <label>Data:</label>
        <input type="date" id="dataColeta">
        
        <label>Hora:</label>
        <input type="time" id="horaColeta">
        
        <button class="btn-enviar" id="btnConfirmarAgenda" onclick="confirmarAgendamento()">GRAVAR NA PLANILHA</button>
        <button onclick="fecharModal()" style="margin-top:20px; border:none; background:none; color:red; font-weight:bold; cursor:pointer;">FECHAR</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // 1. GESTÃO DE UI
    function alternarRelogio() {
        const check = document.getElementById('check24h').checked;
        document.getElementById('campoHora').style.display = check ? 'none' : 'block';
        document.getElementById('horaJornada').required = !check;
    }

    // 2. MÁSCARAS
    document.getElementById('telefone').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    });
    document.getElementById('placa').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    // 3. FILTRO DE BUSCA (RESTAURADO)
    function filtrarTabela() {
        const filter = document.getElementById("inputBusca").value.toUpperCase();
        const trs = document.getElementById("tabelaDados").getElementsByTagName("tr");
        for (let i = 1; i < trs.length; i++) {
            let td = trs[i].getElementsByTagName("td")[0];
            if (td) {
                let txt = td.textContent || td.innerText;
                trs[i].style.display = txt.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }
    }

    // 4. ATUALIZAÇÃO DA TABELA
    function atualizarTabela() {
        const tbody = document.querySelector('#tabelaDados tbody');
        tbody.innerHTML = "<tr><td colspan='6'>Conectando à Planilha...</td></tr>";

        fetch(API_URL + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            tbody.innerHTML = "";
            data.filter(i => i.PLACA && !i.SAIDA).forEach(i => {
                
                // LÓGICA DE AGENDAMENTO: SE TIVER DATA, O PENDENTE SOME
                let agendadoHTML = "";
                if (i.COLETA && i.COLETA.trim() !== "" && i.COLETA !== "undefined" && i.COLETA !== "null") {
                    agendadoHTML = `<span class="status-agendado">📅 ${i.COLETA}</span>`;
                } else {
                    agendadoHTML = `<span class="status-pendente">PENDENTE</span>`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${i.PLACA}</td>
                        <td>${i.TELEFONE}</td>
                        <td>${formatarJornada(i.JORNADA)}</td>
                        <td style="background:#fcfcfc">${agendadoHTML}</td>
                        <td style="color:#666;">${calcularEspera(i.ENTRADA)}</td>
                        <td>
                            <button class="btn-acao btn-agendar" onclick="abrirModalAgenda('${i.PLACA}')">📅 AGENDAR</button>
                            <button class="btn-acao btn-zap" onclick="chamarWhatsApp('${i.TELEFONE}', '${i.PLACA}', '${i.COLETA}')">📱 CHAMAR</button>
                            <button class="btn-acao btn-concluir" onclick="finalizarDescarga('${i.PLACA}')">✅ OK</button>
                        </td>
                    </tr>`;
            });
        });
    }

    // 5. AUXILIARES
    function formatarJornada(fim) {
        if (!fim || fim === "24 Horas") return '<span class="badge bg-ok">LIVRE (24H)</span>';
        const [h, m] = fim.split(':');
        const d = new Date(); d.setHours(h, m, 0);
        return (d < new Date()) ? `<span class="badge bg-vencido">VENCIDA</span>` : `<span class="badge bg-ok">EM DIA</span>`;
    }

    function calcularEspera(entrada) {
        if(!entrada) return "0m";
        const p = entrada.split(', ');
        const d = p[0].split('/'); const h = p[1].split(':');
        const dt = new Date(d[2], d[1]-1, d[0], h[0], h[1]);
        const diff = Math.floor((new Date() - dt) / 60000);
        return diff > 60 ? Math.floor(diff/60) + "h " + (diff%60) + "m" : diff + " min";
    }

    // 6. AGENDAMENTO E GRAVAÇÃO
    function abrirModalAgenda(placa) {
        document.getElementById('placaAlvo').value = placa;
        document.getElementById('mostraPlaca').innerText = "VEÍCULO: " + placa;
        document.getElementById('modalAgendamento').style.display = 'block';
    }
    function fecharModal() { document.getElementById('modalAgendamento').style.display = 'none'; }

    function confirmarAgendamento() {
        const placa = document.getElementById('placaAlvo').value;
        const d = document.getElementById('dataColeta').value.split('-').reverse().join('/');
        const h = document.getElementById('horaColeta').value;
        if(!d || !h || d === "") return alert("Preencha Data e Hora!");

        const btn = document.getElementById('btnConfirmarAgenda');
        btn.innerText = "GRAVANDO...";

        fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ "COLETA": d + " às " + h })
        }).then(() => {
            fecharModal();
            atualizarTabela();
            btn.innerText = "GRAVAR NA PLANILHA";
        });
    }

    // 7. ENVIO MOTORISTA E LOGIN
    document.getElementById('formRegistro').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSalvar');
        btn.innerText = "ENVIANDO...";

        const dados = {
            "PLACA": document.getElementById('placa').value,
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('telefone').value,
            "JORNADA": document.getElementById('check24h').checked ? "24 Horas" : document.getElementById('horaJornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "COLETA": "", "SAIDA": ""
        };

        fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) })
        .then(() => location.reload());
    });

    function abrirAdmin() { if (prompt("Senha:") === "raizen2026") { document.getElementById('tela-motorista').style.display='none'; document.getElementById('admin-panel').style.display='block'; atualizarTabela(); } }
    function finalizarDescarga(placa) { if(confirm("Concluir descarga?")) fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ "SAIDA": new Date().toLocaleString() }) }).then(() => atualizarTabela()); }
    function chamarWhatsApp(tel, placa, coleta) {
        const b = prompt("BAIA?");
        if(b) {
            const m = `*RAÍZEN*%0APLACA: *${placa}*%0ACOLETA: *${coleta || 'Pendente'}*%0ABAIA: *${b}*%0A%0AFavor entrar para descarga.`;
            window.open(`https://web.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${m}`);
        }
    }
</script>
</body>
</html>
