<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAÍZEN - SISTEMA DE GESTÃO V3.7 - MOBILE FRIENDLY</title>
    
    <style>
        :root {
            --verde-raizen: #4d6d5d; 
            --destaque-raizen: #84207d; /* Roxo Pantone 512 C */
            --fundo-cinza: #f4f7f6;
            --branco: #ffffff;
            --cor-pendente: #dc3545;
            --cor-sucesso: #28a745;
            --cor-info: #007bff;
            --sombra-premium: 0 15px 35px rgba(0,0,0,0.15);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--fundo-cinza); 
            margin: 0; 
            padding-bottom: 50px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        header { 
            background-color: var(--verde-raizen); 
            width: 100%; 
            padding: 50px 0; 
            text-align: center; 
            border-bottom: 12px solid var(--destaque-raizen); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
            position: sticky;
            top: 0;
            z-index: 9999;
        }
        
        header h1 { 
            color: var(--branco); 
            margin: 0; 
            font-size: 32px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .caixa-principal { 
            width: 95%; 
            max-width: 800px; 
            margin: 60px auto; 
            background: var(--branco); 
            padding: 50px; 
            border-radius: 45px; 
            box-shadow: var(--sombra-premium); 
            border: 1px solid #e0e0e0;
        }

        #painel-gestao-admin { 
            display: none; 
            max-width: 98%; 
            width: 1780px; 
            margin-top: 40px;
        }

        h2 { 
            color: var(--verde-raizen); 
            text-align: center; 
            border-bottom: 6px solid var(--destaque-raizen); 
            padding-bottom: 25px; 
            margin-bottom: 45px; 
            text-transform: uppercase;
            font-weight: 800;
            font-size: 26px;
        }
        
        .grupo-campo { margin-bottom: 35px; }

        label { 
            display: block; 
            margin-bottom: 15px; 
            font-weight: 900; 
            color: #2c3e50; 
            font-size: 19px; 
        }

        input, select { 
            width: 100%; 
            padding: 22px; 
            border: 2px solid #ced4da; 
            border-radius: 20px; 
            box-sizing: border-box; 
            font-size: 20px; 
            color: #333;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--destaque-raizen);
            box-shadow: 0 0 10px rgba(132, 32, 125, 0.2);
        }
        
        .wrapper-busca {
            background: #e9ecef;
            padding: 35px;
            border-radius: 25px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            border: 2px solid #cbd3da;
        }
        .wrapper-busca label { margin-bottom: 0; min-width: 180px; color: var(--verde-raizen); font-size: 20px; }

        .tabela-container { 
            overflow-x: auto; 
            background: white; 
            border-radius: 30px; 
            border: 1px solid #ddd;
        }
        
        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        
        th { 
            background: var(--verde-raizen); 
            color: white; 
            padding: 30px 15px; 
            text-align: center; 
            font-size: 14px; 
            text-transform: uppercase;
        }

        th.coluna-agendamento { background: #856404; border-left: 4px solid var(--destaque-raizen); }
        
        td { 
            padding: 22px 12px; 
            border-bottom: 1px solid #f0f0f0; 
            text-align: center; 
            font-size: 17px; 
            font-weight: 700; 
        }

        .wrapper-inputs-agendamento {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }

        .input-data-tabela, .input-hora-tabela {
            width: 140px;
            padding: 8px;
            border: 2px solid var(--destaque-raizen);
            border-radius: 10px;
            font-weight: 900;
            text-align: center;
            background: #fdf2ff;
            font-size: 13px;
        }

        .btn-salvar-agendamento {
            background: var(--destaque-raizen);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 11px;
            text-transform: uppercase;
        }

        .etiqueta-prod { 
            padding: 10px 18px; 
            border-radius: 12px; 
            font-size: 13px; 
            color: white; 
            display: inline-block; 
            min-width: 120px;
            font-weight: 900;
        }
        .cor-gasolina { background: #ffc107; color: #000; }
        .cor-biodiesel { background: #1a1a1a; }
        .cor-etanol { background: #28a745; }
        .cor-s10 { background: #6c757d; }

        .btn-geral { 
            border: none; border-radius: 15px; padding: 18px; font-weight: bold; cursor: pointer; font-size: 11px; 
            width: 100%; margin-bottom: 10px; color: white; text-transform: uppercase; 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-whats { background: #25D366; }
        .btn-concluir { background: var(--cor-info); }

        .btn-principal-form { 
            width: 100%; padding: 30px; background-color: var(--destaque-raizen); color: white; border: none; border-radius: 25px; 
            font-size: 26px; font-weight: 900; cursor: pointer; margin-top: 45px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        #msgSucesso {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 25px;
            border-radius: 20px;
            margin-top: 25px;
            font-weight: 900;
            font-size: 22px;
            text-align: center;
            border: 3px solid #c3e6cb;
        }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="caixa-principal" id="container-motorista">
    <h2>REGISTRO DE DESCARGA</h2>
    <form id="formularioRaizen">
        <div class="grupo-campo"><label>Placa do Veículo</label><input type="text" id="inputPlaca" placeholder="ABC-1234" maxlength="8" required></div>
        <div class="grupo-campo">
            <label>Produto para Descarga</label>
            <select id="inputProduto" required>
                <option value="">Selecione o produto...</option>
                <option value="GASOLINA">GASOLINA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="S10">S10</option>
                <option value="ANIDRO">ANIDRO</option>
                <option value="HIDRATADO">HIDRATADO</option>
            </select>
        </div>
        <div class="grupo-campo"><label>WhatsApp para Contato</label><input type="tel" id="inputZap" placeholder="(19) 99999-9999" maxlength="15" required></div>
        
        <div style="background:#f8f9fa; padding:40px; border-radius:30px; border:2px dashed #ccc;">
            <div id="boxRelogio"><label>Horário Fim de Jornada:</label><input type="time" id="inputHoraJornada" required></div>
            <label style="display:flex; align-items:center; gap:20px; margin-top:30px; cursor:pointer;">
                <input type="checkbox" id="chk24" style="width:30px; height:30px;" onchange="document.getElementById('boxRelogio').style.display = this.checked ? 'none' : 'block'; document.getElementById('inputHoraJornada').required = !this.checked;">
                <span style="font-weight:900; color:var(--destaque-raizen); font-size:18px;">Minha jornada é de 24 Horas</span>
            </label>
        </div>

        <button type="submit" class="btn-principal-form" id="btnEnviar">REGISTRAR ENTRADA</button>
        <div id="msgSucesso">✅ REGISTRO REALIZADO COM SUCESSO!</div>
    </form>
    <div style="text-align:center; margin-top:40px;"><button onclick="validaAcessoAdmin()" style="background:none; border:none; color:#bbb; text-decoration:underline; cursor:pointer;">Área Administrativa</button></div>
</div>

<div class="caixa-principal" id="painel-gestao-admin">
    <h2>GERENCIAMENTO DE PÁTIO - ÁREA 2</h2>
    <div class="wrapper-busca"><label>🔍 <strong>FILTRAR:</strong></label><input type="text" id="buscaAdmin" placeholder="Busque por Placa ou Produto..." onkeyup="filtrarTabela()"></div>
    <div class="tabela-container">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Produto</th>
                    <th>WhatsApp</th>
                    <th>Jornada Limite</th>
                    <th>Permanência</th>
                    <th class="coluna-agendamento">AGENDAMENTO NO COLETA (DATA/HORA)</th>
                    <th style="width: 190px;">Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-principal-form" style="background:#666;" onclick="window.location.reload()">VOLTAR PARA ENTRADA</button>
</div>

<script>
    const SHEET_API = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const NOME_COLUNA_AGENDAMENTO = "AGENDAMENTO NO COLETA";

    // MÁSCARAS DE INPUT
    document.getElementById('inputZap').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    });

    document.getElementById('inputPlaca').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    function filtrarTabela() {
        const termo = document.getElementById("buscaAdmin").value.toUpperCase();
        const linhas = document.querySelectorAll("#tabelaDados tbody tr");
        linhas.forEach(linha => {
            linha.style.display = linha.textContent.toUpperCase().includes(termo) ? "" : "none";
        });
    }

    function atualizarPainel() {
        const corpo = document.querySelector('#tabelaDados tbody');
        corpo.innerHTML = "<tr><td colspan='7' style='padding:40px; font-size:20px;'>Carregando dados Raízen...</td></tr>";

        fetch(SHEET_API + "?t=" + new Date().getTime())
        .then(r => r.json())
        .then(dados => {
            corpo.innerHTML = "";
            const ativos = dados.filter(f => f.PLACA && !f.SAIDA).sort((a, b) => {
                let valA = a[NOME_COLUNA_AGENDAMENTO] || "9999-99-99 99:99";
                let valB = b[NOME_COLUNA_AGENDAMENTO] || "9999-99-99 99:99";
                return valA.localeCompare(valB);
            });

            ativos.forEach(i => {
                let cProd = "cor-s10";
                if(i.PRODUTO.includes("GASOLINA")) cProd = "cor-gasolina";
                if(i.PRODUTO.includes("B100")) cProd = "cor-biodiesel";
                if(i.PRODUTO.includes("HIDRATADO") || i.PRODUTO.includes("ANIDRO")) cProd = "cor-etanol";

                let [dataSalva, horaSalva] = (i[NOME_COLUNA_AGENDAMENTO] || " ").split(" ");

                corpo.innerHTML += `
                    <tr>
                        <td style="font-size:19px;">${i.PLACA}</td>
                        <td><span class="etiqueta-prod ${cProd}">${i.PRODUTO}</span></td>
                        <td>${i.TELEFONE}</td>
                        <td>${calcJornadaStatus(i.JORNADA)}</td>
                        <td style="font-size:12px; color:#888;">${calcTempoPátio(i.ENTRADA)}</td>
                        <td style="background: #fdf2ff; border-left: 2px solid #84207d;">
                            <div class="wrapper-inputs-agendamento">
                                <input type="date" class="input-data-tabela" id="date-${i.PLACA}" value="${dataSalva || ''}">
                                <input type="time" class="input-hora-tabela" id="time-${i.PLACA}" value="${horaSalva || ''}">
                                <button class="btn-salvar-agendamento" onclick="salvarAgendamentoFull('${i.PLACA}')">SALVAR PORTAL</button>
                            </div>
                        </td>
                        <td>
                            <button class="btn-geral btn-whats" onclick="chamarZapMotorista('${i.TELEFONE}')">📱 WHATSAPP</button>
                            <button class="btn-geral btn-concluir" onclick="finalizaDescarga('${i.PLACA}')">✅ CONCLUIR</button>
                        </td>
                    </tr>`;
            });
        }).catch(err => { corpo.innerHTML = "Erro ao conectar com a base."; });
    }

    // FUNÇÃO PARA DETECTAR MOBILE E ABRIR O APP OU WEB
    function chamarZapMotorista(tel) {
    const baia = prompt("Para qual BAIA o motorista deve ir?");
    if (!baia) return;

    const msg = `Olá%0AMotorista vamos descarregar?%0ABaia *${baia}* - Área 02%0AObrigado!`;
    const fone = tel.replace(/\D/g, "");
    
    // Este formato abaixo funciona tanto no PC quanto no Celular (abre o App)
    const linkFinal = `https://api.whatsapp.com/send?phone=55${fone}&text=${msg}`;
    
    window.open(linkFinal, '_blank');
}
    function salvarAgendamentoFull(placa) {
        const d = document.getElementById(`date-${placa}`).value;
        const h = document.getElementById(`time-${placa}`).value;
        if(!d || !h) return alert("Preencha Data e Hora!");

        let dadosUpdate = {};
        dadosUpdate[NOME_COLUNA_AGENDAMENTO] = `${d} ${h}`;

        fetch(`${SHEET_API}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dadosUpdate)
        }).then(res => { if(res.ok) { alert("Sincronizado com Sucesso!"); atualizarPainel(); } });
    }

    function calcJornadaStatus(j) {
        if(j === "24 Horas") return '<span style="color:green">LIVRE (24H)</span>';
        if(!j) return "-";
        const agora = new Date();
        const [h, m] = j.split(':');
        const limite = new Date(); limite.setHours(h, m, 0);
        return (limite < agora) ? `<span style="color:red">VENCIDA (${j})</span>` : `<span style="color:green">OK (${j})</span>`;
    }

    function calcTempoPátio(entradaStr) {
        if(!entradaStr) return "-";
        try {
            const partes = entradaStr.split(', ');
            const dataP = partes[0].split('/');
            const horaP = partes[1].split(':');
            const dEntrada = new Date(dataP[2], dataP[1]-1, dataP[0], horaP[0], horaP[1]);
            const diffMs = new Date() - dEntrada;
            const diffMin = Math.floor(diffMs / 60000);
            if (diffMin < 60) return diffMin + "m";
            const horas = Math.floor(diffMin / 60);
            const mins = diffMin % 60;
            return horas + "h " + mins + "m";
        } catch(e) { return "-"; }
    }

    document.getElementById('formularioRaizen').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.innerText = "REGISTRANDO..."; btn.disabled = true;

        const payload = {
            "PLACA": document.getElementById('inputPlaca').value,
            "PRODUTO": document.getElementById('inputProduto').value,
            "TELEFONE": document.getElementById('inputZap').value,
            "JORNADA": document.getElementById('chk24').checked ? "24 Horas" : document.getElementById('inputHoraJornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "SAIDA": ""
        };
        payload[NOME_COLUNA_AGENDAMENTO] = "";

        fetch(SHEET_API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify([payload])
        }).then(() => {
            document.getElementById('msgSucesso').style.display = "block";
            setTimeout(() => { location.reload(); }, 2500);
        });
    });

    function finalizaDescarga(placa) {
        if(confirm(`Confirmar saída da placa ${placa}?`)) {
            fetch(`${SHEET_API}/PLACA/${placa}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ "SAIDA": new Date().toLocaleString('pt-BR') })
            }).then(() => atualizarPainel());
        }
    }

    function validaAcessoAdmin() {
        const senha = prompt("Senha de Operador:");
        if(senha === "raizen2026") {
            document.getElementById('container-motorista').style.display = 'none';
            document.getElementById('painel-gestao-admin').style.display = 'block';
            atualizarPainel();
        } else if(senha !== null) {
            alert("Acesso Negado.");
        }
    }

    // Adicionado para garantir que a tabela carregue se alguém entrar direto na admin por erro
    window.addEventListener('load', () => {
        if(document.getElementById('painel-gestao-admin').style.display === 'block') {
            atualizarPainel();
        }
    });

    // Função de verificação extra de robustez para evitar perda de dados
    console.log("Portal Raízen V3.7 - Carregado com Sucesso.");
</script>
</body>
</html>
