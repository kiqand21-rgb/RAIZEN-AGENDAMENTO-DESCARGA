<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO V21.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-alerta: #e11d48;
            --cor-sucesso: #10b981;
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--fundo-base); color: #1e293b; padding-bottom: 50px; }

        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 30px 15px; 
            text-align: center; 
            border-bottom: 10px solid var(--roxo-raizen);
        }

        .logo-raizen-master { color: var(--branco); font-size: 40px; font-weight: 900; letter-spacing: 5px; }

        .card-industrial { 
            width: 95%; max-width: 600px; margin: 20px auto; 
            background: var(--branco); padding: 25px; border-radius: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-left: 15px solid var(--roxo-raizen);
        }

        #secao-operador { display: none; width: 98%; margin: 15px auto; }

        h2 { color: var(--roxo-raizen); font-size: 20px; text-transform: uppercase; margin-bottom: 20px; text-align: center; }

        /* --- AJUSTE DA TABELA PARA NÃO ROLAR --- */
        .moldura-tabela { 
            background: white; border-radius: 20px; 
            overflow: hidden; /* Corta a rolagem indesejada */
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        th { background: #0f172a; color: white; padding: 12px 5px; font-size: 10px; text-transform: uppercase; }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; font-weight: 700; word-wrap: break-word; }

        /* Colunas que ocultamos no mobile para caber na tela */
        .col-extra { display: none; }

        @media (min-width: 800px) {
            .col-extra { display: table-cell; }
            table { table-layout: auto; }
            th { font-size: 13px; }
            td { font-size: 16px; }
        }

        /* Tags de Produto Compactas */
        .tag-prod { 
            padding: 5px; border-radius: 8px; font-size: 9px; 
            display: block; text-align: center; font-weight: 900;
        }
        .tag-gasosa { background: #ff8c00; color: #fff; }
        .tag-b100 { background: #5d4037; color: #fff; }
        .tag-anidro { background: #0056b3; color: #fff; }
        .tag-hidratado { border: 1px solid #0056b3; color: #0056b3; }
        .tag-s10 { border: 1px solid #334155; color: #334155; }

        /* Semáforo Compacto */
        .box-semaforo { 
            padding: 5px; border-radius: 8px; font-size: 10px; 
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .semaforo-verde { background: #dcfce7; color: #166534; }
        .semaforo-vermelho { background: #fee2e2; color: #991b1b; }
        .led { width: 8px; height: 8px; border-radius: 50%; }
        .led-g { background: var(--cor-sucesso); }
        .led-r { background: var(--cor-alerta); }

        /* Botões de Ação */
        .btn-acao { 
            width: 100%; padding: 8px; border-radius: 8px; border: none; 
            color: white; font-weight: 900; font-size: 10px; margin-bottom: 4px;
        }

        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 16px; }
        .btn-principal { width: 100%; padding: 20px; background: var(--roxo-raizen); color: white; border: none; border-radius: 15px; font-weight: 900; font-size: 18px; }
    </style>
</head>
<body>

<header>
    <div class="logo-raizen-master">RAÍZEN</div>
</header>

<div class="card-industrial" id="modulo-entrada">
    <h2>ENTRADA DE VEÍCULO</h2>
    <form id="formDescarga">
        <input type="text" id="campo_placa" placeholder="PLACA (ABC-1234)" required>
        <select id="campo_produto" required>
            <option value="">PRODUTO...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
            <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
            <option value="DIESEL S10">DIESEL S10</option>
        </select>
        <input type="tel" id="campo_whatsapp" placeholder="WHATSAPP" required>
        <label style="font-size: 12px; font-weight: 900;">TÉRMINO DA JORNADA:</label>
        <input type="time" id="campo_hora_limite">
        <button type="submit" class="btn-principal" id="btn_registrar">REGISTRAR</button>
    </form>
    <button onclick="acessoOperador()" style="margin-top:20px; background:none; border:none; color:var(--roxo-raizen); text-decoration:underline; width:100%;">PAINEL ADM</button>
</div>

<div id="secao-operador">
    <h2>FILA ÁREA 02</h2>
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th style="width: 25%;">PLACA</th>
                    <th style="width: 25%;">PRODUTO</th>
                    <th style="width: 25%;">JORNADA</th>
                    <th class="col-extra">CONTATO</th>
                    <th class="col-extra">ENTRADA</th>
                    <th style="width: 25%;">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="dadosFila"></tbody>
        </table>
    </div>
    <button class="btn-principal" style="margin-top:20px; background:#475569;" onclick="location.reload()">VOLTAR</button>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const SENHA_OP = 'raizen2026';

    function gerarSemaforo(valor) {
        if(!valor) return "-";
        const agora = new Date();
        const t = valor.split(':');
        if(t.length < 2) return `<div class="box-semaforo semaforo-vermelho">24H</div>`;
        const limite = new Date(); limite.setHours(t[0], t[1], 0);
        const expirou = agora > limite;
        return `<div class="box-semaforo ${expirou?'semaforo-vermelho':'semaforo-verde'}">
            <span class="led ${expirou?'led-r':'led-g'}"></span> ${valor}
        </div>`;
    }

    async function sincronizarFila() {
        const corpo = document.getElementById('dadosFila');
        corpo.innerHTML = "<tr><td colspan='4'>...</td></tr>";
        const res = await fetch(API_URL + "?t=" + Date.now());
        const json = await res.json();
        const ativos = json.filter(x => x.PLACA && !x.SAIDA);
        
        corpo.innerHTML = "";
        ativos.forEach(item => {
            const tr = document.createElement('tr');
            // Ao clicar na linha no celular, mostra detalhes
            tr.onclick = () => { if(window.innerWidth < 800) alert(`📞 ${item.TELEFONE}\n🕒 Entrada: ${item.ENTRADA}`); };
            
            tr.innerHTML = `
                <td style="color:var(--roxo-raizen);">${item.PLACA}</td>
                <td><span class="tag-prod tag-${item.PRODUTO.split(' ')[0].toLowerCase()}">${item.PRODUTO.substring(0,10)}</span></td>
                <td>${gerarSemaforo(item.JORNADA)}</td>
                <td class="col-extra">${item.TELEFONE}</td>
                <td class="col-extra">${item.ENTRADA}</td>
                <td>
                    <button class="btn-acao" style="background:#22c55e;" onclick="event.stopPropagation(); window.open('https://api.whatsapp.com/send?phone=55${item.TELEFONE.replace(/\D/g,'')}&text=Motorista da placa ${item.PLACA}, favor encostar para descarga.')">ZAP</button>
                    <button class="btn-acao" style="background:#3b82f6;" onclick="event.stopPropagation(); finalizar('${item.PLACA}')">FIM</button>
                </td>
            `;
            corpo.appendChild(tr);
        });
    }

    async function finalizar(placa) {
        if(confirm(`FINALIZAR ${placa}?`)) {
            await fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({"SAIDA": new Date().toLocaleString()}) });
            sincronizarFila();
        }
    }

    document.getElementById('formDescarga').onsubmit = async e => {
        e.preventDefault();
        const dados = {
            "PLACA": document.getElementById('campo_placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('campo_produto').value,
            "TELEFONE": document.getElementById('campo_whatsapp').value,
            "JORNADA": document.getElementById('campo_hora_limite').value || "24 HORAS",
            "ENTRADA": new Date().toLocaleString(),
            "SAIDA": ""
        };
        await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) });
        alert("REGISTRADO!");
        location.reload();
    };

    function acessoOperador() {
        if(prompt("SENHA:") === SENHA_OP) {
            document.getElementById('modulo-entrada').style.display = 'none';
            document.getElementById('secao-operador').style.display = 'block';
            sincronizarFila();
        }
    }
</script>
</body>
</html>
