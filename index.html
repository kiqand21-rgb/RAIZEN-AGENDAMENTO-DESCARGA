<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - GESTÃO OPERACIONAL V20.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-alerta: #e11d48;
            --cor-sucesso: #10b981;
            --cor-texto: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }

        body { 
            background-color: var(--fundo-base); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
            color: var(--cor-texto);
            padding-bottom: 100px;
        }

        /* --- ESTILO DO HEADER (VOLTOU AO ORIGINAL) --- */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 90px 20px; 
            text-align: center; 
            border-bottom: 25px solid var(--roxo-raizen);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .logo-raizen-master {
            color: var(--branco);
            font-size: 85px;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }

        header h1 { 
            color: var(--branco); 
            font-size: 24px; 
            letter-spacing: 6px; 
            font-weight: 300;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* --- CARD DO MOTORISTA (VOLTOU AO ORIGINAL GIGANTE) --- */
        .card-industrial { 
            width: 94%; 
            max-width: 1100px; 
            margin: 60px auto; 
            background: var(--branco); 
            padding: 70px; 
            border-radius: 60px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.2); 
            border-left: 35px solid var(--roxo-raizen);
            position: relative;
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 50px; 
            font-size: 38px;
            border-bottom: 12px solid #f1f5f9;
            padding-bottom: 30px;
        }

        .wrapper-campo { margin-bottom: 40px; position: relative; }
        
        label { 
            display: block; 
            margin-bottom: 15px; 
            font-weight: 900; 
            color: var(--verde-raizen); 
            font-size: 16px; 
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        label i { color: var(--roxo-raizen); font-size: 20px; }

        input, select { 
            width: 100%; 
            padding: 28px; 
            border: 5px solid #e2e8f0; 
            border-radius: 30px; 
            font-size: 24px; 
            font-weight: 700;
            background: #f8fafc;
            color: #334155;
            transition: all 0.3s;
        }

        .container-jornada-exp {
            background: #fffbeb;
            padding: 50px;
            border-radius: 50px;
            border: 6px solid var(--ouro-raizen);
            margin: 40px 0;
        }

        .btn-principal { 
            width: 100%; 
            padding: 40px; 
            background: var(--roxo-raizen); 
            color: white; 
            border: none; 
            border-radius: 35px; 
            font-size: 30px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 25px 50px rgba(132, 32, 125, 0.4);
        }

        /* --- PAINEL ADM AJUSTADO (SÓ AQUI MUDA) --- */
        #secao-operador { 
            display: none; 
            width: 98%; 
            max-width: 2200px; 
            margin: 20px auto;
            background: var(--branco);
            padding: 20px;
            border-radius: 40px;
        }

        .moldura-tabela { 
            overflow-x: hidden; 
            border: 3px solid #e2e8f0;
            border-radius: 30px;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        th { background: #0f172a; color: white; padding: 15px 2px; font-size: 10px; text-transform: uppercase; }
        
        td { 
            padding: 15px 2px; 
            border-bottom: 2px solid #f1f5f9; 
            text-align: center; 
            font-weight: 800; 
            font-size: 12px; 
            word-wrap: break-word; 
        }

        .tag-prod {
            padding: 6px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 900;
            display: block;
            text-transform: uppercase;
        }
        .tag-gasosa { background: #ff8c00; color: #fff; } 
        .tag-b100 { background: #5d4037; color: #fff; } 
        .tag-anidro { background: #0056b3; color: #fff; } 
        .tag-hidratado { border: 2px solid #0056b3; color: #0056b3; } 
        .tag-s10 { border: 2px solid #5d4037; color: #5d4037; } 

        .box-semaforo {
            padding: 6px;
            border-radius: 10px;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .semaforo-verde { background: #dcfce7; color: #166534; }
        .semaforo-vermelho { background: #fee2e2; color: #991b1b; }
        .led { width: 10px; height: 10px; border-radius: 50%; }

        .btn-acao { 
            width: 100%; 
            padding: 12px 2px; 
            border-radius: 10px; 
            border: none; 
            color: white; 
            font-weight: 900; 
            font-size: 10px; 
            margin-bottom: 5px; 
            cursor: pointer; 
        }

    </style>
</head>
<body>

<header>
    <div class="logo-raizen-master">RAÍZEN</div>
    <h1>CONTROLE DE DESCARGAS | TERMINAL PAULÍNIA</h1>
</header>

<div class="card-industrial" id="modulo-entrada">
    <h2><i class="fa-solid fa-file-signature"></i> REGISTRO DE ENTRADA</h2>
    <form id="formDescarga">
        <div class="wrapper-campo">
            <label><i class="fa-solid fa-truck-front"></i> PLACA DO VEÍCULO</label>
            <input type="text" id="campo_placa" placeholder="ABC-1234" maxlength="8" required>
        </div>
        <div class="wrapper-campo">
            <label><i class="fa-solid fa-droplet"></i> PRODUTO CARREGADO</label>
            <select id="campo_produto" required>
                <option value="">-- SELECIONE O PRODUTO --</option>
                <option value="GASOLINA">GASOLINA COMUM / ADITIVADA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                <option value="DIESEL S10">DIESEL S10</option>
            </select>
        </div>
        <div class="wrapper-campo">
            <label><i class="fa-brands fa-whatsapp"></i> NÚMERO DO WHATSAPP</label>
            <input type="tel" id="campo_whatsapp" placeholder="(19) 99999-9999" required>
        </div>
        <div class="container-jornada-exp">
            <div id="box-horario-input">
                <label><i class="fa-solid fa-clock"></i> TÉRMINO DA JORNADA</label>
                <input type="time" id="campo_hora_limite">
            </div>
        </div>
        <button type="submit" class="btn-principal" id="btn_registrar">EFETUAR REGISTRO NO PÁTIO</button>
    </form>
    <div style="text-align:center; margin-top:60px;">
        <button onclick="acessoOperador()" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; cursor:pointer; font-size:18px; text-decoration:underline;">MÓDULO DE GESTÃO DO OPERADOR</button>
    </div>
</div>

<div id="secao-operador">
    <h2><i class="fa-solid fa-list-check"></i> FILA DE DESCARGA - ÁREA 02</h2>
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th style="width: 18%;">PLACA</th>
                    <th style="width: 20%;">PRODUTO</th>
                    <th style="width: 17%;">COLETA</th>
                    <th style="width: 20%;">JORNADA</th>
                    <th style="width: 25%;">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="dadosFila"></tbody>
        </table>
    </div>
    <div style="margin-top:30px; display:flex; gap:20px;">
        <button class="btn-principal" style="background:#475569; font-size: 20px; padding: 20px;" onclick="location.reload()">SAIR</button>
        <button class="btn-principal" style="background:var(--verde-raizen); font-size: 20px; padding: 20px;" onclick="sincronizarFila()">ATUALIZAR</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';
    const SENHA_OP = 'raizen2026';

    function gerarSemaforo(valor) {
        if(!valor || valor === "24 HORAS") return `<div class="box-semaforo semaforo-vermelho"><span class="led" style="background:red"></span> 24H</div>`;
        const agora = new Date();
        const t = valor.split(':');
        const limite = new Date(); limite.setHours(t[0], t[1], 0);
        const exp = agora > limite;
        return `<div class="box-semaforo ${exp?'semaforo-vermelho':'semaforo-verde'}"><span class="led" style="background:${exp?'red':'#10b981'}"></span> ${valor}</div>`;
    }

    async function sincronizarFila() {
        const corpo = document.getElementById('dadosFila');
        corpo.innerHTML = "<tr><td colspan='5'>BUSCANDO...</td></tr>";
        const res = await fetch(API_URL + "?t=" + Date.now());
        const json = await res.json();
        let ativos = json.filter(x => x.PLACA && !x.SAIDA);
        
        ativos.sort((a, b) => (a['AGENDAMENTO NO COLETA'] || '99:99').localeCompare(b['AGENDAMENTO NO COLETA'] || '99:99'));

        corpo.innerHTML = "";
        ativos.forEach(item => {
            const tr = document.createElement('tr');
            const classeProd = "tag-" + item.PRODUTO.split(' ')[0].toLowerCase();
            const agenda = item['AGENDAMENTO NO COLETA'] ? (item['AGENDAMENTO NO COLETA'].split('T')[1] || item['AGENDAMENTO NO COLETA']) : 'S/AG';

            tr.innerHTML = `
                <td style="color:var(--roxo-raizen);">${item.PLACA}</td>
                <td><span class="tag-prod ${classeProd}">${item.PRODUTO}</span></td>
                <td style="background:#fffde7;">${agenda}</td>
                <td>${gerarSemaforo(item.JORNADA)}</td>
                <td>
                    <button class="btn-acao" style="background:#22c55e;" onclick="window.open('https://api.whatsapp.com/send?phone=55${item.TELEFONE.replace(/\D/g,'')}&text=Motorista ${item.PLACA}, favor encostar.')">ZAP</button>
                    <button class="btn-acao" style="background:#3b82f6;" onclick="finalizar('${item.PLACA}')">FIM</button>
                </td>
            `;
            corpo.appendChild(tr);
        });
    }

    async function finalizar(placa) {
        if(confirm(`FINALIZAR ${placa}?`)) {
            await fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({"SAIDA": new Date().toLocaleString()}) });
            sincronizarFila();
        }
    }

    document.getElementById('formDescarga').onsubmit = async e => {
        e.preventDefault();
        const dados = {
            "PLACA": document.getElementById('campo_placa').value.toUpperCase(),
            "PRODUTO": document.getElementById('campo_produto').value,
            "TELEFONE": document.getElementById('campo_whatsapp').value,
            "JORNADA": document.getElementById('campo_hora_limite').value || "24 HORAS",
            "ENTRADA": new Date().toLocaleString(),
            "SAIDA": ""
        };
        await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) });
        alert("REGISTRADO!");
        location.reload();
    };

    function acessoOperador() {
        if(prompt("SENHA:") === SENHA_OP) {
            document.getElementById('modulo-entrada').style.display = 'none';
            document.getElementById('secao-operador').style.display = 'block';
            sincronizarFila();
        }
    }
</script>
</body>
</html>
