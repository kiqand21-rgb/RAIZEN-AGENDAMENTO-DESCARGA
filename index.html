<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>RAÍZEN - GESTÃO OPERACIONAL V26.9 (BLINDADA)</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM INDUSTRIAL RAÍZEN --- */
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo-base: #f1f5f9;
            --branco: #ffffff;
            --cor-erro: #e11d48;
            --cor-sucesso: #10b981;
            --sombra-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background-color: var(--fundo-base); 
            color: #1e293b; 
            min-height: 100vh; 
            padding-bottom: 80px;
            overflow-x: auto;
        }

        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #1a241f 100%); 
            padding: 80px 20px; 
            text-align: center; 
            border-bottom: 25px solid var(--roxo-raizen);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            position: relative;
        }

        .logo-display {
            color: var(--branco); 
            font-size: 100px; 
            font-weight: 900;
            letter-spacing: 20px; 
            text-transform: uppercase;
        }

        .card-master { 
            width: 94%; 
            max-width: 1100px; 
            margin: -60px auto 60px; 
            background: var(--branco); 
            padding: 50px; 
            border-radius: 40px; 
            box-shadow: var(--sombra-premium); 
            border-left: 30px solid var(--roxo-raizen);
            z-index: 10;
            position: relative;
        }

        /* PAINEL OPERADOR E SUPERVISÃO */
        #modulo-operador-full, #modulo-supervisao { 
            display: none; 
            width: 98%; 
            max-width: 1850px; 
            margin: 40px auto;
            background: var(--branco); 
            padding: 35px; 
            border-radius: 30px;
            box-shadow: var(--sombra-premium); 
            zoom: 0.85;
        }

        h2 { 
            color: var(--roxo-raizen); 
            text-align: center; 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 40px; 
            font-size: 32px; 
            border-bottom: 8px solid #f8fafc;
            padding-bottom: 20px;
        }

        .wrapper-input { margin-bottom: 30px; }
        
        label { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 15px; 
            font-weight: 900; 
            color: var(--verde-raizen); 
            font-size: 14px; 
            text-transform: uppercase;
        }

        input, select { 
            width: 100%; 
            padding: 22px; 
            border: 4px solid #f1f5f9; 
            border-radius: 20px; 
            font-size: 22px; 
            font-weight: 700; 
            background: #f8fafc; 
        }

        input:focus { border-color: var(--roxo-raizen); outline: none; background: white; }

        .btn-master { 
            width: 100%; padding: 30px; background: var(--roxo-raizen); 
            color: white; border: none; border-radius: 25px; 
            font-size: 24px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; box-shadow: 0 12px 0 #5e1659; 
            margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px;
        }
        .btn-master:active { transform: translateY(8px); box-shadow: 0 4px 0 #5e1659; }

        /* GRID DE TANQUES SUPERVISÃO */
        .grid-tanques {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card-tanque {
            border: 5px solid #e2e8f0;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .tanque-ativo { border-color: var(--cor-sucesso) !important; }
        .tanque-inativo { border-color: var(--cor-erro) !important; opacity: 0.8; }

        .barra-nivel-bg {
            height: 40px;
            background: #f1f5f9;
            border-radius: 20px;
            overflow: hidden;
            margin: 15px 0;
            border: 2px solid #ddd;
        }

        .barra-fill { height: 100%; transition: width 1s ease; }

        /* TABELA */
        .moldura-tabela { overflow-x: auto; border-radius: 25px; border: 3px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; min-width: 1600px; background: white; }
        th { background: #1e293b; color: white; padding: 20px; font-size: 12px; }
        td { padding: 15px; border-bottom: 2px solid #f8fafc; text-align: center; font-weight: 700; }

        .tag-p { padding: 10px 15px; border-radius: 12px; font-size: 12px; font-weight: 900; color: white; display: inline-block; }
        .bg-gas { background: #ff8c00; } 
        .bg-b100 { background: #5d4037; } 
        .bg-ani { background: #0056b3; } 
        .bg-hid { background: #00a8ff; } 
        .bg-die { background: #334155; }

        #loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
        }
        .raizen-spinner { width: 80px; height: 80px; border: 10px solid #f3f3f3; border-top: 10px solid var(--roxo-raizen); border-radius: 50%; animation: girar 1s linear infinite; }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader-overlay"><div class="raizen-spinner"></div><h2 style="border:none; margin-top:20px;">PROCESSANDO OPERAÇÃO...</h2></div>

<header><div class="logo-display">RAÍZEN</div></header>

<div class="card-master" id="secao-entrada">
    <h2><i class="fa-solid fa-truck-ramp-box"></i> REGISTRO DE CARGA</h2>
    <form id="formMaster">
        <div class="wrapper-input">
            <label><i class="fa-solid fa-barcode"></i> PLACA DO VEÍCULO</label>
            <input type="text" id="placa" placeholder="AAA-0000" maxlength="8" required>
        </div>
        <div class="wrapper-input">
            <label><i class="fa-solid fa-gas-pump"></i> PRODUTO</label>
            <select id="produto" required onchange="buscarTanqueAtivo()">
                <option value="">-- SELECIONE --</option>
                <option value="GASOLINA">GASOLINA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL ANIDRO">ETANOL ANIDRO</option>
                <option value="ETANOL HIDRATADO">ETANOL HIDRATADO</option>
                <option value="DIESEL S10">DIESEL S10</option>
            </select>
        </div>
        <div class="wrapper-input">
            <label><i class="fa-solid fa-scale-balanced"></i> VOLUME DA CARGA (LITROS)</label>
            <input type="number" id="volume_carga" placeholder="Ex: 45000" required>
        </div>
        <div class="wrapper-input">
            <label><i class="fa-brands fa-whatsapp"></i> WHATSAPP MOTORISTA</label>
            <input type="tel" id="whatsapp" placeholder="(19) 99999-9999" required>
        </div>
        
        <div style="background: #fffbeb; padding: 25px; border-radius: 25px; border: 3px dashed var(--ouro-raizen); margin-bottom: 30px;">
            <label><i class="fa-solid fa-clock"></i> HORA LIMITE JORNADA</label>
            <input type="time" id="limite">
            <label style="margin-top:15px; color: var(--roxo-raizen); cursor:pointer;">
                <input type="checkbox" id="jornada24" style="width:25px; height:25px;"> HABILITAR 24 HORAS
            </label>
        </div>

        <button type="submit" class="btn-master">CONFIRMAR REGISTRO</button>
        <button type="button" onclick="acessoPainel('supervisao')" class="btn-master" style="background:#475569; font-size:16px; box-shadow: 0 10px 0 #1e293b;">
            <i class="fa-solid fa-gears"></i> SUPERVISÃO DE TANQUES
        </button>
        <button type="button" onclick="acessoPainel('operador')" style="background:none; border:none; color:var(--roxo-raizen); font-weight:900; width:100%; cursor:pointer;">
            <i class="fa-solid fa-lock"></i> ACESSO PÁTIO
        </button>
    </form>
</div>

<div id="modulo-operador-full">
    <h2>PAINEL DE CONTROLE DE PÁTIO</h2>
    <div class="moldura-tabela">
        <table>
            <thead>
                <tr>
                    <th>VEÍCULO</th>
                    <th>PRODUTO</th>
                    <th>VOLUME</th>
                    <th>JORNADA</th>
                    <th>ENTRADA</th>
                    <th style="background:#fff7ed">AGENDAMENTO</th>
                    <th style="background:#f0fdf4">TELEFONE</th>
                    <th>AÇÕES</th>
                    <th>FINALIZAR</th>
                </tr>
            </thead>
            <tbody id="listaFila"></tbody>
        </table>
    </div>
    <button class="btn-master" style="margin-top:30px; background:#1e293b;" onclick="location.reload()">VOLTAR</button>
</div>

<div id="modulo-supervisao">
    <h2>SUPERVISÃO DE TANQUES - DADOS OPERACIONAIS</h2>
    <div id="gridTanques" class="grid-tanques"></div>
    <button class="btn-master" style="margin-top:40px; background:#1e293b;" onclick="location.reload()">VOLTAR AO REGISTRO</button>
</div>

<script>
    const RAÍZEN_DB = {
        URL: 'https://rbbkjuiizmvatiawfzuv.supabase.co',
        KEY: 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X',
        HEADERS: { 
            "apikey": 'sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X', 
            "Authorization": `Bearer sb_publishable_WkrHi6cWtZsnsDXl0nh1hA_kz1UT_1X`, 
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
        }
    };

    function setLoader(v) { document.getElementById('loader-overlay').style.display = v ? 'flex' : 'none'; }

    // --- LOGICA DE TANQUES (ATIVO/INATIVO) ---
    async function carregarSupervisao() {
        setLoader(true);
        try {
            const res = await fetch(`${RAÍZEN_DB.URL}/rest/v1/ESTOQUE?select=*`, { headers: RAÍZEN_DB.HEADERS });
            const tanques = await res.json();
            const grid = document.getElementById('gridTanques');
            grid.innerHTML = "";

            tanques.forEach(t => {
                const perc = Math.min(100, Math.max(0, 100 - (t.ESPAÇO_DISPONIVEL / 250000) * 100)); // Simulação base 250k
                const statusClasse = t.ATIVO ? 'tanque-ativo' : 'tanque-inativo';
                const corBarra = t.ATIVO ? 'var(--cor-sucesso)' : 'var(--cor-erro)';

                grid.innerHTML += `
                    <div class="card-tanque ${statusClasse}">
                        <h3 style="color:var(--roxo-raizen)">${t.TANQUE_NAME}</h3>
                        <p><b>PRODUTO:</b> ${t.PRODUTO}</p>
                        <div class="barra-nivel-bg">
                            <div class="barra-fill" style="width:${perc}%; background:${corBarra}"></div>
                        </div>
                        <p>ESPAÇO: <b>${t.ESPAÇO_DISPONIVEL} L</b></p>
                        <hr style="margin:15px 0; border:1px solid #eee">
                        <input type="number" id="manual-${t.id}" placeholder="Mudar Espaço" style="padding:10px; font-size:14px; margin-bottom:10px;">
                        <button onclick="atualizarEstoque(${t.id})" style="background:var(--verde-raizen); color:white; border:none; padding:10px; border-radius:10px; cursor:pointer; width:100%;">SALVAR ESPAÇO</button>
                        <button onclick="alternarStatus(${t.id}, ${t.ATIVO})" style="margin-top:10px; background:${t.ATIVO ? 'var(--cor-erro)' : 'var(--cor-sucesso)'}; color:white; border:none; padding:10px; border-radius:10px; cursor:pointer; width:100%;">
                            ${t.ATIVO ? 'DESATIVAR TANQUE' : 'ATIVAR TANQUE'}
                        </button>
                    </div>
                `;
            });
        } finally { setLoader(false); }
    }

    async function alternarStatus(id, atual) {
        await fetch(`${RAÍZEN_DB.URL}/rest/v1/ESTOQUE?id=eq.${id}`, {
            method: 'PATCH', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify({ "ATIVO": !atual })
        });
        carregarSupervisao();
    }

    async function atualizarEstoque(id) {
        const novo = document.getElementById(`manual-${id}`).value;
        if(!novo) return;
        await fetch(`${RAÍZEN_DB.URL}/rest/v1/ESTOQUE?id=eq.${id}`, {
            method: 'PATCH', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify({ "ESPAÇO_DISPONIVEL": novo })
        });
        alert("ESPAÇO ATUALIZADO!");
        carregarSupervisao();
    }

    // --- TRAVA DE SEGURANÇA NO REGISTRO (ADM) ---
    document.getElementById('formMaster').onsubmit = async e => {
        e.preventDefault();
        const produtoSel = document.getElementById('produto').value;
        const volCarga = parseFloat(document.getElementById('volume_carga').value);

        setLoader(true);
        try {
            // 1. Validar se tem tanque ATIVO com espaço
            const resEstoque = await fetch(`${RAÍZEN_DB.URL}/rest/v1/ESTOQUE?PRODUTO=eq.${produtoSel}&ATIVO=eq.true`, { headers: RAÍZEN_DB.HEADERS });
            const tanquesAtivos = await resEstoque.json();

            if(tanquesAtivos.length === 0) {
                alert("🚫 BLOQUEIO: Não existe tanque ATIVO para este produto. Ative na Supervisão!");
                setLoader(false);
                return;
            }

            const espaco = parseFloat(tanquesAtivos[0].ESPAÇO_DISPONIVEL);
            if(volCarga > espaco) {
                alert(`🚫 BLOQUEIO: Volume (${volCarga}L) maior que o disponível no tanque ativo (${espaco}L)!`);
                setLoader(false);
                return;
            }

            // 2. Gravar Registro
            const data = {
                "PLACA": document.getElementById('placa').value.toUpperCase(),
                "PRODUTO": produtoSel,
                "VOLUME": volCarga,
                "TELEFONE": document.getElementById('whatsapp').value,
                "JORNADA": document.getElementById('jornada24').checked ? "24 HORAS" : document.getElementById('limite').value,
                "ENTRADA": new Date().toLocaleString('pt-BR')
            };

            const res = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros`, { method: 'POST', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify(data) });
            if(res.ok) { alert("✅ VEÍCULO REGISTRADO!"); location.reload(); }

        } catch(e) { alert("ERRO DE CONEXÃO"); }
        finally { setLoader(false); }
    };

    // --- CONTROLE DE ACESSO ---
    function acessoPainel(tipo) {
        const senha = prompt("SENHA DE ACESSO:");
        if(senha === "raizen2026") {
            document.getElementById('secao-entrada').style.display = 'none';
            if(tipo === 'operador') {
                document.getElementById('modulo-operador-full').style.display = 'block';
                carregarFila();
            } else {
                document.getElementById('modulo-supervisao').style.display = 'block';
                carregarSupervisao();
            }
        } else { alert("SENHA INCORRETA"); }
    }

    async function carregarFila() {
        const res = await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?SAIDA=is.null&select=*`, { headers: RAÍZEN_DB.HEADERS });
        const dados = await res.json();
        const corpo = document.getElementById('listaFila');
        corpo.innerHTML = "";

        dados.forEach(item => {
            const corTag = item.PRODUTO.includes("GASOLINA") ? "bg-gas" : item.PRODUTO.includes("BIODIESEL") ? "bg-b100" : "bg-die";
            corpo.innerHTML += `
                <tr>
                    <td style="color:var(--roxo-raizen); font-size:20px;">${item.PLACA}</td>
                    <td><span class="tag-p ${corTag}">${item.PRODUTO}</span></td>
                    <td>${item.VOLUME} L</td>
                    <td>${item.JORNADA}</td>
                    <td>${item.ENTRADA}</td>
                    <td><input type="datetime-local" class="input-edit" value="${item.AGENDAMENTO ? item.AGENDAMENTO.slice(0,16) : ''}"></td>
                    <td>${item.TELEFONE}</td>
                    <td><button onclick="chamarZap('${item.TELEFONE}')" style="background:#25d366; color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">CONVOCAR</button></td>
                    <td><button onclick="finalizarCarga('${item.id}')" style="background:var(--roxo-raizen); color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">SAÍDA</button></td>
                </tr>
            `;
        });
    }

    function chamarZap(tel) {
        const baia = prompt("INFORME A BAIA:");
        if(!baia) return;
        window.open(`https://wa.me/55${tel.replace(/\D/g, "")}?text=Motorista, favor encostar na BAIA ${baia}.`, '_blank');
    }

    async function finalizarCarga(id) {
        if(!confirm("CONFIRMA SAÍDA DO VEÍCULO?")) return;
        setLoader(true);
        await fetch(`${RAÍZEN_DB.URL}/rest/v1/registros?id=eq.${id}`, {
            method: 'PATCH', headers: RAÍZEN_DB.HEADERS, body: JSON.stringify({ "SAIDA": new Date().toLocaleString('pt-BR') })
        });
        carregarFila();
        setLoader(false);
    }
</script>
</body>
</html>
