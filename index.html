<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍZEN - PORTAL COLETA V9.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-raizen: #4d6d5d;
            --roxo-raizen: #84207d;
            --ouro-raizen: #ffc107;
            --fundo: #f0f2f5;
            --branco: #ffffff;
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body { 
            background-color: var(--fundo); 
            margin: 0; 
            padding-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER COM IDENTIDADE VISUAL */
        header { 
            background: linear-gradient(135deg, var(--verde-raizen) 0%, #2d3e35 100%); 
            width: 100%; 
            padding: 40px 0; 
            text-align: center; 
            border-bottom: 12px solid var(--roxo-raizen); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .logo-container {
            background: rgba(255,255,255,0.1);
            display: inline-block;
            padding: 20px 40px;
            border-radius: 25px;
            backdrop-filter: blur(8px);
            margin-bottom: 15px;
        }

        header h1 { color: var(--branco); margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 4px; font-weight: 400; }

        /* CARD MASTER */
        .card-sistema { 
            width: 95%; 
            max-width: 850px; 
            margin: 30px auto; 
            background: var(--branco); 
            padding: 45px; 
            border-radius: 40px; 
            box-shadow: var(--shadow); 
            border-left: 15px solid var(--roxo-raizen);
            position: relative;
        }

        #painel-admin-full { display: none; width: 98%; max-width: 1780px; }

        h2 { color: var(--roxo-raizen); text-align: center; font-weight: 900; text-transform: uppercase; border-bottom: 3px solid #f0f0f0; padding-bottom: 20px; margin-bottom: 35px; }

        /* FORMULÁRIO TÉCNICO */
        .campo-caixa { margin-bottom: 25px; }
        
        label { display: block; margin-bottom: 10px; font-weight: 700; color: var(--verde-raizen); font-size: 13px; text-transform: uppercase; }

        input, select { 
            width: 100%; 
            padding: 20px; 
            border: 2px solid #e2e8f0; 
            border-radius: 18px; 
            font-size: 18px; 
            background: #f8fafc;
            font-weight: 700;
        }

        input:focus { border-color: var(--roxo-raizen); outline: none; background: #fff; }

        .btn-confirmar { 
            width: 100%; 
            padding: 25px; 
            background: var(--roxo-raizen); 
            color: white; 
            border: none; 
            border-radius: 22px; 
            font-size: 22px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(132, 32, 125, 0.3);
        }

        /* TABELA DE OPERAÇÃO */
        .tabela-alinhada { overflow-x: auto; border-radius: 25px; border: 1px solid #ddd; background: #fff; }
        table { width: 100%; border-collapse: collapse; min-width: 1500px; }
        th { background: #1e293b; color: white; padding: 22px; font-size: 12px; text-transform: uppercase; }
        td { padding: 18px; border-bottom: 1px solid #eee; text-align: center; font-weight: 700; font-size: 16px; }

        /* BADGES */
        .badge { padding: 8px 15px; border-radius: 10px; color: white; font-size: 11px; display: inline-block; min-width: 110px; }
        .b-gas { background: #f39c12; color: #000; }
        .b-bio { background: #000; }
        .b-eta { background: #27ae60; }

        .btn-tab { border: none; border-radius: 12px; padding: 14px; font-weight: 900; cursor: pointer; width: 100%; color: white; text-transform: uppercase; font-size: 10px; margin-bottom: 5px; }
        .btn-zap { background: #25D366; }
        .btn-checkout { background: #3498db; }

        /* ACESSO OPERADOR */
        .link-operador { margin-top: 40px; text-align: center; padding-top: 20px; border-top: 1px dashed #ccc; }
        .link-operador button { background: none; border: 2px solid var(--roxo-raizen); color: var(--roxo-raizen); padding: 15px 35px; border-radius: 50px; font-weight: 900; cursor: pointer; }

    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <svg width="220" height="55" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
            <path d="M25.2 20.5c0 14.1-11.5 25.6-25.6 25.6h-2.1v12.8h-11.8V20.5h39.5zm-25.6 13.9c7.7 0 13.9-6.2 13.9-13.9s-6.2-13.9-13.9-13.9h-2.1v27.8h2.1zM65.4 58.9l-3.8-10.4H45.8l-3.8 10.4h-12.2l15.8-38.4h12.5l15.8 38.4H65.4zm-15.6-32.3l-8.2 21.9h16.4l-8.2-21.9zM88.5 20.5v38.4H76.7V20.5h11.8zM128.5 20.5L108.2 58.9h-12.5l15.8-38.4h12.5l12.5 38.4h-12.2l-3.3-10.4h-15.8l-3.3 10.4h-12.2l15.8-38.4h12.5zM140.5 20.5h32.5v10.4h-20.7v5.5h18.2v10.4h-18.2v6.6h20.7v10.4h-32.5V20.5zM180.5 20.5l25.5 28.5V20.5h11.8v38.4h-9.5l-27.8-31.5v31.5h-11.8V20.5h11.8z" fill="#ffffff"/>
            <circle cx="275" cy="40" r="28" fill="#ffc107"/>
        </svg>
    </div>
    <h1>TERMINAL PAULÍNIA | PORTAL COLETA</h1>
</header>

<div class="card-sistema" id="view-motorista">
    <h2>REGISTRO DE DESCARGA</h2>
    <form id="formularioPrincipal">
        <div class="campo-caixa">
            <label>Placa do Veículo</label>
            <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>
        </div>

        <div class="campo-caixa">
            <label>Produto</label>
            <select id="produto" required>
                <option value="">Selecione o produto...</option>
                <option value="GASOLINA">GASOLINA</option>
                <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
                <option value="ETANOL">ETANOL</option>
                <option value="S10">DIESEL S10</option>
            </select>
        </div>

        <div class="campo-caixa">
            <label>WhatsApp (Com DDD)</label>
            <input type="tel" id="zap" placeholder="(19) 99999-9999" maxlength="15" required>
        </div>

        <div class="campo-caixa" style="background:#fff9c4; padding:25px; border-radius:20px; border: 2px solid #fbc02d;">
            <label>Fim da Jornada</label>
            <input type="time" id="hora_jornada">
            <div style="margin-top:15px; display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="jornada_24h" style="width:25px; height:25px;">
                <span style="font-weight:900; color:#d32f2f;">ESTOU EM JORNADA 24 HORAS</span>
            </div>
        </div>

        <button type="submit" class="btn-confirmar" id="btn_enviar">CONCLUIR REGISTRO</button>
    </form>
    
    <div class="link-operador">
        <button onclick="liberarPainel()">ACESSO OPERADOR</button>
    </div>
</div>

<div class="card-sistema" id="painel-admin-full">
    <h2>PAINEL DE CONTROLE ÁREA 02</h2>
    <div class="tabela-alinhada">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Produto</th>
                    <th>WhatsApp</th>
                    <th>Jornada</th>
                    <th>Entrada</th>
                    <th style="background:#fff9c4; color:black;">AGENDAMENTO COLETA</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
    <button class="btn-confirmar" style="background:#444; margin-top:30px;" onclick="location.reload()">VOLTAR</button>
</div>

<script>
    const API = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    /* TRAVAS DE MÁSCARA - NÃO REMOVER */
    document.getElementById('placa').oninput = e => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    };

    document.getElementById('zap').oninput = e => {
        let r = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !r[2] ? r[1] : '(' + r[1] + ') ' + r[2] + (r[3] ? '-' + r[3] : '');
    };

    /* LÓGICA DE WHATSAPP COM TRAVA DE SEGURANÇA (RECUPERADA) */
    function acionarMotorista(telefone) {
        // LIMPEZA TOTAL PARA GARANTIR APENAS NÚMEROS
        const foneLimpo = telefone.replace(/\D/g, "");
        
        // TRAVA: Se não tiver 11 dígitos, impede o envio para não dar erro de número inválido
        if(foneLimpo.length < 11) {
            alert("ERRO: Este número está incompleto (" + foneLimpo.length + " dígitos). Corrija no cadastro.");
            return;
        }

        const baia = prompt("PARA QUAL BAIA O MOTORISTA DEVE IR?");
        if(!baia) return;

        const msg = `Olá%0AMotorista vamos descarregar?%0ABaia *${baia}* - Área 02%0AObrigado!%0A%0A_Obs: aguarde a instrução do operador para entrar na baia!_`;
        
        // Protocolo wa.me ou api.whatsapp para forçar abertura no APP do celular
        const url = `https://api.whatsapp.com/send?phone=55${foneLimpo}&text=${msg}`;
        window.open(url, '_blank');
    }

    /* ENVIO DE DADOS COM VALIDAÇÃO DE JORNADA */
    document.getElementById('formularioPrincipal').onsubmit = async e => {
        e.preventDefault();
        
        // TRAVA DE WHATSAPP NO FORMULÁRIO
        const zapVal = document.getElementById('zap').value.replace(/\D/g, "");
        if(zapVal.length < 11) {
            alert("TELEFONE INVÁLIDO! Use DDD + 9 + NÚMERO.");
            return;
        }

        document.getElementById('btn_enviar').innerText = "ENVIANDO...";
        
        const payload = {
            "PLACA": document.getElementById('placa').value,
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('zap').value,
            "JORNADA": document.getElementById('jornada_24h').checked ? "24 HORAS" : document.getElementById('hora_jornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "SAIDA": "",
            "AGENDAMENTO NO COLETA": ""
        };

        await fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify([payload])
        });
        
        alert("REGISTRADO COM SUCESSO!");
        location.reload();
    };

    /* FUNÇÕES DO PAINEL ADMIN */
    async function carregarTabela() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "<tr><td colspan='7'>Sincronizando...</td></tr>";

        const res = await fetch(API + "?t=" + Date.now());
        const dados = await res.json();
        corpo.innerHTML = "";

        dados.filter(f => f.PLACA && !f.SAIDA).forEach(i => {
            let cBadge = i.PRODUTO.includes("GAS") ? "b-gas" : (i.PRODUTO.includes("B100") ? "b-bio" : "b-eta");
            corpo.innerHTML += `
                <tr>
                    <td style="color:var(--roxo-raizen); font-size:20px;">${i.PLACA}</td>
                    <td><span class="badge ${cBadge}">${i.PRODUTO}</span></td>
                    <td>${i.TELEFONE}</td>
                    <td style="color:${i.JORNADA === '24 HORAS' ? 'red' : 'black'}">${i.JORNADA}</td>
                    <td>${i.ENTRADA.split(',')[1] || i.ENTRADA}</td>
                    <td style="background:#fffde7;">
                        <input type="datetime-local" id="col-${i.PLACA}" value="${i['AGENDAMENTO NO COLETA'] || ''}" style="font-size:11px; padding:5px;">
                        <button onclick="salvarColeta('${i.PLACA}')" style="width:100%; background:var(--verde-raizen); color:white; border:none; margin-top:5px; padding:5px; border-radius:5px; cursor:pointer;">OK</button>
                    </td>
                    <td>
                        <button class="btn-tab btn-zap" onclick="acionarMotorista('${i.TELEFONE}')">WHATSAPP</button>
                        <button class="btn-tab btn-checkout" onclick="finalizar('${i.PLACA}')">SAÍDA</button>
                    </td>
                </tr>`;
        });
    }

    async function salvarColeta(placa) {
        const val = document.getElementById(`col-${placa}`).value;
        await fetch(`${API}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({"AGENDAMENTO NO COLETA": val})
        });
        alert("Agendamento Salvo!");
        carregarTabela();
    }

    async function finalizar(placa) {
        if(confirm("Confirmar saída do veículo " + placa + "?")) {
            await fetch(`${API}/PLACA/${placa}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({"SAIDA": new Date().toLocaleString('pt-BR')})
            });
            carregarTabela();
        }
    }

    function liberarPainel() {
        if(prompt("Senha:") === "raizen2026") {
            document.getElementById('view-motorista').style.display = 'none';
            document.getElementById('painel-admin-full').style.display = 'block';
            carregarTabela();
        }
    }
</script>
</body>
</html>
