<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - Terminal Paulínia</title>
    <style>
        :root {
            --cor-principal: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo: #f0f2f5;
            --branco: #ffffff;
            --danger: #dc3545;
            --warning: #ffc107;
            --success: #28a745;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--fundo); margin: 0; display: flex; flex-direction: column; align-items: center; color: #333; }
        header { background-color: var(--cor-principal); width: 100%; padding: 25px 0; text-align: center; border-bottom: 6px solid var(--amarelo-raizen); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { color: var(--branco); margin: 0; letter-spacing: 1px; font-size: 22px; text-transform: uppercase; }
        
        .container { width: 92%; max-width: 550px; margin: 20px auto; background: var(--branco); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        #admin-panel { display: none; max-width: 98%; width: 1350px; }

        h2 { color: var(--cor-principal); text-align: center; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        label { display: block; margin-top: 15px; font-weight: 600; color: #444; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #e1e1e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        /* BOTÃO DE AGENDA DINÂMICO */
        .btn-agenda {
            padding: 10px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer;
            text-align: center; display: block; min-width: 145px; border: 2px solid; transition: 0.3s;
        }
        .agenda-pendente { background-color: #e3f2fd !important; color: #0d47a1 !important; border-color: #0d47a1 !important; }
        .agenda-salva { background-color: #d4edda !important; color: #155724 !important; border-color: #28a745 !important; }

        /* TABELA E STATUS */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 13px; }
        th { background: var(--cor-principal); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .status-badge { padding: 6px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; color: white; display: inline-block; }
        .bg-ok { background: var(--success); }
        .bg-alerta { background: var(--warning); color: #333; }
        .bg-vencido { background: var(--danger); animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .btn-zap { background:#25D366; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-weight:bold; width: 100%; margin-bottom: 4px; display: block; text-align: center; font-size: 11px; text-decoration: none; }
        .btn-concluir { background:#007bff; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-weight:bold; width: 100%; font-size: 11px; }
        
        #modalColeta { display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
        .modal-content { background:white; margin:15% auto; padding:25px; border-radius:15px; width:300px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); text-align: center; }

        .btn-enviar { width: 100%; padding: 16px; background-color: var(--cor-principal); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer-link { text-align: center; margin-top: 20px; }
        .btn-admin-link { background: none; border: none; color: #999; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="container" id="tela-motorista">
    <h2>Entrada de Motorista</h2>
    <form id="formAgendamento">
        <label>Placa do Veículo</label>
        <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>

        <label>Produto</label>
        <select id="produto" required>
            <option value="">Selecione o produto...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="S10">S10</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>

        <label>WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(19) 99999-9999" required>

        <label>Horário Fim da Jornada</label>
        <input type="time" id="jornada">

        <button type="submit" class="btn-enviar" id="btnEnviar">REGISTRAR ENTRADA</button>
    </form>
    <div class="footer-link">
        <button class="btn-admin-link" onclick="abrirAdmin()">Painel de Controle</button>
    </div>
</div>

<div class="container" id="admin-panel">
    <h2>Controle de Pátio</h2>
    <input type="text" id="buscaPlaca" style="width:100%; padding:10px; margin-bottom:15px;" placeholder="🔎 Filtrar Placa..." onkeyup="filtrarTabela()">
    
    <div style="overflow-x: auto;">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>WhatsApp</th>
                    <th>Produto</th>
                    <th>Status Jornada</th>
                    <th>Agenda Coleta</th>
                    <th>Pátio</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-enviar" style="background:#666; margin-top:20px;" onclick="window.location.reload()">VOLTAR</button>
</div>

<div id="modalColeta">
    <div class="modal-content">
        <h3>Agendar Coleta</h3>
        <input type="hidden" id="placaAlvo">
        <label>Data:</label><input type="date" id="inputData">
        <label>Hora:</label><input type="time" id="inputHora">
        <button class="btn-enviar" id="btnSalvarAgenda" onclick="salvarColeta()">SALVAR AGENDA</button>
        <button onclick="fecharModal()" style="margin-top:10px; background:none; border:none; color:red; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // Máscara de Placa ABC-1234
    document.getElementById('placa').addEventListener('input', e => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    // Envio do Motorista
    document.getElementById('formAgendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.innerText = "REGISTRANDO...";
        const dados = {
            "PLACA": document.getElementById('placa').value,
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('telefone').value,
            "JORNADA": document.getElementById('jornada').value || "24 Horas",
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "TIMESTAMP": new Date().getTime(),
            "COLETA": "", "SAIDA": ""
        };
        fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({data: [dados]}) })
        .then(() => { alert("✅ Entrada registrada!"); this.reset(); }).finally(() => btn.innerText = "REGISTRAR ENTRADA");
    });

    // Login Admin
    function abrirAdmin() {
        if (prompt("Senha:") === "raizen2026") {
            document.getElementById('tela-motorista').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            carregarAtivos();
        }
    }

    // Status da Jornada (Verde/Amarelo/Vermelho)
    function getStatusJornada(horaFim) {
        if (!horaFim || horaFim === "24 Horas") return "<span class='status-badge bg-ok'>24 HORAS</span>";
        const agora = new Date();
        const [h, m] = horaFim.split(':');
        const dF = new Date(); dF.setHours(h, m, 0);
        const diff = (dF - agora) / 60000;
        if (diff < 0) return `<span class="status-badge bg-vencido">VENCIDA (${horaFim})</span>`;
        if (diff <= 60) return `<span class="status-badge bg-alerta">ALERTA (${horaFim})</span>`;
        return `<span class="status-badge bg-ok">EM DIA (${horaFim})</span>`;
    }

    // Carregar Tabela com Visão Instantânea da Agenda
    function carregarAtivos() {
        fetch(API_URL + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector('#tabelaDados tbody');
            tbody.innerHTML = "";
            const agora = new Date().getTime();

            data.filter(i => i.PLACA && !i.SAIDA).forEach(i => {
                const tempo = i.TIMESTAMP ? Math.floor((agora - i.TIMESTAMP) / 60000) : "?";
                
                // Lógica da Agenda: Verde se tiver texto, Azul se vazio
                const valorColeta = i.COLETA ? i.COLETA.toString().trim() : "";
                const temAgenda = (valorColeta !== "" && valorColeta !== "Pendente");
                const txtBtn = temAgenda ? "📅 " + valorColeta : "📅 Pendente";
                const corBtn = temAgenda ? "agenda-salva" : "agenda-pendente";

                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:bold">${i.PLACA}</td>
                        <td>${i.TELEFONE}</td>
                        <td>${i.PRODUTO}</td>
                        <td>${getStatusJornada(i.JORNADA)}</td>
                        <td><div class="btn-agenda ${corBtn}" onclick="abrirModalColeta('${i.PLACA}')">${txtBtn}</div></td>
                        <td>${tempo} min</td>
                        <td>
                            <button class="btn-zap" onclick="enviarZap('${i.TELEFONE}', '${i.PLACA}', '${txtBtn}')">📱 CHAMAR</button>
                            <button class="btn-concluir" onclick="concluir('${i.PLACA}')">OK</button>
                        </td>
                    </tr>`;
            });
        });
    }

    function abrirModalColeta(placa) {
        document.getElementById('placaAlvo').value = placa;
        document.getElementById('modalColeta').style.display = 'block';
    }

    function fecharModal() { document.getElementById('modalColeta').style.display = 'none'; }

    function salvarColeta() {
        const placa = document.getElementById('placaAlvo').value;
        const d = document.getElementById('inputData').value;
        const h = document.getElementById('inputHora').value;
        if(!d || !h) return alert("Preencha data e hora!");

        const formatada = d.split('-')[2] + "/" + d.split('-')[1] + " " + h;
        document.getElementById('btnSalvarAgenda').innerText = "SALVANDO...";

        fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ data: { "COLETA": formatada } })
        }).then(() => {
            fecharModal();
            setTimeout(carregarAtivos, 1500); // Recarrega para assumir o verde
        }).finally(() => {
            document.getElementById('btnSalvarAgenda').innerText = "SALVAR AGENDA";
        });
    }

    function concluir(placa) {
        if(!confirm("Deseja concluir a saída desta placa?")) return;
        fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ data: { "SAIDA": new Date().toLocaleString() } })
        }).then(() => carregarAtivos());
    }

    function enviarZap(tel, placa, agenda) {
        const baia = prompt("Qual a BAIA de descarga?");
        if(!baia) return;
        const limpo = tel.replace(/\D/g, "");
        const txt = encodeURIComponent(`*RAÍZEN - TERMINAL PAULÍNIA*\nPlaca: ${placa}\nAgenda: ${agenda}\nBaia: ${baia}`);
        window.open(`https://web.whatsapp.com/send?phone=55${limpo}&text=${txt}`);
    }

    function filtrarTabela() {
        let input = document.getElementById("buscaPlaca").value.toUpperCase();
        let trs = document.querySelectorAll("#tabelaDados tbody tr");
        trs.forEach(tr => tr.style.display = tr.innerText.toUpperCase().includes(input) ? "" : "none");
    }
</script>
</body>
</html>
