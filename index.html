<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - Terminal Paulínia</title>
    <style>
        :root {
            --cor-principal: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo: #f0f2f5;
            --branco: #ffffff;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--fundo); margin: 0; display: flex; flex-direction: column; align-items: center; color: #333; }
        header { background-color: var(--cor-principal); width: 100%; padding: 25px 0; text-align: center; border-bottom: 6px solid var(--amarelo-raizen); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header h1 { color: var(--branco); margin: 0; letter-spacing: 1px; font-size: 22px; text-transform: uppercase; }
        
        .container { width: 92%; max-width: 550px; margin: 20px auto; background: var(--branco); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h2 { color: var(--cor-principal); text-align: center; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        label { display: block; margin-top: 15px; font-weight: 600; color: #444; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #e1e1e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn-enviar { width: 100%; padding: 16px; background-color: var(--cor-principal); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        
        #admin-panel { display: none; max-width: 98%; width: 1100px; }
        .search-box { margin-bottom: 15px; padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; font-size: 13px; }
        th { background: var(--cor-principal); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .badge-coleta { background: #e3f2fd; color: #0d47a1; padding: 4px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; cursor: pointer; border: 1px dashed #0d47a1; display: inline-block; }
        .badge-espera { background: #fff3cd; color: #856404; padding: 4px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; }
        
        .btn-zap { background:#25D366; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-weight:bold; width: 100%; margin-bottom: 4px; display: block; text-decoration: none; text-align: center; }
        .btn-concluir { background:#007bff; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-weight:bold; width: 100%; }
        
        .footer-link { text-align: center; margin-top: 20px; }
        .btn-admin-link { background: none; border: none; color: #999; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>RAÍZEN - TERMINAL PAULÍNIA</h1>
</header>

<div class="container" id="tela-motorista">
    <h2>Agendamento de Descarga</h2>
    <form id="formAgendamento">
        <label>Placa do Veículo</label>
        <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>

        <label>Produto para Descarga</label>
        <select id="produto" required>
            <option value="">Selecione o produto...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="S500">S500</option>
            <option value="S10">S10</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>

        <label>WhatsApp (com DDD)</label>
        <input type="tel" id="telefone" placeholder="(19) 9 9999-9999" maxlength="16" required>

        <button type="submit" class="btn-enviar" id="btnEnviar">REGISTRAR ENTRADA</button>
    </form>
    <div class="footer-link">
        <button class="btn-admin-link" onclick="abrirAdmin()">Acesso Administrativo</button>
    </div>
</div>

<div class="container" id="admin-panel">
    <h2>Gestão de Pátio</h2>
    <input type="text" id="buscaPlaca" class="search-box" placeholder="🔎 Buscar placa..." onkeyup="filtrarTabela()">
    
    <div style="overflow-x: auto;">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Produto</th>
                    <th>Agenda Coleta</th>
                    <th>No Pátio</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-enviar" style="margin-top: 20px; background:#666;" onclick="window.location.reload()">SAIR</button>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // Máscaras
    document.getElementById('placa').addEventListener('input', e => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    document.getElementById('telefone').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, "");
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
        v = v.replace(/(\d)(\d{4})$/, "$1-$2");
        e.target.value = v;
    });

    // Envio do Motorista
    document.getElementById('formAgendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        const agora = new Date();
        btn.innerText = "REGISTRANDO...";
        btn.disabled = true;

        const dados = {
            "PLACA": document.getElementById('placa').value,
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('telefone').value,
            "ENTRADA": agora.toLocaleString('pt-BR'),
            "TIMESTAMP": agora.getTime(),
            "COLETA": "Pendente",
            "SAIDA": ""
        };

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: [dados] })
        }).then(() => {
            alert("✅ Entrada Registrada com Sucesso!");
            document.getElementById('formAgendamento').reset();
        }).finally(() => {
            btn.innerText = "REGISTRAR ENTRADA";
            btn.disabled = false;
        });
    });

    function abrirAdmin() {
        if (prompt("Senha:") === "raizen2026") {
            document.getElementById('tela-motorista').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            carregarAtivos();
        }
    }

    function carregarAtivos() {
        fetch(API_URL).then(res => res.json()).then(data => {
            const tbody = document.querySelector('#tabelaDados tbody');
            tbody.innerHTML = "";
            const agora = new Date().getTime();

            data.filter(i => i.PLACA && !i.SAIDA).forEach(i => {
                const minutosPátio = i.TIMESTAMP ? Math.floor((agora - i.TIMESTAMP) / 60000) : "?";
                const coletaTexto = i.COLETA || "Pendente";
                
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:bold">${i.PLACA}</td>
                        <td>${i.PRODUTO}</td>
                        <td><span class="badge-coleta" onclick="editarColeta('${i.PLACA}')">🕒 ${coletaTexto}</span></td>
                        <td><span class="badge-espera">${minutosPátio} min</span></td>
                        <td>
                            <button class="btn-zap" onclick="enviarZap('${i.TELEFONE}', '${i.PLACA}', '${coletaTexto}')">📱 CHAMAR</button>
                            <button class="btn-concluir" onclick="concluir('${i.PLACA}')">CONCLUIR</button>
                        </td>
                    </tr>`;
            });
        });
    }

    // Função Administrativa para inserir horário do Coleta
    function editarColeta(placa) {
        const novoHorario = prompt("Digite o horário agendado no Portal Coleta para a placa " + placa + ":");
        if (novoHorario === null) return;

        fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: { "COLETA": novoHorario } })
        }).then(() => carregarAtivos());
    }

    function filtrarTabela() {
        let input = document.getElementById("buscaPlaca").value.toUpperCase();
        let trs = document.querySelectorAll("#tabelaDados tbody tr");
        trs.forEach(tr => tr.style.display = tr.innerText.toUpperCase().includes(input) ? "" : "none");
    }

    function enviarZap(tel, placa, agenda) {
        const baia = prompt("Para qual BAIA o motorista "+placa+" deve ir?");
        if (!baia) return;
        const limpo = tel.replace(/\D/g, "");
        const txt = encodeURIComponent(`*RAÍZEN PAULÍNIA*\n\nMotorista da placa *${placa}* (Agenda Coleta: ${agenda}), sua descarga está liberada na *BAIA ${baia}*.\n\nFavor deslocar-se agora.`);
        window.open(`https://web.whatsapp.com/send?phone=55${limpo}&text=${txt}`, '_blank');
    }

    function concluir(placa) {
        if(!confirm("Deseja finalizar a descarga da placa " + placa + "?")) return;
        fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: { "SAIDA": new Date().toLocaleString('pt-BR') } })
        }).then(() => carregarAtivos());
    }
</script>
</body>
</html>
