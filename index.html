<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - SISTEMA DE DESCARGA ÁREA 2 - TERMINAL PAULÍNIA</title>
    <style>
        /* ==========================================================================
           ESTILO VISUAL COMPLETO - IDENTIDADE RAÍZEN
           ========================================================================== */
        :root {
            --verde-raizen: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo-pagina: #f0f2f5;
            --branco: #ffffff;
            --cor-erro: #dc3545;
            --cor-sucesso: #28a745;
            --cor-informativa: #007bff;
            --sombra-forte: 0 20px 40px rgba(0,0,0,0.2);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--fundo-pagina); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        header { 
            background-color: var(--verde-raizen); 
            width: 100%; 
            padding: 40px 0; 
            text-align: center; 
            border-bottom: 10px solid var(--amarelo-raizen); 
            box-shadow: 0 5px 20px rgba(0,0,0,0.3); 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        header h1 { 
            color: var(--branco); 
            margin: 0; 
            font-size: 28px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 900;
        }
        
        .container { 
            width: 90%; 
            max-width: 700px; 
            margin: 50px auto; 
            background: var(--branco); 
            padding: 50px; 
            border-radius: 35px; 
            box-shadow: var(--sombra-forte); 
        }

        /* CONFIGURAÇÃO DO PAINEL ADMIN */
        #admin-panel { 
            display: none; 
            max-width: 98%; 
            width: 1600px; 
        }

        h2 { 
            color: var(--verde-raizen); 
            text-align: center; 
            border-bottom: 4px solid var(--amarelo-raizen); 
            padding-bottom: 20px; 
            margin-bottom: 40px; 
            text-transform: uppercase;
        }
        
        label { 
            display: block; 
            margin-top: 25px; 
            font-weight: 800; 
            color: #333; 
            font-size: 17px; 
        }

        input, select { 
            width: 100%; 
            padding: 20px; 
            margin-top: 10px; 
            border: 2px solid #ddd; 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-size: 18px; 
            color: #333;
            transition: border-color 0.3s ease;
        }
        input:focus { border-color: var(--verde-raizen); outline: none; }

        /* ==========================================================================
           BOX DE BUSCA DE PLACA (RESTAURADO)
           ========================================================================== */
        .area-busca {
            background: #e9ecef;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 25px;
            border: 2px solid #dee2e6;
        }
        .area-busca label { margin-top: 0; min-width: 160px; font-size: 18px; color: var(--verde-raizen); }
        .area-busca input { margin-top: 0; background: white; border: 2px solid var(--verde-raizen); font-weight: bold; }

        .jornada-wrapper {
            background: #f1f5f2;
            padding: 30px;
            border-radius: 20px;
            border: 2px dashed #bbb;
            margin-top: 30px;
        }

        .check-estilizado {
            display: flex; 
            align-items: center; 
            gap: 20px; 
            cursor: pointer; 
            padding: 20px; 
            background: white; 
            border-radius: 15px; 
            border: 1px solid #ddd; 
            margin-top: 20px;
        }
        .check-estilizado input { width: 35px; height: 35px; cursor: pointer; }
        .check-estilizado span { font-size: 18px; font-weight: bold; color: var(--verde-raizen); }

        .btn-acao-principal { 
            width: 100%; 
            padding: 25px; 
            background-color: var(--verde-raizen); 
            color: white; 
            border: none; 
            border-radius: 18px; 
            font-size: 24px; 
            font-weight: 900; 
            cursor: pointer; 
            margin-top: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* ==========================================================================
           TABELA E LÓGICA VISUAL DO AGENDAMENTO
           ========================================================================== */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; }
        th { background: var(--verde-raizen); color: white; padding: 25px; text-align: center; font-size: 14px; text-transform: uppercase; }
        td { padding: 22px; border-bottom: 1px solid #eee; text-align: center; font-size: 16px; font-weight: 700; }
        
        /* STATUS: QUANDO ESTÁ PENDENTE */
        .alerta-pendente { 
            color: #721c24; 
            background: #f8d7da; 
            padding: 12px 20px; 
            border-radius: 10px; 
            font-weight: 900; 
            border: 2px solid #f5c6cb; 
            display: inline-block;
            animation: pulse-alerta 1.5s infinite;
        }
        /* STATUS: QUANDO É AGENDADO (SOME O PENDENTE) */
        .confirmado-agendado { 
            color: #155724; 
            background: #d4edda; 
            padding: 15px; 
            border-radius: 12px; 
            border: 3px solid #c3e6cb; 
            display: block;
            font-size: 16px;
        }

        @keyframes pulse-alerta { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .btn-tabela { 
            border: none; border-radius: 10px; padding: 15px; font-weight: bold; cursor: pointer; font-size: 11px; 
            width: 100%; margin-bottom: 10px; color: white; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-cor-agendar { background: white; color: var(--cor-informativa); border: 2px solid var(--cor-informativa); }
        .btn-cor-whats { background: #25D366; }
        .btn-cor-ok { background: var(--cor-informativa); }

        /* MODAL EXPANDIDO */
        #modalAgendamentoGlobal { 
            display:none; 
            position:fixed; 
            z-index:9999; 
            left:0; top:0; 
            width:100%; height:100%; 
            background:rgba(0,0,0,0.85); 
            backdrop-filter: blur(10px); 
        }
        .modal-container-content { 
            background:white; 
            margin:5% auto; 
            padding:50px; 
            border-radius:40px; 
            width:500px; 
            text-align: center; 
            box-shadow: 0 50px 100px rgba(0,0,0,0.6); 
        }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="container" id="tela-entrada-motorista">
    <h2>DESCARGA ÁREA 2</h2>
    <form id="formCadastro">
        <label>Placa do Caminhão</label>
        <input type="text" id="placaVeiculo" placeholder="ABC-1234" maxlength="8" required>
        
        <label>Produto</label>
        <select id="produtoVeiculo" required>
            <option value="">Selecione o produto...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="S10">S10</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>

        <label>Seu WhatsApp</label>
        <input type="tel" id="whatsappVeiculo" placeholder="(19) 99999-9999" maxlength="15" required>

        <div class="jornada-wrapper">
            <div id="secaoHora">
                <label style="margin-top: 0;">Fim da Jornada:</label>
                <input type="time" id="horaFimJornada" required>
            </div>
            <label class="check-estilizado">
                <input type="checkbox" id="checkLivre" onchange="controlarRelogio()">
                <span>Minha jornada é de 24 Horas</span>
            </label>
        </div>

        <button type="submit" class="btn-acao-principal" id="btnSalvarTudo">REGISTRAR ENTRADA</button>
    </form>
    <div style="text-align:center; margin-top:30px;">
        <button onclick="acessoAdmin()" style="background:none; border:none; color:#bbb; text-decoration:underline; cursor:pointer;">Painel Administrativo</button>
    </div>
</div>

<div class="container" id="admin-panel">
    <h2>CONTROLE DE PÁTIO - ÁREA 2</h2>
    
    <div class="area-busca">
        <label>🔍 <strong>BUSCAR PLACA:</strong></label>
        <input type="text" id="inputFiltroPlaca" placeholder="Digite a placa para filtrar..." onkeyup="funcaoFiltrar()">
    </div>

    <div style="overflow-x: auto;">
        <table id="tabelaMestra">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>WhatsApp</th>
                    <th>Jornada</th>
                    <th style="background:#2d4a3e; color:white; width: 250px;">AGENDAMENTO COLETAS:</th>
                    <th>Tempo Espera</th>
                    <th style="width: 190px;">Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-acao-principal" style="background:#444;" onclick="window.location.reload()">VOLTAR AO INÍCIO</button>
</div>

<div id="modalAgendamentoGlobal">
    <div class="modal-container-content">
        <h3 style="margin-top:0; font-size:26px;">Agendar Coleta</h3>
        <p id="txtPlacaModal" style="font-weight:900; font-size:28px; color:var(--verde-raizen); margin-bottom:30px;"></p>
        <input type="hidden" id="inputPlacaOculta">
        
        <label>Data Programada:</label>
        <input type="date" id="inputDataModal">
        
        <label>Hora Programada:</label>
        <input type="time" id="inputHoraModal">
        
        <button class="btn-acao-principal" id="btnSalvarModalPlanilha" onclick="processarAgendamento()">GRAVAR NA PLANILHA</button>
        <button onclick="fecharModal()" style="margin-top:25px; border:none; background:none; color:red; font-weight:bold; cursor:pointer; font-size:16px;">CANCELAR</button>
    </div>
</div>

<script>
    const ENDPOINT = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    // 1. COMPORTAMENTO DA INTERFACE
    function controlarRelogio() {
        const isLivre = document.getElementById('checkLivre').checked;
        document.getElementById('secaoHora').style.display = isLivre ? 'none' : 'block';
        document.getElementById('horaFimJornada').required = !isLivre;
    }

    // 2. MÁSCARAS DE DADOS
    document.getElementById('whatsappVeiculo').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !v[2] ? v[1] : '(' + v[1] + ') ' + v[2] + (v[3] ? '-' + v[3] : '');
    });
    document.getElementById('placaVeiculo').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    // 3. FUNÇÃO DE BUSCA (RESTAURADA)
    function funcaoFiltrar() {
        const busca = document.getElementById("inputFiltroPlaca").value.toUpperCase();
        const linhas = document.getElementById("tabelaMestra").getElementsByTagName("tr");
        for (let i = 1; i < linhas.length; i++) {
            let td = linhas[i].getElementsByTagName("td")[0];
            if (td) {
                let texto = td.textContent || td.innerText;
                linhas[i].style.display = texto.toUpperCase().indexOf(busca) > -1 ? "" : "none";
            }
        }
    }

    // 4. ATUALIZAÇÃO DA TABELA COM LÓGICA DE SUMIR O PENDENTE
    function recarregarDadosTabela() {
        const corpoTabela = document.querySelector('#tabelaMestra tbody');
        corpoTabela.innerHTML = "<tr><td colspan='6'>Buscando dados na Planilha...</td></tr>";

        fetch(ENDPOINT + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            corpoTabela.innerHTML = "";
            data.filter(item => item.PLACA && !item.SAIDA).forEach(item => {
                
                // LÓGICA DO PENDENTE: SE COLETA TIVER CONTEÚDO, O AVISO VERMELHO SOME
                let blocoAgendamento = "";
                if (item.COLETA && item.COLETA.trim() !== "" && item.COLETA !== "undefined" && item.COLETA !== "null") {
                    blocoAgendamento = `<span class="confirmado-agendado">📅 ${item.COLETA}</span>`;
                } else {
                    blocoAgendamento = `<span class="alerta-pendente">⚠️ PENDENTE</span>`;
                }

                corpoTabela.innerHTML += `
                    <tr>
                        <td style="font-size:18px;">${item.PLACA}</td>
                        <td>${item.TELEFONE}</td>
                        <td>${verificarStatusJornada(item.JORNADA)}</td>
                        <td style="background:#fcfcfc">${blocoAgendamento}</td>
                        <td style="color:#666;">${calcularDiferencaTempo(item.ENTRADA)}</td>
                        <td>
                            <button class="btn-tabela btn-cor-agendar" onclick="abrirModal('${item.PLACA}')">📅 AGENDAR</button>
                            <button class="btn-tabela btn-cor-whats" onclick="mandarWhatsApp('${item.TELEFONE}', '${item.PLACA}', '${item.COLETA}')">📱 WHATSAPP</button>
                            <button class="btn-tabela btn-cor-ok" onclick="concluirOperacao('${item.PLACA}')">✅ CONCLUIR</button>
                        </td>
                    </tr>`;
            });
        });
    }

    // 5. FUNÇÕES DE CÁLCULO
    function verificarStatusJornada(fim) {
        if (!fim || fim === "24 Horas") return '<span style="color:green">● JORNADA 24H</span>';
        const [h, m] = fim.split(':');
        const dt = new Date(); dt.setHours(h, m, 0);
        return (dt < new Date()) ? `<span style="color:red">● VENCIDA (${fim})</span>` : `<span style="color:green">● EM DIA (${fim})</span>`;
    }

    function calcularDiferencaTempo(entrada) {
        if(!entrada) return "0m";
        const p = entrada.split(', ');
        const d = p[0].split('/'); const h = p[1].split(':');
        const dIn = new Date(d[2], d[1]-1, d[0], h[0], h[1]);
        const diff = Math.floor((new Date() - dIn) / 60000);
        return diff > 60 ? Math.floor(diff/60) + "h " + (diff%60) + "m" : diff + " min";
    }

    // 6. FUNÇÕES DO MODAL
    function abrirModal(placa) {
        document.getElementById('inputPlacaOculta').value = placa;
        document.getElementById('txtPlacaModal').innerText = "PLACA: " + placa;
        document.getElementById('modalAgendamentoGlobal').style.display = 'block';
    }
    function fecharModal() { document.getElementById('modalAgendamentoGlobal').style.display = 'none'; }

    function processarAgendamento() {
        const placa = document.getElementById('inputPlacaOculta').value;
        const d = document.getElementById('inputDataModal').value.split('-').reverse().join('/');
        const h = document.getElementById('inputHoraModal').value;
        if(!d || !h || d === "") return alert("Preencha Data e Hora!");

        const btn = document.getElementById('btnSalvarModalPlanilha');
        btn.innerText = "GRAVANDO...";

        fetch(`${ENDPOINT}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ "COLETA": d + " às " + h })
        }).then(() => {
            fecharModal();
            recarregarDadosTabela();
            btn.innerText = "GRAVAR NA PLANILHA";
        });
    }

    // 7. ENVIO DO FORMULÁRIO DO MOTORISTA
    document.getElementById('formCadastro').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSalvarTudo');
        btn.innerText = "ENVIANDO DADOS...";

        const payload = {
            "PLACA": document.getElementById('placaVeiculo').value,
            "PRODUTO": document.getElementById('produtoVeiculo').value,
            "TELEFONE": document.getElementById('whatsappVeiculo').value,
            "JORNADA": document.getElementById('checkLivre').checked ? "24 Horas" : document.getElementById('horaFimJornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "COLETA": "", "SAIDA": ""
        };

        fetch(ENDPOINT, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([payload]) })
        .then(() => location.reload());
    });

    function acessoAdmin() { if (prompt("Senha Raízen:") === "raizen2026") { document.getElementById('tela-entrada-motorista').style.display='none'; document.getElementById('admin-panel').style.display='block'; recarregarDadosTabela(); } }
    
    function concluirOperacao(placa) { 
        if(confirm("Deseja finalizar a descarga deste veículo?")) {
            fetch(`${ENDPOINT}/PLACA/${placa}`, { 
                method: 'PATCH', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ "SAIDA": new Date().toLocaleString() }) 
            }).then(() => recarregarDadosTabela());
        }
    }

    function mandarWhatsApp(tel, placa, coleta) {
        const baia = prompt("Informe a BAIA de descarga:");
        if(baia) {
            const mensagem = `*RAÍZEN - ÁREA 2*%0APLACA: *${placa}*%0ACOLETA: *${coleta || 'Pendente'}*%0ABAIA: *${baia}*%0A%0AFavor entrar para descarga imediatamente.`;
            window.open(`https://web.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${mensagem}`);
        }
    }
</script>
</body>
</html>
