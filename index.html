<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raízen - DESCARGA ÁREA 2</title>
    <style>
        :root {
            --cor-principal: #4d6d5d; 
            --amarelo-raizen: #ffcd00;
            --fundo: #f0f2f5;
            --branco: #ffffff;
            --danger: #dc3545;
            --warning: #ffc107;
            --success: #28a745;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--fundo); margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        header { 
            background-color: var(--cor-principal); 
            width: 100%; 
            padding: 20px 0; 
            text-align: center; 
            border-bottom: 6px solid var(--amarelo-raizen); 
        }
        header h1 { color: var(--branco); margin: 0; font-size: 22px; text-transform: uppercase; }
        
        .container { 
            width: 95%; 
            max-width: 500px; 
            margin: 20px auto; 
            background: var(--branco); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }

        /* Painel Administrativo Largo */
        #admin-panel { display: none; max-width: 98%; width: 1200px; }

        h2 { color: var(--cor-principal); text-align: center; margin-bottom: 20px; text-transform: uppercase; font-size: 18px; letter-spacing: 1px; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: #333; }

        input, select { 
            width: 100%; 
            padding: 15px; 
            margin-top: 5px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 18px;
        }

        /* Lógica da Jornada */
        .jornada-container { background: #f1f3f1; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-top: 15px; }
        .checkbox-group { display: flex; align-items: center; gap: 12px; margin-top: 10px; cursor: pointer; padding: 10px; background: #fff; border-radius: 8px; border: 1px solid #ccc; }
        .checkbox-group input { width: 25px; height: 25px; }

        .btn-enviar { width: 100%; padding: 20px; background-color: var(--cor-principal); color: white; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 25px; }

        /* Tabela Administrativa Estilizada */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: var(--cor-principal); color: white; padding: 15px; text-align: center; font-size: 14px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; font-weight: 500; }
        
        .status-badge { padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 12px; color: white; display: inline-block; }
        .bg-ok { background: var(--success); }
        .bg-vencido { background: var(--danger); animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* Botões do Painel */
        .btn-acao { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; padding: 10px; font-size: 12px; width: 100%; margin-bottom: 5px; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-chamar { background: #25D366; }
        .btn-concluir { background: #007bff; }
        .btn-agendar { background: white; color: #007bff; border: 2px solid #007bff; }
        .btn-agendar:hover { background: #f0f7ff; }

        .texto-pendente { color: #dc3545; font-style: italic; font-weight: bold; }
        .texto-agendado { color: #28a745; font-weight: bold; }

        /* Modal */
        #modalColeta { display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter: blur(3px); }
        .modal-content { background:white; margin:10% auto; padding:30px; border-radius:20px; width:350px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<header><h1>RAÍZEN - TERMINAL PAULÍNIA</h1></header>

<div class="container" id="tela-motorista">
    <h2>DESCARGA ÁREA 2</h2>
    <form id="formAgendamento">
        <label>Placa do Veículo</label>
        <input type="text" id="placa" placeholder="ABC-1234" maxlength="8" required>
        
        <label>Produto</label>
        <select id="produto" required>
            <option value="">Selecione o produto...</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="BIODIESEL (B100)">BIODIESEL (B100)</option>
            <option value="S10">S10</option>
            <option value="ANIDRO">ANIDRO</option>
            <option value="HIDRATADO">HIDRATADO</option>
        </select>

        <label>WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(19) 99999-9999" maxlength="15" required>

        <div class="jornada-container">
            <div id="divHorario">
                <label style="margin-top: 0;">Fim da Jornada (Horário):</label>
                <input type="time" id="horaJornada" required>
            </div>
            <label class="checkbox-group">
                <input type="checkbox" id="check24h" onchange="toggleJornada()">
                <span>Jornada 24 Horas (Livre)</span>
            </label>
        </div>

        <button type="submit" class="btn-enviar" id="btnEnviar">REGISTRAR ENTRADA</button>
    </form>
    <div style="text-align: center; margin-top: 20px;"><button onclick="abrirAdmin()" style="background:none; border:none; color:#ccc; cursor:pointer; text-decoration:underline;">Acesso Administrativo</button></div>
</div>

<div class="container" id="admin-panel">
    <h2>Controle de Pátio - Área 2</h2>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>WhatsApp</th>
                    <th>Status Jornada</th>
                    <th style="background-color: #f8f9fa; color: #333;">Agendado para</th>
                    <th>Pátio</th>
                    <th style="width: 180px;">Ações</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
    <button class="btn-enviar" style="background:#666;" onclick="window.location.reload()">SAIR DO PAINEL</button>
</div>

<div id="modalColeta">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--cor-principal);">Definir Agendamento</h3>
        <p id="placaDestaque" style="font-weight:bold; font-size:18px; color:#333;"></p>
        <input type="hidden" id="placaAlvo">
        
        <label>Data da Coleta:</label>
        <input type="date" id="inputData">
        
        <label>Hora da Coleta:</label>
        <input type="time" id="inputHora">
        
        <button class="btn-enviar" id="btnSalvarAgenda" onclick="salvarColeta()">GRAVAR AGENDAMENTO</button>
        <button onclick="fecharModal()" style="margin-top:15px; border:none; background:none; color:var(--danger); font-weight:bold; cursor:pointer;">CANCELAR</button>
    </div>
</div>

<script>
    const API_URL = 'https://sheetdb.io/api/v1/p9z83v5m0dxq5';

    function toggleJornada() {
        const is24h = document.getElementById('check24h').checked;
        document.getElementById('divHorario').style.display = is24h ? 'none' : 'block';
        document.getElementById('horaJornada').required = !is24h;
    }

    // Máscaras (Placa e Celular)
    document.getElementById('telefone').addEventListener('input', (e) => {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    document.getElementById('placa').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        if (v.length > 3 && !isNaN(v[3])) v = v.substring(0,3) + "-" + v.substring(3,7);
        e.target.value = v.substring(0,8);
    });

    function carregarDados() {
        fetch(API_URL + "?t=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('corpoTabela');
            tbody.innerHTML = "";
            data.filter(i => i.PLACA && !i.SAIDA).forEach(i => {
                const agendado = (i.COLETA && i.COLETA !== "undefined" && i.COLETA !== "") ? 
                                 `<span class="texto-agendado">${i.COLETA}</span>` : 
                                 `<span class="texto-pendente">Pendente</span>`;
                
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:bold; font-size:16px;">${i.PLACA}</td>
                        <td>${i.TELEFONE}</td>
                        <td>${getStatusJornada(i.JORNADA)}</td>
                        <td>${agendado}</td>
                        <td>${calcularEspera(i.ENTRADA)}</td>
                        <td>
                            <button class="btn-acao btn-agendar" onclick="abrirModal('${i.PLACA}')">🗓️ Agendar Coleta</button>
                            <button class="btn-acao btn-chamar" onclick="enviarZap('${i.TELEFONE}', '${i.PLACA}', '${i.COLETA}')">📱 CHAMAR</button>
                            <button class="btn-acao btn-concluir" onclick="concluir('${i.PLACA}')">✅ OK</button>
                        </td>
                    </tr>`;
            });
        });
    }

    function getStatusJornada(horaFim) {
        if (!horaFim || horaFim === "24 Horas") return '<span class="status-badge bg-ok">LIVRE (24h)</span>';
        const agora = new Date();
        const [h, m] = horaFim.split(':');
        const limite = new Date(); limite.setHours(h, m, 0);
        return (limite < agora) ? `<span class="status-badge bg-vencido">VENCIDA (${horaFim})</span>` : `<span class="status-badge bg-ok">EM DIA (${horaFim})</span>`;
    }

    function calcularEspera(entrada) {
        if(!entrada) return "0 min";
        const partes = entrada.split(', ');
        const d = partes[0].split('/'); const h = partes[1].split(':');
        const inicio = new Date(d[2], d[1]-1, d[0], h[0], h[1]);
        const diff = Math.floor((new Date() - inicio) / 60000);
        return diff > 60 ? Math.floor(diff/60)+"h "+(diff%60)+"m" : diff+" min";
    }

    // Ações do Formulário e Painel
    document.getElementById('formAgendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.innerText = "GRAVANDO...";
        const dados = {
            "PLACA": document.getElementById('placa').value,
            "PRODUTO": document.getElementById('produto').value,
            "TELEFONE": document.getElementById('telefone').value,
            "JORNADA": document.getElementById('check24h').checked ? "24 Horas" : document.getElementById('horaJornada').value,
            "ENTRADA": new Date().toLocaleString('pt-BR'),
            "COLETA": "", "SAIDA": ""
        };
        fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([dados]) })
        .then(() => { alert("Entrada Registrada!"); location.reload(); });
    });

    function abrirModal(placa) {
        document.getElementById('placaAlvo').value = placa;
        document.getElementById('placaDestaque').innerText = "Placa: " + placa;
        document.getElementById('modalColeta').style.display = 'block';
    }
    function fecharModal() { document.getElementById('modalColeta').style.display = 'none'; }

    function salvarColeta() {
        const placa = document.getElementById('placaAlvo').value;
        const dataRaw = document.getElementById('inputData').value;
        const horaRaw = document.getElementById('inputHora').value;
        
        if(!dataRaw || !horaRaw) return alert("Preencha data e hora!");

        const dataFormatada = dataRaw.split('-').reverse().join('/');
        const infoFinal = `${dataFormatada} às ${horaRaw}`;

        document.getElementById('btnSalvarAgenda').innerText = "GRAVANDO...";

        fetch(`${API_URL}/PLACA/${placa}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ "COLETA": infoFinal })
        }).then(() => {
            fecharModal();
            carregarDados();
            document.getElementById('btnSalvarAgenda').innerText = "GRAVAR AGENDAMENTO";
        });
    }

    function abrirAdmin() { if (prompt("Senha:") === "raizen2026") { document.getElementById('tela-motorista').style.display='none'; document.getElementById('admin-panel').style.display='block'; carregarDados(); } }
    function concluir(placa) { if(confirm("Concluir descarga?")) fetch(`${API_URL}/PLACA/${placa}`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ "SAIDA": new Date().toLocaleString() }) }).then(() => carregarDados()); }
    function enviarZap(tel, placa, coleta) { 
        const baia = prompt("Qual a Baia?"); 
        if(baia) {
            const msg = `*RAÍZEN - ÁREA 2*%0A*Placa:* ${placa}%0A*Coleta:* ${coleta || 'A definir'}%0A*BAIA:* ${baia}%0A%0AFavor dirigir-se à baia informada.`;
            window.open(`https://web.whatsapp.com/send?phone=55${tel.replace(/\D/g, "")}&text=${msg}`);
        }
    }
</script>
</body>
</html>
